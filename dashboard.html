<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo Smart - لوحة التحكم المدير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>body{font-family:'Tajawal',sans-serif}</style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20 text-right">

    <div class="max-w-5xl mx-auto p-5 md:p-8">
        <!-- Header -->
        <div class="bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center mb-8 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-emerald-600 text-white rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-user-shield"></i></div>
                <div><h1 class="text-xl font-black">لوحة تحكم المدير 🇩🇿</h1><p id="userEmail" class="text-xs text-emerald-600 font-bold"></p></div>
            </div>
            <button id="logoutBtn" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-bold transition">خروج</button>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black">إدارة المتاجر الحية</h2>
            <button onclick="showModal('addShopModal')" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-emerald-100 transition active:scale-95"><i class="fa-solid fa-plus"></i> إضافة متجر</button>
        </div>

        <div id="shopsList" class="space-y-4"></div>
    </div>

    <!-- نافذة إضافة متجر -->
    <div id="addShopModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 shadow-2xl">
            <h3 class="text-lg font-black mb-6 flex items-center gap-2 text-emerald-700"><i class="fa-solid fa-circle-plus"></i> تسجيل متجر جديد</h3>
            <div class="space-y-4">
                <div><label class="block text-[10px] font-black text-slate-400 mb-1 uppercase">إسم المحل التجاري</label><input id="addName" type="text" class="w-full border-slate-100 border-2 p-3 rounded-2xl text-sm outline-none focus:border-emerald-500 transition"></div>
                <div><label class="block text-[10px] font-black text-slate-400 mb-1 uppercase">التصنيف</label><select id="addCategory" class="w-full border-slate-100 border-2 p-3 rounded-2xl text-sm outline-none bg-slate-50"><option value="electronics">هواتف وإلكترونيات</option><option value="restaurants">مطاعم ومقاهي</option><option value="fashion">ملابس وموضة</option><option value="cars">قطع غيار سيارات</option><option value="services">خدمات وصيانة</option></select></div>
                <div><label class="block text-[10px] font-black text-slate-400 mb-1 uppercase">رقم الموبايل</label><input id="addPhone" type="tel" class="w-full border-slate-100 border-2 p-3 rounded-2xl text-sm outline-none text-left font-sans" placeholder="06XXXXXXXX"></div>
                <div><label class="block text-[10px] font-black text-slate-400 mb-1 uppercase">عنوان المحل</label><input id="addAddress" type="text" class="w-full border-slate-100 border-2 p-3 rounded-2xl text-sm outline-none"></div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="hideModal('addShopModal')" class="flex-1 bg-slate-50 py-4 rounded-2xl font-bold text-xs">إلغاء</button>
                <button onclick="addNewShop()" class="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-bold text-xs shadow-lg shadow-emerald-100">تأكيد الإضافة</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
            authDomain: "zalo-smart.firebaseapp.com",
            projectId: "zalo-smart",
            storageBucket: "zalo-smart.firebasestorage.app",
            messagingSenderId: "430326151788",
            appId: "1:430326151788:web:e4f94437946221429f3649"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) { document.getElementById('userEmail').textContent = user.email; loadShops(); }
            else { window.location.href = "index.html"; }
        });

        async function loadShops() {
            const box = document.getElementById('shopsList');
            box.innerHTML = '<p class="text-center py-10 text-slate-400 animate-pulse">جاري جلب المتاجر...</p>';
            const snap = await getDocs(query(collection(db, 'shops')));
            if(snap.empty) { box.innerHTML = '<p class="text-center py-10">لا يوجد متاجر</p>'; return; }
            let h = '';
            snap.forEach(d => {
                const s = d.data();
                h += `
                <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center font-black">${s.name[0]}</div>
                        <div><h4 class="font-black text-sm">${s.name}</h4><p class="text-[10px] text-slate-400 mt-1">${s.category} • ${s.phone}</p></div>
                    </div>
                    <button onclick="delShop('${d.id}')" class="w-9 h-9 bg-red-50 text-red-500 rounded-xl flex items-center justify-center transition hover:bg-red-500 hover:text-white"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            });
            box.innerHTML = h;
        }

        window.addNewShop = async () => {
            const n=document.getElementById('addName').value, c=document.getElementById('addCategory').value, p=document.getElementById('addPhone').value, a=document.getElementById('addAddress').value;
            if(!n||!p) return alert("مطلوب!");
            await addDoc(collection(db,'shops'), {name:n, category:c, phone:p, address:a, ownerId: auth.currentUser.uid, createdAt: serverTimestamp()});
            hideModal('addShopModal'); loadShops();
        };

        window.delShop = async (id) => { if(confirm("حذف؟")){ await deleteDoc(doc(db,'shops',id)); loadShops(); } };
        window.showModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.hideModal = (id) => document.getElementById(id).classList.add('hidden');
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    </script>
</body>
    </html>
