<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo Smart - لوحة تحكم 69 ولاية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .emerald-gradient { background: linear-gradient(135deg, #006233 0%, #008a47 100%); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20 text-right">

    <div id="loadingScreen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[100]">
        <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-emerald-600 mb-4"></div>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest text-center px-4">جاري تحميل النظام الوطني 69...</p>
    </div>

    <div id="loginView" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white p-10 rounded-[45px] shadow-2xl border border-slate-50 text-center border-t-8 border-emerald-600">
            <div class="w-20 h-20 emerald-gradient rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg text-white text-3xl"><i class="fa-solid fa-unlock-keyhole"></i></div>
            <h2 class="text-2xl font-black text-slate-900 mb-8 text-center underline decoration-emerald-500 underline-offset-8">المدير العام للمنصة</h2>
            <form id="loginForm" class="space-y-4">
                <input id="loginEmail" type="email" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-none outline-none text-right font-bold text-sm focus:ring-2 focus:ring-emerald-500 transition" placeholder="البريد الإلكتروني">
                <input id="loginPassword" type="password" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-none outline-none text-right font-bold text-sm focus:ring-2 focus:ring-emerald-500 transition" placeholder="كلمة المرور">
                <button type="submit" class="w-full emerald-gradient text-white py-4 rounded-2xl font-black shadow-lg shadow-emerald-200 mt-4 cursor-pointer hover:scale-[1.02] transition-all">دخول آمن للمدير</button>
            </form>
        </div>
    </div>

    <div id="dashboardView" class="hidden max-w-5xl mx-auto p-4 md:p-8 animate-fade">
        <header class="bg-white p-6 rounded-[40px] border border-slate-100 flex justify-between items-center mb-10 shadow-sm">
            <div class="flex items-center gap-4 text-right">
                <div class="w-14 h-14 emerald-gradient text-white rounded-2xl flex items-center justify-center text-2xl shadow-inner"><i class="fa-solid fa-chart-line"></i></div>
                <div><h1 class="text-xl font-black text-slate-900">إحصائيات المنصة</h1><p id="userEmail" class="text-[10px] text-emerald-600 font-black"></p></div>
            </div>
            <button id="logoutBtn" class="bg-red-50 text-red-600 px-5 py-2.5 rounded-2xl text-xs font-black transition hover:bg-red-600 hover:text-white shadow-sm">خروج</button>
        </header>

        <div class="flex justify-between items-center mb-8 px-2">
            <div><h2 class="text-2xl font-black text-slate-900">المتاجر النشطة</h2><p class="text-[10px] text-emerald-600 font-bold mt-1 uppercase tracking-widest italic">الجمهورية الجزائرية الديمقراطية الشعبية 🇩🇿</p></div>
            <button onclick="showModal('addShopModal')" class="emerald-gradient text-white px-6 py-3 rounded-2xl font-black text-xs flex items-center gap-2 shadow-xl shadow-emerald-200 transition active:scale-95"><i class="fa-solid fa-plus-circle text-lg"></i> تسجيل متجر جديد</button>
        </div>

        <div id="shopsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <!-- نافذة إضافة متجر مع بلديات وصورة -->
    <div id="addShopModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-lg rounded-[50px] p-10 shadow-2xl overflow-y-auto max-h-[92vh] hide-scrollbar">
            <div class="flex justify-between items-center mb-8 border-b border-slate-50 pb-5">
                <h3 class="text-xl font-black text-emerald-800">بيانات المتجر الوطني</h3>
                <button onclick="hideModal('addShopModal')" class="text-slate-300 hover:text-red-500 transition text-2xl"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>
            
            <div class="space-y-4">
                <input id="addName" type="text" class="w-full bg-slate-50 p-4 rounded-2xl text-sm font-bold border-2 border-transparent outline-none focus:border-emerald-500" placeholder="اسم المحل">
                
                <div class="grid grid-cols-2 gap-3 text-right">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 mr-2">الولاية 🇩🇿</label>
                        <select id="addWilaya" onchange="loadBaladiyas(this.value, 'addBaladiya')" class="w-full bg-slate-50 p-4 rounded-2xl text-xs font-black outline-none border-2 border-transparent focus:border-emerald-500"></select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 mr-2">البلدية 📍</label>
                        <select id="addBaladiya" class="w-full bg-slate-50 p-4 rounded-2xl text-xs font-black outline-none border-2 border-transparent focus:border-emerald-500">
                            <option value="">اختر الولاية أولاً</option>
                        </select>
                    </div>
                </div>

                <select id="addCategory" class="w-full bg-slate-50 p-4 rounded-2xl text-xs font-black outline-none border-2 border-transparent focus:border-emerald-500">
                    <option value="electronics">هواتف وإلكترونيات</option>
                    <option value="restaurants">مطاعم ومقاهي</option>
                    <option value="cars">قطع غيار سيارات</option>
                    <option value="food">مواد غذائية</option>
                    <option value="pro">حرفيين ومهن</option>
                </select>

                <input id="addPhone" type="tel" class="w-full bg-slate-50 p-4 rounded-2xl text-sm font-bold outline-none border-2 border-transparent focus:border-emerald-500 text-left" placeholder="رقم الهاتف">
                <input id="addAddress" type="text" class="w-full bg-slate-50 p-4 rounded-2xl text-sm font-bold border-2 border-transparent focus:border-emerald-500 text-right" placeholder="شارع رقم... (اختياري)">
                
                <div class="bg-emerald-50/50 p-4 rounded-3xl border border-dashed border-emerald-200">
                    <label class="block text-[10px] font-black text-emerald-600 mb-2">رابط صورة المحل (من Facebook أو ImgBB)</label>
                    <input id="addImg" type="url" class="w-full bg-white p-3 rounded-xl text-[10px] outline-none border-none" placeholder="https://...">
                </div>
            </div>

            <div class="flex gap-4 mt-8">
                <button onclick="addNewShop()" class="flex-[2] emerald-gradient text-white py-4 rounded-2xl font-black text-sm shadow-xl shadow-emerald-100">نشر المتجر الآن</button>
                <button onclick="hideModal('addShopModal')" class="flex-1 bg-slate-100 text-slate-400 py-4 rounded-2xl font-black text-sm">إلغاء</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
            authDomain: "zalo-smart.firebaseapp.com",
            projectId: "zalo-smart",
            storageBucket: "zalo-smart.firebasestorage.app",
            messagingSenderId: "430326151788",
            appId: "1:430326151788:web:e4f94437946221429f3649"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // قائمة الـ 69 ولاية الكاملة 🇩🇿
        const wilayas = [
            "01-أدرار","02-الشلف","03-الأغواط","04-أم البواقي","05-باتنة","06-بجاية","07-بسكرة","08-بشار","09-البليدة","10-البويرة",
            "11-تمنراست","12-تبسة","13-تلمسان","14-تيارت","15-تيزي وزو","16-الجزائر","17-الجلفة","18-جيجل","19-سطيف","20-سعيدة",
            "21-سكيكدة","22-سيدي بلعباس","23-عنابة","24-قالمة","25-قسنطينة","26-المدية","27-مستغانم","28-المسيلة","29-معسكر","30-ورقلة",
            "31-وهران","32-البيض","33-إليزي","34-برج بوعريريج","35-بومرداس","36-الطارف","37-تندوف","38-تيسمسيلت","39-الوادي","40-خنشلة",
            "41-سوق أهراس","42-تيبازة","43-ميلة","44-عين الدفلى","45-النعامة","46-عين تموشنت","47-غرداية","48-غليزان","49-تيميمون","50-برج باجي مختار",
            "51-أولاد جلال","52-بني عباس","53-عين صالح","54-عين قزام","55-تقرت","56-جانت","57-المغير","58-المنيعة",
            "59-بوسعادة","60-مسعد","61-بريكة","62-عين البيضاء","63-أفلو","64-قصر الشلالة","65-عين وسارة","66-فرجيوي","67-العلمة","68-القل","69-رأس الوادي"
        ];

        const baladiyasData = {
            "58-المنيعة": ["المنيعة المركز", "حاسي القارة"],
            "47-غرداية": ["غرداية", "متليلي", "العطف", "بونورة", "القرارة", "بريان"],
            "16-الجزائر": ["سيدي امحمد", "الدار البيضاء", "دالي براهيم", "الشراقة", "باب الواد"],
            "17-الجلفة": ["الجلفة", "حاسي بحبح", "عين وسارة", "مسعد"],
            "03-الأغواط": ["الأغواط", "آفلو", "قصر الحيران"]
        };

        window.loadBaladiyas = (w, targetId) => {
            const select = document.getElementById(targetId);
            select.innerHTML = '';
            const list = baladiyasData[w] || ["المركز / بلدية الولاية"];
            list.forEach(b => { select.innerHTML += `<option value="${b}">${b}</option>`; });
        };

        window.onload = () => {
            const select = document.getElementById('addWilaya');
            wilayas.forEach(w => { select.innerHTML += `<option value="${w}">${w}</option>`; });
            loadBaladiyas(wilayas[0], 'addBaladiya');
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('loadingScreen').classList.add('hidden');
            if (user) { 
                document.getElementById('userEmail').textContent = user.email; 
                document.getElementById('dashboardView').classList.remove('hidden');
                loadShops(); 
            } else { 
                document.getElementById('loginView').classList.remove('hidden'); 
            }
        });

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); }
            catch (err) { alert("❌ خطأ في الدخول"); }
        };

        async function loadShops() {
            const box = document.getElementById('shopsList');
            box.innerHTML = '<div class="col-span-full py-20 text-center animate-pulse text-slate-400 font-bold">جاري تحديث الخريطة الوطنية...</div>';
            const snap = await getDocs(query(collection(db, 'shops')));
            if(snap.empty) { box.innerHTML = '<p class="col-span-full text-center py-20 font-black text-slate-300">لا توجد متاجر نشطة حالياً</p>'; return; }
            let h = '';
            snap.forEach(d => {
                const s = d.data();
                h += `
                <div class="bg-white p-5 rounded-[35px] border border-slate-100 flex justify-between items-center shadow-sm hover:shadow-xl transition-all duration-300">
                    <div class="flex items-center gap-4">
                        <img src="${s.imgUrl || 'https://via.placeholder.com/60'}" class="w-14 h-14 rounded-2xl object-cover shadow-sm border border-slate-50">
                        <div>
                            <h4 class="font-black text-slate-900 text-sm">${s.name}</h4>
                            <p class="text-[10px] text-emerald-600 font-black mt-0.5"><i class="fa-solid fa-map-location-dot"></i> ${s.wilaya || 'غير محدد'} | ${s.baladiya || ''}</p>
                            <p class="text-[9px] text-slate-400 font-bold italic mt-0.5">${s.phone}</p>
                        </div>
                    </div>
                    <button onclick="delShop('${d.id}')" class="w-10 h-10 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-colors shadow-sm"><i class="fa-solid fa-trash-can text-sm"></i></button>
                </div>`;
            });
            box.innerHTML = h;
        }

        window.addNewShop = async () => {
            const n=document.getElementById('addName').value, w=document.getElementById('addWilaya').value, b=document.getElementById('addBaladiya').value, c=document.getElementById('addCategory').value, p=document.getElementById('addPhone').value, a=document.getElementById('addAddress').value, img=document.getElementById('addImg').value;
            if(!n || !p) return alert("⚠️ الإسم والهاتف ضروريان!");
            await addDoc(collection(db,'shops'), {
                name: n, wilaya: w, baladiya: b, category: c, phone: p, address: a, imgUrl: img,
                productCount: 0, ownerId: auth.currentUser.uid, createdAt: serverTimestamp()
            });
            hideModal('addShopModal'); loadShops();
        };

        window.delShop = async (id) => { if(confirm("حذف من المنصة؟")){ await deleteDoc(doc(db,'shops',id)); loadShops(); } };
        window.showModal = (id) => { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); };
        window.hideModal = (id) => { document.getElementById(id).classList.remove('flex'); document.getElementById(id).classList.add('hidden'); };
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
