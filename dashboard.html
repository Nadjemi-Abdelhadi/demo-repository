<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo Smart - لوحة التحكم</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-white min-h-screen flex items-center justify-center">

    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 bg-slate-50 dark:bg-slate-950 flex items-center justify-center z-50">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500"></div>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="max-w-md w-full bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-lg border border-slate-100 dark:border-slate-700 hidden">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                <i class="fa-solid fa-shield-halved text-white text-3xl"></i>
            </div>
            <h2 class="text-3xl font-black">ZaLo Smart</h2>
            <p class="text-sm text-slate-500 mt-1">لوحة التحكم</p>
        </div>
        
        <form class="space-y-4">
            <div>
                <label for="loginEmail" class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">البريد الإلكتروني</label>
                <input type="email" id="loginEmail" class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="admin@zalo.com" required>
            </div>
            <div>
                <label for="loginPassword" class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">كلمة المرور</label>
                <input type="password" id="loginPassword" class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition">دخول</button>
        </form>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="hidden w-full max-w-4xl mx-auto p-5 md:p-8">
        
        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-100 dark:border-slate-800 mb-6 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-black">لوحة التحكم</h1>
                <p class="text-xs text-slate-500 mt-0.5">
                    مرحباً <span id="userEmail" class="font-bold text-blue-600"></span>
                    <span class="mx-2">|</span>
                    الدور: <span id="userRole" class="font-bold text-emerald-600"></span>
                </p>
            </div>
            <button id="logoutButton" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2.5 rounded-xl font-bold text-sm transition">تسجيل الخروج</button>
        </div>

        <!-- Admin Section -->
        <div id="adminSection" class="hidden">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-100 dark:border-slate-700">
                <h2 class="text-xl font-black mb-4">👑 لوحة تحكم المدير</h2>
                <p class="text-slate-500">تم تسجيل الدخول بنجاح كمدير النظام.</p>
            </div>
        </div>

        <!-- Shop Owner Section -->
        <div id="shopOwnerSection" class="hidden">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-100 dark:border-slate-700">
                <h2 class="text-xl font-black mb-4">🏪 لوحة تحكم صاحب المحل</h2>
                <p class="text-slate-500">تم تسجيل الدخول بنجاح.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
            authDomain: "zalo-smart.firebaseapp.com",
            projectId: "zalo-smart",
            storageBucket: "zalo-smart.firebasestorage.app",
            messagingSenderId: "430326151788",
            appId: "1:430326151788:web:e4f94437946221429f3649"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loadingScreen = document.getElementById('loadingScreen');
        const loginForm = document.getElementById('loginForm');
        const dashboardView = document.getElementById('dashboardView');
        const userEmailSpan = document.getElementById('userEmail');
        const userRoleSpan = document.getElementById('userRole');
        const adminSection = document.getElementById('adminSection');
        const shopOwnerSection = document.getElementById('shopOwnerSection');
        const logoutButton = document.getElementById('logoutButton');

        let currentUser = null;
        let currentUserRole = 'guest';

        // ✅ هنا التعديل المهم
        onAuthStateChanged(auth, async (user) => {
            loadingScreen.classList.add('hidden'); // إخفاء الدائرة فوراً

            if (user) {
                currentUser = user;
                try {
                    await fetchUserRole(user.uid);
                } catch (e) {
                    console.error(e);
                }
                showDashboard();
                userEmailSpan.textContent = user.email || '';
                userRoleSpan.textContent = currentUserRole === 'admin' ? '👑 مدير النظام' : '🏪 صاحب محل';
                renderContent();
            } else {
                currentUser = null;
                showLogin();
            }
        });

        function showLogin() {
            loginForm.classList.remove('hidden');
            dashboardView.classList.add('hidden');
        }

        function showDashboard() {
            dashboardView.classList.remove('hidden');
            loginForm.classList.add('hidden');
        }

        async function fetchUserRole(uid) {
            const userRef = doc(db, 'users', uid);
            const snap = await getDoc(userRef);
            if (snap.exists()) {
                currentUserRole = snap.data().role || 'shop_owner';
            } else {
                currentUserRole = 'shop_owner';
            }
        }

        function renderContent() {
            if (currentUserRole === 'admin') {
                adminSection.classList.remove('hidden');
                shopOwnerSection.classList.add('hidden');
            } else {
                adminSection.classList.add('hidden');
                shopOwnerSection.classList.remove('hidden');
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
            } catch (error) {
                alert('خطأ في تسجيل الدخول: ' + error.message);
            }
        });

        logoutButton.addEventListener('click', async () => {
            await signOut(auth);
        });
    </script>
</body>
            </html>
