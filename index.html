<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | السوق الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; padding: 16px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); overflow: hidden; }
        .header { background: #006233; color: white; padding: 16px; text-align: center; }
        .card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 12px; border: 1px solid #e9f0ec; }
        .btn { background: #006233; color: white; border: none; border-radius: 60px; padding: 8px 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; }
        .btn-outline { background: white; border: 1px solid #006233; color: #006233; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .like-btn, .comment-btn { background: none; border: none; color: #006233; margin: 0 5px; cursor: pointer; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
        .toast.show { opacity: 1; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; width: 90%; border-radius: 28px; padding: 20px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>
<div class="container">
    <!-- شاشة الدخول -->
    <div id="loginView" style="padding: 20px;">
        <div style="text-align: center;">
            <i class="fa-solid fa-shop" style="font-size: 48px; color: #006233;"></i>
            <h1>ZaLo</h1>
            <p style="color: #006233;">منصة جزائرية متكاملة</p>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" value="hadi47hadi58@gmail.com">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button class="btn" id="doLogin">دخول</button>
            <button class="btn btn-outline" id="openRegBtn">إنشاء حساب</button>
            <div id="loginError" style="color:red; margin-top:8px;"></div>
        </div>
    </div>

    <!-- واجهة العميل بعد الدخول -->
    <div id="customerView" style="display: none;">
        <div class="header"><h2>ZaLo | السوق الذكي</h2></div>
        <div id="customerContent" style="padding: 16px;"></div>
        <div style="padding: 16px; text-align: center;">
            <button id="logoutCustomer" class="btn btn-outline" style="margin-top: 8px;">تسجيل خروج</button>
            <a href="./admin.html" id="adminLink" style="display: none; margin-top: 12px; background:#006233; color:white; padding:8px 16px; border-radius:60px; text-decoration:none; display:inline-block;">🔧 لوحة الإدارة</a>
        </div>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-card">
        <h3>حساب جديد</h3>
        <input type="text" id="regName" placeholder="الاسم">
        <input type="email" id="regEmail" placeholder="البريد">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button class="btn" id="doRegister">تسجيل</button>
        <button onclick="closeModal('regModal')">إلغاء</button>
    </div>
</div>

<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allProducts = [];
    let allShops = [];
    let currentUserRole = "customer";

    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function loadData() {
        const shopsSnap = await getDocs(collection(db, "shops"));
        allShops = shopsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const productsSnap = await getDocs(collection(db, "products"));
        allProducts = productsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    // دالة عرض المنتج
    function productCard(p) {
        const shop = allShops.find(s => s.id === p.shopId);
        return `
            <div class="card">
                <div style="font-size: 40px;">${p.mediaUrl ? (p.mediaUrl.includes('.mp4') ? '🎥' : '📷') : '📦'}</div>
                <div><strong>${p.name}</strong></div>
                <div>${p.price} دج</div>
                <div style="font-size: 12px; color: #006233;">${shop?.name || ''}</div>
                <button class="btn" style="margin-top: 8px;" onclick="orderProduct('${p.id}')">اطلب الآن</button>
            </div>
        `;
    }

    // دالة الطلب الجديدة (التي تريد إضافتها)
    window.orderProduct = async (productId) => {
        const product = allProducts.find(p => p.id === productId);
        if (!product) { showToast("المنتج غير موجود"); return; }
        const user = auth.currentUser;
        if (!user) { showToast("الرجاء تسجيل الدخول أولاً"); return; }
        try {
            await addDoc(collection(db, "orders"), {
                productId: product.id,
                productName: product.name,
                customerId: user.uid,
                customerEmail: user.email,
                shopId: product.shopId,
                status: "pending",
                createdAt: new Date(),
                updatedAt: new Date()
            });
            showToast("✅ تم إرسال طلبك بنجاح! سيتم التواصل معك قريباً.");
        } catch (e) {
            showToast("حدث خطأ: " + e.message);
        }
    };

    async function renderCustomerHome() {
        await loadData();
        let productsHtml = '';
        allProducts.forEach(p => { productsHtml += productCard(p); });
        document.getElementById('customerContent').innerHTML = `
            <div class="card" style="background: linear-gradient(135deg,#006233,#00a857); color: white; text-align: center;">
                <h3>مرحباً في ZaLo</h3>
                <p>${allShops.length} متجر | ${allProducts.length} منتج</p>
            </div>
            <h3>🛍️ جميع المنتجات</h3>
            <div class="product-grid">${productsHtml || '<div class="card">لا توجد منتجات بعد</div>'}</div>
        `;
    }

    // تبديل الواجهة حسب الدور
    async function showCustomerInterface() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('customerView').style.display = 'block';
        await renderCustomerHome();
        // إظهار رابط لوحة الإدارة للمدير فقط
        const adminLink = document.getElementById('adminLink');
        if (currentUserRole === 'super_admin' || currentUserRole === 'supervisor') {
            adminLink.style.display = 'inline-block';
        } else {
            adminLink.style.display = 'none';
        }
    }

    // أحداث تسجيل الدخول والتسجيل
    document.getElementById('doLogin').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        if (!email || !pass) { document.getElementById('loginError').innerText = "أدخل البريد وكلمة المرور"; return; }
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            document.getElementById('loginError').innerText = "";
        } catch (e) {
            document.getElementById('loginError').innerText = e.message.includes('user-not-found') ? "مستخدم غير موجود" : (e.message.includes('wrong-password') ? "كلمة مرور خاطئة" : e.message);
        }
    };
    document.getElementById('openRegBtn').onclick = () => document.getElementById('regModal').style.display = 'flex';
    document.getElementById('doRegister').onclick = async () => {
        const name = document.getElementById('regName').value, email = document.getElementById('regEmail').value, pass = document.getElementById('regPass').value;
        if (!name || !email || !pass || pass.length < 6) { showToast("املأ الحقول وكلمة مرور 6 أحرف"); return; }
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "users", userCred.user.uid), { name, email, role: "customer", createdAt: new Date() });
            showToast("تم التسجيل");
            closeModal('regModal');
        } catch (e) { showToast(e.message); }
    };
    document.getElementById('logoutCustomer').onclick = async () => { await signOut(auth); location.reload(); };

    // مراقب حالة الدخول
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                currentUserRole = userDoc.data().role;
            } else {
                currentUserRole = "customer";
                await setDoc(doc(db, "users", user.uid), { email: user.email, role: "customer", name: user.email.split('@')[0] });
            }
            await showCustomerInterface();
        } else {
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('customerView').style.display = 'none';
        }
    });
</script>
</body>  
</html>
