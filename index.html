<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo AI - المنيعة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <header class="p-6 bg-white shadow-sm flex justify-between items-center text-center">
        <h1 class="text-2xl font-black text-blue-600 w-full">ZaLo AI - المنيعة 🇩🇿</h1>
    </header>

    <main class="max-w-md mx-auto mt-10 p-6 bg-white rounded-2xl shadow-xl border border-gray-100">
        <h2 class="text-xl font-bold mb-2 text-center">تطبيق تحسين صور المنتجات</h2>
        <p class="text-gray-500 text-sm text-center mb-8">ارفع صورة منتجك الآن للحصول على خلفية احترافية</p>
        
        <div onclick="document.getElementById('fileUpload').click()" class="cursor-pointer border-2 border-dashed border-blue-200 bg-blue-50 rounded-xl p-12 text-center transition-all hover:bg-blue-100">
            <div class="text-4xl mb-4">📸</div>
            <p id="fileName" class="text-blue-600 font-medium">اضغط هنا لرفع الصورة</p>
            <input type="file" class="hidden" id="fileUpload" accept="image/*">
        </div>

        <button onclick="startAction()" class="w-full mt-8 bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">
            بدء التحسين التلقائي
        </button>
    </main>

    <script>
        // كود لتغيير النص عند اختيار صورة
        document.getElementById('fileUpload').onchange = function() {
            if(this.files.length > 0) {
                document.getElementById('fileName').innerText = "تم اختيار: " + this.files[0].name;
                document.getElementById('fileName').classList.replace('text-blue-600', 'text-green-600');
            }
        };

        function startAction() {
            const fileInput = document.getElementById('fileUpload');
            if(fileInput.files.length === 0) {
                alert("من فضلك اختر صورة أولاً يا عبد الهادي!");
            } else {
                alert("جاري معالجة الصورة في المنيعة... انتظر قليلاً");
            }
        }
    </script>
</body>
</html>
