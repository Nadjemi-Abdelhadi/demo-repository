<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | السوق الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Tajawal',sans-serif;background:#f5f9f7;direction:rtl;}
        .app-container{max-width:500px;margin:0 auto;background:#fff;min-height:100vh;}
        .header{background:white;padding:12px 16px;border-bottom:1px solid #eef2f0;display:flex;justify-content:space-between;align-items:center;}
        .brand h2{font-size:20px;font-weight:900;color:#006233;}
        .brand p{font-size:9px;color:#8ba396;margin-top:-2px;}
        .hero-logo{text-align:center;margin:20px 16px;}
        .hero-logo i{font-size:48px;color:#006233;}
        .location-card{background:#f8faf9;border-radius:28px;padding:20px;margin:16px;text-align:center;}
        .location-card select,.location-card button{width:100%;padding:12px;margin-top:8px;border-radius:60px;border:1px solid #ddd;}
        .shop-card{background:white;border-radius:24px;padding:16px;margin:0 16px 16px;border:1px solid #e9f0ec;cursor:pointer;}
        .shop-header{display:flex;gap:12px;align-items:center;}
        .shop-logo{width:60px;height:60px;background:#eef2f0;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;}
        .shop-info h3{font-size:16px;}
        .shop-cat{font-size:11px;color:#006233;font-weight:800;}
        .shop-location{font-size:10px;color:#5a6e62;}
        .shop-social{display:flex;gap:12px;margin:12px 0;}
        .shop-social a{color:#006233;font-size:20px;}
        .btn{background:#006233;color:white;border:none;border-radius:60px;padding:8px 16px;font-weight:bold;width:100%;cursor:pointer;}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:200;}
        .modal-card{background:white;width:90%;border-radius:28px;padding:20px;max-height:80vh;overflow-y:auto;}
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e2f26;color:white;padding:8px 16px;border-radius:40px;opacity:0;transition:0.2s;z-index:100;}
        .toast.show{opacity:1;}
        .cart-fab{position:fixed;bottom:80px;right:16px;background:#006233;width:52px;height:52px;border-radius:30px;display:flex;align-items:center;justify-content:center;color:white;font-size:24px;cursor:pointer;}
        .cart-count{position:absolute;top:-5px;right:-5px;background:#b91c1c;color:white;font-size:10px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
        .product-item{border:1px solid #eee;border-radius:16px;padding:12px;margin-bottom:12px;}
        .footer-link{text-align:center;margin:20px 0;padding-bottom:20px;}
        .footer-link a{color:#006233;text-decoration:none;font-weight:bold;margin:0 8px;}
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div><i class="fa-solid fa-bars-staggered" style="font-size:20px;color:#006233;" id="menuBtn"></i></div>
        <div class="brand"><h2>ZaLo</h2><p>(السوق الذكي)</p></div>
        <div><i class="fa-regular fa-user" style="font-size:18px;color:#006233;" id="userIcon"></i></div>
    </div>
    <div class="hero-logo"><i class="fa-solid fa-shop"></i></div>
    <div id="locationScreen" class="location-card">
        <i class="fa-solid fa-location-dot" style="font-size:32px;color:#006233;"></i>
        <h3>اختر موقعك</h3>
        <select id="wilayaSelect"><option value="">-- اختر الولاية --</option></select>
        <select id="baladiaSelect" disabled><option value="">-- اختر البلدية --</option></select>
        <button id="confirmLocationBtn" class="btn">تأكيد الموقع</button>
    </div>
    <div id="shopsList" style="display:none;padding:16px;"></div>
    <div id="productsModal" class="modal"><div class="modal-card"><div id="productsContent"></div><button onclick="closeModal('productsModal')" style="margin-top:12px;">إغلاق</button></div></div>
    <div id="cartModal" class="modal"><div class="modal-card"><h3>سلة الطلبات</h3><div id="cartItems"></div><select id="paymentMethod" style="margin:12px 0;padding:10px;border-radius:60px;"><option value="cod">الدفع عند الاستلام (COD)</option><option value="ccp">تحويل بريدي (CCP) – رفع إيصال</option></select><div id="ccpReceiptDiv" style="display:none;"><input type="file" id="receiptFile" accept="image/*,.pdf"><p style="font-size:12px;">ارفع صورة إيصال التحويل</p></div><button id="checkoutBtn" class="btn">إرسال الطلب</button><button onclick="closeModal('cartModal')" style="margin-top:8px;">إلغاء</button></div></div>
    <div class="footer-link"><a href="./merchant-register.html">➕ تسجيل كتاجر جديد</a> | <a href="./login.html">🔐 تسجيل دخول</a></div>
</div>
<div id="toastMsg" class="toast"></div>
<div class="cart-fab" id="cartFab" style="display:none;"><i class="fa-solid fa-cart-shopping"></i><span id="cartBadge" class="cart-count">0</span></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;
    let allShops = [];
    let cart = JSON.parse(localStorage.getItem('zalo_cart') || '[]');
    let currentLocation = { wilaya: "", baladia: "" };

    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function updateCartBadge() { document.getElementById('cartBadge').innerText = cart.length; }

    const wilayasData = {
        "المنيعة": ["المنيعة","حاسي القارة","حاسي الفحل"], "الجزائر": ["الجزائر الوسطى","سيدي امحمد","القبة"], "وهران": ["وهران الوسطى","بوتليليس","السانية"], "قسنطينة": ["قسنطينة الوسطى","الخروب","زيغود يوسف"], "عنابة": ["عنابة","الحدائق","برحال"]
    };
    const wilayaSelect = document.getElementById('wilayaSelect');
    const baladiaSelect = document.getElementById('baladiaSelect');
    Object.keys(wilayasData).forEach(w => { let opt = document.createElement('option'); opt.value = w; opt.textContent = w; wilayaSelect.appendChild(opt); });
    wilayaSelect.onchange = () => {
        baladiaSelect.disabled = false;
        baladiaSelect.innerHTML = '<option value="">-- اختر البلدية --</option>';
        wilayasData[wilayaSelect.value]?.forEach(b => { let opt = document.createElement('option'); opt.value = b; opt.textContent = b; baladiaSelect.appendChild(opt); });
    };

    async function loadShops() { const snap = await getDocs(collection(db, "shops")); allShops = snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function loadProducts() { const snap = await getDocs(collection(db, "products")); window.allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() })); }

    function renderShopsByLocation() {
        const filtered = allShops.filter(s => s.wilaya === currentLocation.wilaya);
        const container = document.getElementById('shopsList');
        if (filtered.length === 0) { container.innerHTML = '<div class="location-card">لا توجد متاجر في هذا الموقع بعد</div>'; return; }
        container.innerHTML = filtered.map(shop => `
            <div class="shop-card" onclick="viewShopProducts('${shop.id}')">
                <div class="shop-header">
                    <div class="shop-logo">🏪</div>
                    <div class="shop-info">
                        <h3>${shop.name}</h3>
                        <div class="shop-cat">متجر عام</div>
                        <div class="shop-location">📍 ${shop.wilaya}</div>
                    </div>
                </div>
                <div class="shop-social">
                    <a href="${shop.whatsapp || '#'}" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="${shop.facebook || '#'}" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                </div>
            </div>
        `).join('');
    }

    window.viewShopProducts = async (shopId) => {
        await loadProducts();
        const shopProds = window.allProducts.filter(p => p.shopId === shopId);
        const productsHtml = shopProds.map(p => `
            <div class="product-item">
                <div style="font-size:48px;">📦</div>
                <div><strong>${p.name}</strong></div>
                <div>${p.price} دج</div>
                <button class="btn" onclick="addToCart('${p.id}', '${p.name}', ${p.price})">➕ أضف إلى السلة</button>
            </div>
        `).join('');
        document.getElementById('productsContent').innerHTML = `<h3>منتجات المتجر</h3>${productsHtml || '<p>لا توجد منتجات</p>'}`;
        document.getElementById('productsModal').style.display = 'flex';
    };

    window.addToCart = (id, name, price) => {
        cart.push({ id, name, price });
        localStorage.setItem('zalo_cart', JSON.stringify(cart));
        updateCartBadge();
        showToast(`تم إضافة ${name} إلى السلة`);
    };

    function showCart() {
        const cartContainer = document.getElementById('cartItems');
        if (cart.length === 0) { cartContainer.innerHTML = '<p>السلة فارغة</p>'; }
        else {
            let total = 0;
            let itemsHtml = '';
            cart.forEach((item, idx) => {
                total += item.price;
                itemsHtml += `<div style="display:flex; justify-content:space-between;"><span>${item.name}</span><span>${item.price} دج</span><button onclick="removeFromCart(${idx})">❌</button></div>`;
            });
            itemsHtml += `<div><strong>الإجمالي: ${total} دج</strong></div>`;
            cartContainer.innerHTML = itemsHtml;
        }
        document.getElementById('cartModal').style.display = 'flex';
    }
    window.removeFromCart = (idx) => { cart.splice(idx,1); localStorage.setItem('zalo_cart', JSON.stringify(cart)); updateCartBadge(); showCart(); };
    window.checkout = async () => {
        if (!currentUser) { showToast("الرجاء تسجيل الدخول أولاً"); return; }
        if (cart.length === 0) { showToast("السلة فارغة"); return; }
        for (let item of cart) {
            await addDoc(collection(db, "orders"), {
                productId: item.id, productName: item.name, total: item.price,
                customerId: currentUser.uid, customerEmail: currentUser.email,
                status: "pending", createdAt: new Date()
            });
        }
        showToast("تم إرسال طلبك");
        cart = []; localStorage.setItem('zalo_cart', JSON.stringify(cart)); updateCartBadge(); closeModal('cartModal');
    };
    document.getElementById('checkoutBtn').onclick = checkout;
    document.getElementById('cartFab').onclick = showCart;

    document.getElementById('confirmLocationBtn').onclick = async () => {
        const wilaya = wilayaSelect.value, baladia = baladiaSelect.value;
        if (!wilaya || !baladia) { showToast("اختر الولاية والبلدية"); return; }
        currentLocation = { wilaya, baladia };
        await loadShops();
        renderShopsByLocation();
        document.getElementById('locationScreen').style.display = 'none';
        document.getElementById('shopsList').style.display = 'block';
        document.getElementById('cartFab').style.display = 'flex';
    };

    onAuthStateChanged(auth, (user) => { currentUser = user; });
    updateCartBadge();
    document.getElementById('userIcon').onclick = () => { if(currentUser) showToast("مرحباً "+currentUser.email); else window.location.href='./login.html'; };
    document.getElementById('menuBtn').onclick = () => window.location.href='./merchant-register.html';
</script>
</body>
</html>
