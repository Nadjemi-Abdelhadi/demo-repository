<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | السوق الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 32px; padding: 24px; max-width: 400px; width: 100%; margin: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); text-align: center; }
        .btn { background: #006233; color: white; border: none; padding: 12px; border-radius: 60px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 12px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1.5px solid #e2e8e4; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
        .toast.show { opacity: 1; }
        .user-info { background: #eef2f0; padding: 12px; border-radius: 20px; margin: 12px 0; }
        .error { color: red; margin-top: 12px; font-size: 14px; }
    </style>
</head>
<body>
<div>
    <div id="loginBox" class="card">
        <i class="fa-solid fa-shop" style="font-size: 48px; color: #006233; margin-bottom: 12px;"></i>
        <h1>ZaLo</h1>
        <p style="color: #006233;">منصة جزائرية متكاملة</p>
        <input type="email" id="email" placeholder="البريد الإلكتروني" value="hadi47hadi58@gmail.com">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn" id="loginBtn">دخول</button>
        <button class="btn" id="registerBtn" style="background: white; color: #006233; border: 1px solid #006233;">إنشاء حساب</button>
        <div id="errorMsg" class="error"></div>
    </div>

    <div id="appBox" class="card" style="display: none;">
        <h2>مرحباً 👋</h2>
        <div id="userEmail" class="user-info"></div>
        <button class="btn" id="logoutBtn">تسجيل خروج</button>
        <p style="margin-top: 16px; font-size: 14px; color: #006233;">✅ تم تسجيل الدخول بنجاح. الآن يمكن إضافة باقي الواجهات (المتاجر، لوحة التاجر، الإدارة) فوق هذا الأساس.</p>
    </div>
</div>
<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('appBox').style.display = 'block';
            document.getElementById('userEmail').innerHTML = `<i class="fa-regular fa-envelope"></i> ${user.email}`;
        } else {
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('appBox').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        if (!email || !pass) { errorDiv.innerText = "أدخل البريد وكلمة المرور"; return; }
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            errorDiv.innerText = "";
            showToast("✅ تم الدخول");
        } catch (e) {
            errorDiv.innerText = e.message.includes('user-not-found') ? "مستخدم غير موجود" : (e.message.includes('wrong-password') ? "كلمة مرور خاطئة" : e.message);
        }
    };

    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        if (!email || !pass || pass.length < 6) { errorDiv.innerText = "كلمة المرور يجب أن تكون 6 أحرف على الأقل"; return; }
        try {
            await createUserWithEmailAndPassword(auth, email, pass);
            errorDiv.innerText = "";
            showToast("✅ تم إنشاء الحساب");
        } catch (e) {
            errorDiv.innerText = e.message.includes('email-already-in-use') ? "البريد مستخدم بالفعل" : e.message;
        }
    };

    document.getElementById('logoutBtn').onclick = async () => {
        await signOut(auth);
        showToast("تم الخروج");
    };
</script>
</body>
</html>
