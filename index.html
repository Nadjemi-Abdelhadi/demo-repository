<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | التشغيل النهائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 16px; }
        .container { max-width: 500px; width: 100%; margin: auto; }
        .card { background: white; border-radius: 32px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1.5px solid #e2e8e4; }
        .btn { background: #006233; color: white; border: none; padding: 12px; border-radius: 60px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 12px; }
        .btn-outline { background: white; border: 1px solid #006233; color: #006233; margin-top: 8px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
        .toast.show { opacity: 1; }
        .dashboard { background: white; border-radius: 32px; padding: 24px; margin-top: 16px; }
        .dashboard h3 { color: #006233; margin-bottom: 12px; }
        .user-info { background: #eef2f0; padding: 12px; border-radius: 20px; margin: 12px 0; }
    </style>
</head>
<body>
<div class="container">
    <!-- شاشة الدخول -->
    <div id="loginSection" class="card">
        <i class="fa-solid fa-shop" style="font-size: 48px; color: #006233; margin-bottom: 12px;"></i>
        <h1>ZaLo الذكي</h1>
        <p style="color: #006233; margin-bottom: 20px;">منصة جزائرية متكاملة</p>
        <input type="email" id="email" placeholder="البريد الإلكتروني" value="hadi47hadi58@gmail.com">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn" id="loginBtn">دخول</button>
        <button class="btn btn-outline" id="registerBtn">إنشاء حساب جديد</button>
        <div id="loginMessage" style="margin-top: 12px; font-size: 14px; color: #b91c1c;"></div>
    </div>

    <!-- شاشة التطبيق بعد الدخول -->
    <div id="appSection" style="display: none;">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <i class="fa-solid fa-bars-staggered" style="font-size: 22px; color: #006233;"></i>
            <h2>ZaLo</h2>
            <i class="fa-regular fa-bell" style="font-size: 20px; color: #006233;"></i>
        </div>
        <div class="dashboard">
            <h3>مرحباً بك 👋</h3>
            <div class="user-info" id="userEmailDisplay"></div>
            <button class="btn" id="logoutBtn">تسجيل خروج</button>
        </div>
        <div class="dashboard" style="margin-top: 16px;">
            <h3>📊 إحصائيات سريعة</h3>
            <p>المتاجر: 0 | المنتجات: 0</p>
            <p>هذه النسخة الأساسية تعمل 100%، ويمكن إضافة باقي الميزات (لوحة التاجر، المدير، المتاجر) فوق هذا الهيكل.</p>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // 🔐 نفس الإعدادات التي نجحت مع test.html
    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showToast(msg) {
        const t = document.getElementById('toastMsg');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // التحقق من حالة المستخدم (هذا هو القلب الذي كان به الخلل)
    onAuthStateChanged(auth, async (user) => {
        console.log("onAuthStateChanged triggered, user:", user);
        if (user) {
            // مستخدم مسجل دخول
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('userEmailDisplay').innerHTML = `<i class="fa-regular fa-envelope"></i> ${user.email}`;
            
            // التأكد من وجود وثيقة المستخدم في Firestore (للدور لاحقاً)
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                await setDoc(userRef, { email: user.email, role: "customer", createdAt: new Date() });
                console.log("تم إنشاء وثيقة مستخدم جديدة");
            }
            showToast("✅ تم تسجيل الدخول بنجاح");
        } else {
            // لا يوجد مستخدم
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('appSection').style.display = 'none';
        }
    });

    // زر تسجيل الدخول
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const msgDiv = document.getElementById('loginMessage');
        if (!email || !pass) {
            msgDiv.innerText = "✏️ أدخل البريد وكلمة المرور";
            return;
        }
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            msgDiv.innerText = "";
            showToast("جاري التحويل...");
        } catch (error) {
            let errorMsg = error.message;
            if (errorMsg.includes('user-not-found')) errorMsg = "المستخدم غير موجود";
            else if (errorMsg.includes('wrong-password')) errorMsg = "كلمة مرور خاطئة";
            msgDiv.innerText = "❌ " + errorMsg;
        }
    };

    // زر إنشاء حساب
    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const msgDiv = document.getElementById('loginMessage');
        if (!email || !pass) {
            msgDiv.innerText = "✏️ أدخل البريد وكلمة المرور";
            return;
        }
        if (pass.length < 6) {
            msgDiv.innerText = "كلمة المرور يجب أن تكون 6 أحرف على الأقل";
            return;
        }
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            // إنشاء وثيقة في Firestore
            await setDoc(doc(db, "users", userCred.user.uid), { email, role: "customer", createdAt: new Date() });
            msgDiv.innerText = "";
            showToast("✅ تم إنشاء الحساب وتسجيل الدخول");
        } catch (error) {
            let errorMsg = error.message;
            if (errorMsg.includes('email-already-in-use')) errorMsg = "البريد مستخدم بالفعل";
            msgDiv.innerText = "❌ " + errorMsg;
        }
    };

    // زر تسجيل الخروج
    document.getElementById('logoutBtn').onclick = async () => {
        await signOut(auth);
        showToast("تم تسجيل الخروج");
    };
</script>
</body>
</html>
