<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo - دليل المنيعة الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }
        .shop-card {
            border: 1.5px solid #f1f5f9;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            background: white;
            transition: all 0.3s ease;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <header class="bg-white/95 backdrop-blur-md sticky top-0 z-[100] border-b border-slate-100 px-4 h-16 shadow-sm">
        <div class="max-w-5xl mx-auto h-full flex items-center justify-between relative">
            
            <div class="flex items-center gap-2 z-10">
                <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-blue-200">Z</div>
            </div>

            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="text-center">
                    <h1 class="font-black text-base text-slate-900 tracking-tight leading-tight">دليل المنيعة</h1>
                    <span class="text-[7px] text-blue-500 font-bold tracking-[0.3em] uppercase block">ZaLo Digital Guide</span>
                </div>
            </div>

            <div class="flex items-center gap-2 z-10">
                <button class="w-8 h-8 flex items-center justify-center rounded-full text-slate-400 hover:bg-slate-50">
                    <i class="fa-solid fa-gear text-sm"></i>
                </button>
                <button class="flex items-center gap-1.5 bg-slate-900 text-white px-3 py-1.5 rounded-full text-[10px] font-bold shadow-sm active:scale-95 transition-transform">
                    <i class="fa-solid fa-circle-user text-xs"></i>
                    <span>دخول</span>
                </button>
            </div>
        </div>
    </header>

    <main id="app" class="max-w-xl mx-auto p-5 min-h-screen">
        <div class="flex flex-col items-center justify-center py-32 space-y-4">
            <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-slate-400 font-medium text-sm">جاري جلب بيانات سوق المنيعة...</p>
        </div>
    </main>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1EPSEZ5DggKehKWidD8Q52jTEsfPWf7RD5xqyWN2Gt4Q/export?format=csv';

        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);

                const products = rows.map(row => {
                    const cols = row.split(',');
                    return {
                        shop: cols[0]?.trim(),
                        name: cols[1]?.trim(),
                        price: cols[2]?.trim(),
                        desc: cols[3]?.trim(),
                        img: cols[4]?.trim()
                    };
                }).filter(p => p.name);

                render(products);
            } catch (e) {
                document.getElementById('app').innerHTML = '<div class="text-center py-20 text-red-400 font-bold">عذراً، تعذر جلب البيانات. تأكد من إعدادات مشاركة الجدول.</div>';
            }
        }

        function render(data) {
            const shops = [...new Set(data.map(p => p.shop))];
            let html = '<div class="space-y-6">';

            shops.forEach(shop => {
                const shopProds = data.filter(p => p.shop === shop);
                html += `
                    <div class="shop-card animate-fade">
                        <div class="flex justify-between items-center mb-5">
                            <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                                <span class="w-1.5 h-5 bg-blue-600 rounded-full"></span> ${shop}
                            </h2>
                            <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md uppercase">نشط الآن</span>
                        </div>
                        <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                            ${shopProds.map(p => `
                                <div class="flex-shrink-0 w-40 bg-[#fdfdfd] border border-slate-100 rounded-2xl p-3 shadow-sm">
                                    <div class="w-full h-24 bg-slate-100 rounded-xl mb-3 flex items-center justify-center overflow-hidden">
                                        ${p.img && p.img.startsWith('http') ? `<img src="${p.img}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-camera text-slate-300 text-xl"></i>`}
                                    </div>
                                    <h3 class="text-xs font-black text-slate-900 truncate">${p.name}</h3>
                                    <p class="text-[9px] text-slate-400 mt-1 h-6 overflow-hidden">${p.desc || ''}</p>
                                    <div class="flex justify-between items-center mt-3">
                                        <span class="text-blue-600 font-black text-xs">${p.price}</span>
                                        <div class="w-6 h-6 bg-white border border-slate-100 rounded-lg flex items-center justify-center shadow-sm">
                                            <i class="fa-solid fa-plus text-[8px] text-slate-400"></i>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });

            document.getElementById('app').innerHTML = html + '</div>';
        }

        loadData();
    </script>
</body>
</html>
