<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo - دليل محلات المنيعة</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* تنسيق بسيط باللون الأبيض الناصع الذي تفضله */
        body { font-family: Arial, sans-serif; background-color: #ffffff; color: #333; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid #f0f0f0; }
        .shops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .shop-card { border: 1px solid #eee; border-radius: 10px; padding: 15px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .shop-card img { max-width: 100%; height: 80px; object-fit: contain; margin-bottom: 10px; }
        .shop-name { font-weight: bold; font-size: 1.1em; color: #000; }
        .shop-baladiya { font-size: 0.9em; color: #777; }
    </style>
</head>
<body>

    <div class="header">
        <h1>محلات المنيعة</h1>
        <p>اكتشف واطلب من أفضل المحلات في منطقتك</p>
    </div>

    <div id="shops-container" class="shops-grid">
        <p>جاري تحميل المحلات...</p>
    </div>

    <script type="module" src="js/app.js"></script>

</body>
</html>
