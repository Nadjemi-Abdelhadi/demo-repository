<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo Smart Guide | دليل المنيعة الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #ffffff; color: #0f172a; overflow-x: hidden; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #f1f5f9; }
        .sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); shadow: 20px 0 50px rgba(0,0,0,0.1); }
        .category-card { transition: all 0.3s ease; border: 1px solid #f8fafc; }
        .category-card:active { transform: scale(0.95); }
        .ai-float-btn { animation: hover 3s infinite ease-in-out; }
        @keyframes hover { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-in { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div id="sidebar" class="sidebar fixed top-0 right-0 h-full w-72 bg-white z-[200] transform translate-x-full shadow-2xl">
        <div class="p-6">
            <div class="flex justify-between items-center mb-10">
                <img src="https://raw.githubusercontent.com/Nadjemi-Abdelhadi/demo-repository/main/1000045432.png" class="w-10 h-10 object-contain" alt="Logo">
                <button onclick="toggleSidebar()" class="text-slate-400"><i class="fas fa-times text-xl"></i></button>
            </div>
            <nav class="space-y-6">
                <a href="#" class="flex items-center gap-4 text-slate-700 font-bold hover:text-blue-600 transition-colors">
                    <i class="fas fa-th-large w-6"></i> اللوحة الرئيسية
                </a>
                <a href="#" class="flex items-center gap-4 text-slate-700 font-bold hover:text-blue-600 transition-colors">
                    <i class="fas fa-plus-circle w-6"></i> أضف محلك التجاري
                </a>
                <a href="#" class="flex items-center gap-4 text-slate-700 font-bold hover:text-blue-600 transition-colors">
                    <i class="fas fa-headset w-6"></i> اتصل بنا
                </a>
                <div class="pt-6 border-t border-slate-100">
                    <p class="text-[10px] text-slate-400 font-medium">إصدار التطبيق 2.0.0</p>
                </div>
            </nav>
        </div>
    </div>

    <header class="glass-effect sticky top-0 z-[100] px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center text-slate-700">
                <i class="fas fa-bars-staggered text-xl"></i>
            </button>
            <div id="mainLogo" class="flex items-center gap-2">
                <img src="https://raw.githubusercontent.com/Nadjemi-Abdelhadi/demo-repository/main/1000045432.png" class="w-9 h-9 object-contain" alt="ZaLo">
                <h1 class="font-black text-slate-900 text-sm tracking-tighter">ZaLo <span class="text-blue-600">Smart</span></h1>
            </div>
            <button onclick="goBack()" id="backBtn" class="hidden w-10 h-10 items-center justify-center bg-slate-50 rounded-full text-slate-600">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
        <div class="flex items-center gap-3">
            <button class="w-10 h-10 flex items-center justify-center text-slate-400"><i class="fas fa-bell"></i></button>
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs font-bold shadow-lg shadow-blue-100">A</div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 min-h-screen pb-32">
        
        <div id="view-home" class="animate-in">
            <div class="relative mb-8">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="text" placeholder="ابحث عن محل، منتج، أو خدمة..." class="w-full bg-slate-50 border-none rounded-2xl py-4 pr-12 pl-4 text-xs font-medium focus:ring-2 focus:ring-blue-100 transition-all">
            </div>

            <h2 class="text-2xl font-black text-slate-900 mb-6 leading-tight">استكشف <br><span class="text-blue-600">مدينة المنيعة</span></h2>

            <div class="grid grid-cols-2 gap-4">
                <div onclick="showCategory('electronics')" class="category-card bg-white p-6 rounded-[35px] shadow-sm text-center cursor-pointer">
                    <div class="bg-blue-50 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 text-blue-600 text-xl"><i class="fas fa-mobile-screen"></i></div>
                    <span class="font-bold text-slate-700 text-[10px]">الهواتف والإلكترونيات</span>
                </div>
                <div class="category-card bg-white p-6 rounded-[35px] shadow-sm text-center opacity-40 grayscale cursor-not-allowed">
                    <div class="bg-orange-50 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 text-orange-600 text-xl"><i class="fas fa-utensils"></i></div>
                    <span class="font-bold text-slate-700 text-[10px]">المطاعم والمقاهي</span>
                </div>
                <div class="category-card bg-white p-6 rounded-[35px] shadow-sm text-center opacity-40 grayscale cursor-not-allowed">
                    <div class="bg-red-50 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 text-red-600 text-xl"><i class="fas fa-car-side"></i></div>
                    <span class="font-bold text-slate-700 text-[10px]">قطع غيار السيارات</span>
                </div>
                <div class="category-card bg-white p-6 rounded-[35px] shadow-sm text-center opacity-40 grayscale cursor-not-allowed">
                    <div class="bg-purple-50 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 text-purple-600 text-xl"><i class="fas fa-tshirt"></i></div>
                    <span class="font-bold text-slate-700 text-[10px]">الملابس والموضة</span>
                </div>
                <div class="category-card bg-white p-6 rounded-[35px] shadow-sm text-center opacity-40 grayscale cursor-not-allowed">
                    <div class="bg-yellow-50 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 text-yellow-600 text-xl"><i class="fas fa-hammer"></i></div>
                    <span class="font-bold text-slate-700 text-[10px]">مواد البناء</span>
                </div>
                <div class="category-card bg-white p-6 rounded-[35px] shadow-sm text-center opacity-40 grayscale cursor-not-allowed">
                    <div class="bg-teal-50 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 text-teal-600 text-xl"><i class="fas fa-tools"></i></div>
                    <span class="font-bold text-slate-700 text-[10px]">الخدمات والمهن</span>
                </div>
                <div class="category-card bg-white p-6 rounded-[35px] shadow-sm text-center opacity-40 grayscale cursor-not-allowed">
                    <div class="bg-pink-50 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 text-pink-600 text-xl"><i class="fas fa-heart-pulse"></i></div>
                    <span class="font-bold text-slate-700 text-[10px]">الصحة والجمال</span>
                </div>
                <div class="category-card bg-white p-6 rounded-[35px] shadow-sm text-center opacity-40 grayscale cursor-not-allowed">
                    <div class="bg-green-50 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 text-green-600 text-xl"><i class="fas fa-basket-shopping"></i></div>
                    <span class="font-bold text-slate-700 text-[10px]">سوبر ماركت</span>
                </div>
            </div>
        </div>

        <div id="view-shops" class="hidden animate-in">
            <h3 class="text-sm font-black text-slate-900 mb-8 flex items-center gap-2 px-1">
                <span class="w-1.5 h-4 bg-blue-600 rounded-full"></span> المتاجر المتوفرة
            </h3>
            <div id="shopsList" class="space-y-4"></div>
        </div>

        <div id="view-products" class="hidden animate-in">
            <div id="shopBanner" class="bg-slate-900 rounded-[40px] p-8 text-center text-white mb-10 relative overflow-hidden shadow-2xl shadow-blue-100">
                </div>
            <div id="productsGrid" class="grid grid-cols-2 gap-4"></div>
        </div>

    </main>

    <button class="ai-float-btn fixed bottom-8 left-8 w-14 h-14 bg-blue-600 rounded-2xl shadow-2xl shadow-blue-200 flex items-center justify-center text-white text-xl z-[150] border-4 border-white">
        <i class="fas fa-robot"></i>
    </button>

    <script>
        const SHEET_ID = '1EPSEZ5DggKehKWidD8Q52jTEsfPWf7RD5xqyWN2Gt4Q';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
        let allData = [];

        async function syncZaLo() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                allData = json.table.rows.map(row => {
                    // منطق تجاوز التاريخ: إذا كان العمود الأول تاريخ، نسحب من العمود الثاني
                    const firstCell = row.c[0]?.v;
                    const shift = (firstCell && firstCell.toString().includes('/')) ? 1 : 0;
                    
                    return {
                        shop: row.c[0 + shift]?.v,
                        item: row.c[1 + shift]?.v,
                        price: row.c[2 + shift]?.v,
                        img: row.c[4 + shift]?.v || ''
                    };
                }).filter(d => d.shop && d.shop !== "اسم المحل" && isNaN(Date.parse(d.shop)));
                console.log("ZaLo Engine: Ready");
            } catch (e) { console.error("Sync Failed"); }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('translate-x-full');
        }

        function showCategory(cat) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-shops').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('hidden');
            document.getElementById('mainLogo').classList.add('hidden');
            
            const list = document.getElementById('shopsList');
            const uniqueShops = [...new Set(allData.map(d => d.shop))];
            
            list.innerHTML = uniqueShops.map(name => `
                <div onclick="openShop('${name}')" class="bg-white p-6 rounded-3xl border border-slate-50 flex items-center justify-between shadow-sm hover:bg-slate-50 transition-all cursor-pointer">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-800 text-lg shadow-inner"><i class="fas fa-shop"></i></div>
                        <div>
                            <p class="font-black text-slate-900 text-xs">${name}</p>
                            <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest mt-1">متجر موثق</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-left text-slate-200 text-xs"></i>
                </div>
            `).join('');
        }

        function openShop(name) {
            document.getElementById('view-shops').classList.add('hidden');
            document.getElementById('view-products').classList.remove('hidden');
            
            const banner = document.getElementById('shopBanner');
            banner.innerHTML = `
                <div class="bg-blue-500/20 inline-block px-4 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest mb-4">نشط حالياً</div>
                <h2 class="text-2xl font-black mb-2">${name}</h2>
                <p class="text-slate-400 text-[10px] mb-8 font-medium">المنيعة • أفضل الأسعار والخدمات</p>
                <a href="https://wa.me/213696795160" class="flex items-center gap-3 bg-white text-slate-900 py-4 px-8 rounded-2xl font-black text-xs justify-center shadow-xl active:scale-95 transition-all">
                    <i class="fab fa-whatsapp text-xl text-green-500"></i> اطلب الآن عبر واتساب
                </a>
            `;

            const grid = document.getElementById('productsGrid');
            const items = allData.filter(d => d.shop === name);
            grid.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded-[35px] border border-slate-50 shadow-sm animate-in">
                    <div class="aspect-square bg-slate-50 rounded-[28px] mb-4 overflow-hidden flex items-center justify-center shadow-inner">
                        <img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/200?text=ZaLo'">
                    </div>
                    <div class="px-2 text-center">
                        <h4 class="font-bold text-slate-800 text-[10px] mb-2 h-7 overflow-hidden leading-tight">${p.item}</h4>
                        <div class="text-blue-600 font-black text-xs">${p.price}</div>
                    </div>
                </div>
            `).join('');
        }

        function goBack() {
            const vShops = document.getElementById('view-shops');
            const vProducts = document.getElementById('view-products');
            if (!vProducts.classList.contains('hidden')) {
                vProducts.classList.add('hidden');
                vShops.classList.remove('hidden');
            } else {
                vShops.classList.add('hidden');
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('backBtn').classList.add('hidden');
                document.getElementById('mainLogo').classList.remove('hidden');
            }
        }

        syncZaLo();
    </script>
</body>
                                                                                                                                              </html>
