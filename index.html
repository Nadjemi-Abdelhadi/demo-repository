<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل المنيعة الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .sidebar { transition: transform 0.3s ease-in-out; }
        .ai-glow { animation: glow 2s infinite; border: 2px solid #3b82f6; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px #3b82f6; } 50% { box-shadow: 0 0 20px #3b82f6; } }
    </style>
</head>
<body>

    <script>
        // 🛠️ قسم الإعدادات (هذا ما سنعدله دائماً داخل GitHub)
        const CONFIG = {
            appName: "دليل المنيعة",
            welcomeTitle: "ماذا تبحث عنه اليوم؟",
            socialLinks: {
                facebook: "https://facebook.com/nadjemi",
                whatsapp: "https://wa.me/213660000000"
            },
            // قائمة الأقسام والمحلات
            categories: [
                { 
                    id: "parts", 
                    name: "قطع غيار السيارات", 
                    icon: "🚗", 
                    shops: [
                        { name: "أولاد حيمودة", desc: "قطع غيار أصلية - المنيعة", phone: "0660000000" },
                        { name: "محل ميمي", desc: "دراجات نارية واكسسوارات", phone: "0770000000" }
                    ]
                },
                { id: "clothes", name: "الملابس والموضة", icon: "👕", shops: [] },
                { id: "tech", name: "الهواتف والإلكترونيات", icon: "📱", shops: [] }
            ]
        };
    </script>
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 p-4">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="1778188155294.png" alt="ZaLo" class="h-10 w-10 object-contain rounded-full border border-slate-100">
                <div class="flex flex-col">
                    <span id="navTitle" class="font-black text-slate-900 text-sm leading-none">دليل المنيعة</span>
                    <span class="text-[9px] text-slate-400 font-bold tracking-widest uppercase">Shopping Guide</span>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="p-2 bg-slate-50 rounded-xl text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
    </header>

    <section class="max-w-xl mx-auto p-6 bg-white">
        <h1 class="text-2xl font-black text-slate-900 mb-1 tracking-tight">أفضل العروض في المنيعة</h1>
        <p class="text-slate-400 text-xs mb-6">ابحث عن المنتجات والمحلات بكل سهولة</p>
        
        <div class="relative">
            <input type="text" placeholder="ابحث عن قطع غيار، ملابس، أو هواتف..." 
                   class="w-full p-4 pr-12 bg-slate-100 border-none rounded-2xl text-sm outline-none focus:ring-2 focus:ring-slate-200 transition-all">
            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                🔍
            </div>
        </div>
    </section>
    
            
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-[10px] font-bold text-blue-600">US</div>
        </div>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 right-0 z-50 w-72 bg-white shadow-2xl transform translate-x-full sidebar flex flex-col p-6">
        <div class="flex justify-between items-center mb-10">
            <span class="font-black text-xl text-blue-600">القائمة</span>
            <button onclick="toggleSidebar()" class="text-slate-300 text-2xl">&times;</button>
        </div>
        <nav class="space-y-3 flex-1">
            <button onclick="renderHome()" class="w-full text-right p-4 bg-blue-50 text-blue-700 rounded-2xl font-bold italic">🏠 الرئيسية</button>
            <button onclick="startAI()" class="ai-glow w-full flex items-center justify-between p-4 bg-blue-600 text-white rounded-2xl font-black mt-10">
                <span>🤖 اسأل ذكاء ZaLo</span>
            </button>
        </nav>
        <div class="border-t pt-4 flex justify-around">
            <a id="fb" href="#" class="font-bold text-blue-600">Facebook</a>
            <a id="wa" href="#" class="font-bold text-green-600">WhatsApp</a>
        </div>
    </aside>

    <main id="appContent" class="max-w-xl mx-auto p-4 min-h-screen"></main>

    <script>
        const app = document.getElementById('appContent');
        const side = document.getElementById('sidebar');

        function toggleSidebar() { side.classList.toggle('translate-x-full'); }

        function renderHome() {
            document.getElementById('navTitle').innerText = CONFIG.appName;
            document.getElementById('fb').href = CONFIG.socialLinks.facebook;
            document.getElementById('wa').href = CONFIG.socialLinks.whatsapp;
            
            let html = `<div class="text-center py-10"><h2 class="text-3xl font-black mb-2">${CONFIG.welcomeTitle}</h2></div><div class="grid gap-4">`;
            CONFIG.categories.forEach(cat => {
                html += `
                    <div onclick="renderShops('${cat.id}')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex items-center gap-5 cursor-pointer hover:shadow-md transition-all">
                        <div class="text-4xl">${cat.icon}</div>
                        <div class="flex-1 font-black text-lg">${cat.name}</div>
                        <span class="text-blue-500">←</span>
                    </div>`;
            });
            app.innerHTML = html + `</div>`;
            if(!side.classList.contains('translate-x-full')) toggleSidebar();
        }

        function renderShops(id) {
            const cat = CONFIG.categories.find(c => c.id === id);
            let html = `<button onclick="renderHome()" class="mb-6 text-blue-600 font-bold italic">🔙 عودة</button><h2 class="text-xl font-black mb-6 italic">محلات ${cat.name}:</h2>`;
            if(cat.shops.length === 0) html += `<div class="bg-blue-50 p-10 rounded-[2rem] text-center font-bold">قريباً..</div>`;
            else {
                cat.shops.forEach(s => {
                    html += `<div class="bg-white p-5 rounded-[2rem] border border-slate-50 mb-4 flex justify-between items-center"><div><h4 class="font-black text-slate-800">${s.name}</h4><p class="text-[10px] text-slate-400">${s.desc}</p></div><a href="tel:${s.phone}" class="bg-green-500 text-white p-3 rounded-xl">📞</a></div>`;
                });
            }
            app.innerHTML = html;
        }

        function startAI() {
            alert("مرحباً! أنا ذكاء ZaLo. سأقوم قريباً بالرد على جميع استفساراتك حول المنيعة.");
            toggleSidebar();
        }

        renderHome();
    </script>
</body>
</html>
