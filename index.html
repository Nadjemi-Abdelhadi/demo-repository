<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo AI - المنيعة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <header class="p-6 bg-white shadow-sm flex justify-between items-center text-center">
        <h1 class="text-2xl font-black text-blue-600 w-full">ZaLo AI - المنيعة 🇩🇿</h1>
    </header>

    <main class="max-w-md mx-auto mt-10 p-6 bg-white rounded-2xl shadow-xl border border-gray-100">
        <h2 class="text-xl font-bold mb-2 text-center">تطبيق تحسين صور المنتجات</h2>
        <p class="text-gray-500 text-sm text-center mb-8">ارفع صورة منتجك الآن للحصول على خلفية احترافية</p>
        
        <div class="border-2 border-dashed border-blue-200 bg-blue-50 rounded-xl p-12 text-center transition-all">
            <div class="text-4xl mb-4">📸</div>
            <p class="text-blue-600 font-medium">اضغط هنا لرفع الصورة</p>
        </div>

        <button class="w-full mt-8 bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">
            بدء التحسين التلقائي
        </button>
    </main>
</body>
</html>
