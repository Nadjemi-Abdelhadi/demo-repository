    <!-- ========================================== -->
    <!-- 🔗 المحرك الاحترافي لجلب البيانات (REST API) -->
    <!-- ========================================== -->
    <script>
        // إعدادات التطبيق الأساسية
        const PROJECT_ID = "zalo-smart";
        const BASE_URL = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents`;

        // دالة مساعدة لاستخراج القيم بأمان من سحابة Google
        function getVal(field, type = 'stringValue') {
            return field ? (field[type] || '') : '';
        }

        // المحرك الرئيسي
        async function loadZaloCloudData() {
            const statusEl = document.getElementById('dataStatus');
            
            try {
                if (statusEl) {
                    statusEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span><span>جاري جلب المتاجر والمنتجات...</span>';
                }

                // 1. جلب المتاجر والمنتجات معاً في نفس اللحظة (أقصى سرعة)
                const [shopsRes, productsRes] = await Promise.all([
                    fetch(`${BASE_URL}/shops`),
                    fetch(`${BASE_URL}/products`)
                ]);

                const shopsData = await shopsRes.json();
                const productsData = await productsRes.json();

                const shops = shopsData.documents || [];
                const products = productsData.documents || [];

                const liveData = [];

                // 2. معالجة وتجهيز المتاجر التي لديها منتجات
                products.forEach(prod => {
                    const f = prod.fields || {};
                    const shopIdVal = getVal(f.shopId);
                    
                    // البحث عن صاحب المنتج
                    const parentShop = shops.find(s => s.name.endsWith(`/${shopIdVal}`));
                    const sf = parentShop ? parentShop.fields : {};

                    liveData.push({
                        id: prod.name.split('/').pop(),
                        shop: getVal(sf?.name) || 'متجر عام',
                        item: getVal(f.name),
                        price: getVal(f.price),
                        category: getVal(sf?.category) || 'other',
                        imgUrl: getVal(f.imgUrl),
                        phone: getVal(sf?.phone),
                        address: getVal(sf?.address)
                    });
                });

                // 3. إضافة المتاجر الجديدة التي ليس لها منتجات بعد
                shops.forEach(shop => {
                    const sf = shop.fields || {};
                    const shopId = shop.name.split('/').pop();
                    const hasProducts = liveData.some(item => item.shop === getVal(sf.name));

                    if (!hasProducts) {
                        liveData.push({
                            id: 'shop-' + shopId,
                            shop: getVal(sf.name),
                            item: getVal(sf.name),
                            price: '',
                            category: getVal(sf.category) || 'other',
                            imgUrl: '',
                            phone: getVal(sf.phone),
                            address: getVal(sf.address)
                        });
                    }
                });

                // 4. ضخ البيانات في التطبيق مباشرة
                if (liveData.length > 0) {
                    window.allData = liveData;

                    // تحديث الإحصائيات
                    const statsBox = document.getElementById('statsBox');
                    if (statsBox) {
                        const uniqueCats = new Set(liveData.map(i => i.category));
                        statsBox.innerHTML = `
                            <div class="bg-white/15 rounded-3xl p-3 text-center">
                                <div class="text-xl font-black">${shops.length}</div>
                                <div class="text-[10px] text-blue-100">متجر</div>
                            </div>
                            <div class="bg-white/15 rounded-3xl p-3 text-center">
                                <div class="text-xl font-black">${products.length}</div>
                                <div class="text-[10px] text-blue-100">منتج</div>
                            </div>
                            <div class="bg-white/15 rounded-3xl p-3 text-center">
                                <div class="text-xl font-black">${uniqueCats.size || 1}</div>
                                <div class="text-[10px] text-blue-100">قسم</div>
                            </div>
                        `;
                    }

                    // تحديث واجهة المستخدم
                    if (typeof renderAll === 'function') renderAll();

                    if (statusEl) {
                        statusEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500"></span><span class="font-bold text-emerald-600">متصل بالشبكة الحية ✅</span>';
                    }
                    console.log(`🚀 [ZaLo Engine] Successfully loaded ${liveData.length} live items.`);
                } else {
                    if (statusEl) statusEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-orange-500"></span><span>لا توجد متاجر مسجلة</span>';
                }

            } catch (error) {
                console.error("❌ [ZaLo Engine Failed]:", error);
                if (statusEl) {
                    statusEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span><span class="text-xs text-red-500 font-bold">خطأ في الاتصال، يعمل أوفلاين</span>';
                }
            }
        }

        // تشغيل المحرك فور اكتمال تحميل الصفحة بأمان
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(loadZaloCloudData, 500);
        });
    </script>
</body>
</html>
