<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | السوق الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f5f9f7; direction: rtl; }
        .app-container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; }
        .header { background: white; padding: 12px 16px; border-bottom: 1px solid #eef2f0; display: flex; justify-content: space-between; align-items: center; }
        .brand h2 { font-size: 18px; font-weight: 900; color: #006233; }
        .brand p { font-size: 9px; color: #8ba396; }
        .location-card { background: #f8faf9; border-radius: 28px; padding: 20px; margin: 16px; text-align: center; }
        .location-card select, .location-card button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 60px; border: 1px solid #ddd; }
        .btn { background: #006233; color: white; border: none; border-radius: 60px; padding: 8px 16px; font-weight: bold; width: 100%; cursor: pointer; }
        .footer-link { text-align: center; margin: 20px 0; }
        .footer-link a { color: #006233; text-decoration: none; font-weight: bold; margin: 0 8px; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 100; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div><i class="fa-solid fa-bars-staggered" style="font-size: 20px; color:#006233;"></i></div>
        <div class="brand"><h2>ZaLo</h2><p>السوق الذكي الجزائر</p></div>
        <div><i class="fa-regular fa-user" style="font-size: 18px; color:#006233;" id="userIcon"></i></div>
    </div>

    <div id="locationScreen" class="location-card">
        <i class="fa-solid fa-location-dot" style="font-size: 32px; color: #006233;"></i>
        <h3>اختر موقعك</h3>
        <select id="wilayaSelect"><option value="">-- اختر الولاية --</option></select>
        <select id="baladiaSelect" disabled><option value="">-- اختر البلدية --</option></select>
        <button id="confirmLocationBtn" class="btn">تأكيد الموقع</button>
    </div>

    <div id="shopsList" style="display: none; padding: 16px;"></div>

    <div class="footer-link">
        <a href="./merchant-register.html">➕ تسجيل كتاجر جديد</a> | 
        <a href="./login.html">🔐 تسجيل دخول</a>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allShops = [];
    let currentLocation = { wilaya: "", baladia: "" };

    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

    const wilayasData = {
        "المنيعة": ["المنيعة", "حاسي القارة", "حاسي الفحل"],
        "الجزائر": ["الجزائر الوسطى", "سيدي امحمد", "القبة"],
        "وهران": ["وهران الوسطى", "بوتليليس", "السانية"],
        "قسنطينة": ["قسنطينة الوسطى", "الخروب", "زيغود يوسف"],
        "عنابة": ["عنابة الوسطى", "الحدائق", "برحال"]
    };
    const wilayaSelect = document.getElementById('wilayaSelect');
    const baladiaSelect = document.getElementById('baladiaSelect');
    Object.keys(wilayasData).forEach(w => { let opt = document.createElement('option'); opt.value = w; opt.textContent = w; wilayaSelect.appendChild(opt); });
    wilayaSelect.onchange = () => {
        baladiaSelect.disabled = false;
        baladiaSelect.innerHTML = '<option value="">-- اختر البلدية --</option>';
        wilayasData[wilayaSelect.value]?.forEach(b => { let opt = document.createElement('option'); opt.value = b; opt.textContent = b; baladiaSelect.appendChild(opt); });
    };

    async function loadShops() {
        const snap = await getDocs(collection(db, "shops"));
        allShops = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    function renderShopsByLocation() {
        const filtered = allShops.filter(s => s.wilaya === currentLocation.wilaya && (!currentLocation.baladia || s.baladia === currentLocation.baladia));
        const container = document.getElementById('shopsList');
        if (filtered.length === 0) { container.innerHTML = '<div class="location-card">لا توجد متاجر في هذا الموقع بعد</div>'; return; }
        container.innerHTML = filtered.map(shop => `
            <div class="shop-card" style="background:white; border-radius:24px; padding:16px; margin-bottom:16px; border:1px solid #e9f0ec;">
                <div style="display:flex; gap:12px; align-items:center;">
                    <div style="width:60px; height:60px; background:#eef2f0; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:32px;">${shop.logoEmoji || '🏪'}</div>
                    <div>
                        <h3>${shop.name}</h3>
                        <div style="font-size:11px; color:#006233;">${shop.category || 'متجر عام'}</div>
                        <div style="font-size:10px; color:#5a6e62;"><i class="fa-solid fa-location-dot"></i> ${shop.wilaya} - ${shop.baladia || ''}</div>
                    </div>
                </div>
                <div style="display:flex; gap:12px; margin:12px 0;">
                    <a href="${shop.whatsapp || '#'}" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="${shop.facebook || '#'}" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                    <a href="${shop.tiktok || '#'}" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('confirmLocationBtn').onclick = async () => {
        const wilaya = wilayaSelect.value, baladia = baladiaSelect.value;
        if (!wilaya || !baladia) { showToast("اختر الولاية والبلدية"); return; }
        currentLocation = { wilaya, baladia };
        await loadShops();
        renderShopsByLocation();
        document.getElementById('locationScreen').style.display = 'none';
        document.getElementById('shopsList').style.display = 'block';
    };

    document.getElementById('userIcon').onclick = () => window.location.href = './login.html';
    onAuthStateChanged(auth, (user) => { if(user) showToast("مرحباً "+user.email); });
</script>
</body>
</html>
