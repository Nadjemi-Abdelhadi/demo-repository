<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZaLo Smart - دليل المنيعة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .emerald-gradient { background: linear-gradient(135deg, #006233 0%, #008a47 100%); }
        .animate-fade { animation: fadeUp .35s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white border-b border-slate-100 p-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="goHome()" id="backBtn" class="hidden w-9 h-9 rounded-xl bg-slate-100 flex items-center justify-center text-emerald-700 transition">
                <i class="fa-solid fa-arrow-right"></i>
            </button>
            <img src="./1000045432.png" alt="ZaLo" class="w-10 h-10 object-contain rounded-xl border border-slate-100 bg-white shadow-sm">
            <div>
                <span class="text-[9px] font-black text-emerald-700 tracking-widest uppercase block">ZaLo Smart 🇩🇿</span>
                <h1 class="font-black text-sm text-slate-900 leading-none">دليل المنيعة الرقمي</h1>
            </div>
        </div>
        <div id="dataStatus" class="text-[9px] bg-emerald-50 text-emerald-700 px-2.5 py-1 rounded-full flex items-center gap-1 font-bold border border-emerald-100">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
            <span>متصل</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5">
        
        <!-- 1. واجهة الرئيسية -->
        <div id="view-home" class="animate-fade space-y-6">
            <div class="bg-white border border-slate-100 rounded-2xl p-3.5 flex items-center gap-3 shadow-sm">
                <i class="fa-solid fa-search text-slate-300"></i>
                <input type="text" oninput="searchApp(this.value)" placeholder="ابحث عن أي شيء في المنيعة..." class="w-full bg-transparent outline-none text-xs font-bold text-slate-600">
            </div>

            <div class="emerald-gradient rounded-[32px] p-7 text-white shadow-xl shadow-emerald-100 relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold text-emerald-100 mb-1 uppercase tracking-wider">المنصة الأولى في المنيعة</p>
                    <h2 class="text-2xl font-black leading-tight">كل ما تحتاجه <br> في مكان واحد</h2>
                    <div id="statsBox" class="flex gap-4 mt-6">
                        <!-- Stats via JS -->
                    </div>
                </div>
                <i class="fa-solid fa-mosque absolute -bottom-4 -left-4 text-white/10 text-8xl"></i>
            </div>

            <div>
                <h3 class="font-black text-sm text-slate-800 mb-4 flex items-center gap-2">
                    <span class="w-1 h-4 bg-emerald-600 rounded-full"></span> الأقسام التجارية
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="openCategory('electronics')" class="bg-white p-5 rounded-3xl border border-slate-100 text-right shadow-sm group">
                        <div class="w-11 h-11 bg-emerald-50 text-emerald-700 rounded-2xl flex items-center justify-center text-xl mb-3 group-hover:bg-emerald-600 group-hover:text-white transition"><i class="fa-solid fa-mobile-alt"></i></div>
                        <span class="font-black text-xs text-slate-800">إلكترونيات</span>
                    </button>
                    <button onclick="openCategory('restaurants')" class="bg-white p-5 rounded-3xl border border-slate-100 text-right shadow-sm group">
                        <div class="w-11 h-11 bg-orange-50 text-orange-600 rounded-2xl flex items-center justify-center text-xl mb-3 group-hover:bg-orange-600 group-hover:text-white transition"><i class="fa-solid fa-utensils"></i></div>
                        <span class="font-black text-xs text-slate-800">مطاعم</span>
                    </button>
                    <button onclick="openCategory('cars')" class="bg-white p-5 rounded-3xl border border-slate-100 text-right shadow-sm group">
                        <div class="w-11 h-11 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl mb-3 group-hover:bg-blue-600 group-hover:text-white transition"><i class="fa-solid fa-car"></i></div>
                        <span class="font-black text-xs text-slate-800">قطع غيار</span>
                    </button>
                    <button onclick="openCategory('services')" class="bg-white p-5 rounded-3xl border border-slate-100 text-right shadow-sm group">
                        <div class="w-11 h-11 bg-violet-50 text-violet-600 rounded-2xl flex items-center justify-center text-xl mb-3 group-hover:bg-violet-600 group-hover:text-white transition"><i class="fa-solid fa-tools"></i></div>
                        <span class="font-black text-xs text-slate-800">خدمات</span>
                    </button>
                </div>
            </div>

            <div>
                <h3 class="font-black text-sm text-slate-800 mb-4 flex items-center gap-2">
                    <span class="w-1 h-4 bg-emerald-600 rounded-full"></span> المنتجات المعروضة
                </h3>
                <div id="featuredBox" class="space-y-3"></div>
            </div>
        </div>

        <!-- 2. واجهة صفحة المحل (صفحة الهبوط الجديدة) -->
        <div id="view-shop-profile" class="hidden animate-fade space-y-6">
            <div id="shopProfileHeader"></div>
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h3 class="font-black text-sm text-slate-800">قائمة السلع والخدمات</h3>
                <span id="shopProdCount" class="text-[10px] font-bold text-slate-400 uppercase"></span>
            </div>
            <div id="shopProductsGrid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- 3. واجهة البحث والقوائم -->
        <div id="view-list" class="hidden animate-fade space-y-4">
            <div id="listTitle" class="font-black text-lg text-slate-800 border-r-4 border-emerald-600 pr-3"></div>
            <div id="listBox" class="space-y-3 pt-2"></div>
        </div>

    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 p-3 z-40 max-w-md mx-auto flex justify-around shadow-2xl rounded-t-3xl">
        <button onclick="goHome()" class="flex flex-col items-center gap-1 text-emerald-700 font-bold">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px]">الرئيسية</span>
        </button>
        <button onclick="openCategory('all')" class="flex flex-col items-center gap-1 text-slate-400 font-bold">
            <i class="fa-solid fa-store text-lg"></i>
            <span class="text-[10px]">المتاجر</span>
        </button>
        <a href="./owner.html" class="flex flex-col items-center gap-1 text-slate-400 font-bold">
            <i class="fa-solid fa-user-tag text-lg"></i>
            <span class="text-[10px]">دخول التاجر</span>
        </a>
    </nav>

    <script>
        let allData = [];
        let allShops = [];
        const BASE_URL = `https://firestore.googleapis.com/v1/projects/zalo-smart/databases/(default)/documents`;

        function getVal(f, t='stringValue'){ return f ? (f[t] || '') : ''; }

        async function loadZaloLive() {
            try {
                const [sRes, pRes] = await Promise.all([fetch(`${BASE_URL}/shops`), fetch(`${BASE_URL}/products`)]);
                const sData = await sRes.json(); const pData = await pRes.json();
                allShops = sData.documents || [];
                const products = pData.documents || [];

                allData = products.map(p => {
                    const f = p.fields || {};
                    const sId = getVal(f.shopId);
                    const shop = allShops.find(s => s.name.endsWith('/' + sId));
                    const sf = shop ? shop.fields : {};
                    return {
                        id: p.name.split('/').pop(),
                        shopId: sId,
                        shopName: getVal(sf.name),
                        item: getVal(f.name),
                        price: getVal(f.price),
                        category: getVal(sf.category),
                        phone: getVal(sf.phone),
                        address: getVal(sf.address),
                        img: getVal(f.imgUrl)
                    };
                });

                updateStatsUI();
                renderHome();
                document.getElementById('dataStatus').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span><span>متصل مباشر</span>';
            } catch (e) { 
                console.error(e);
                document.getElementById('dataStatus').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span><span>أوفلاين</span>';
            }
        }

        function updateStatsUI() {
            const stats = document.getElementById('statsBox');
            const cats = new Set(allShops.map(s => getVal(s.fields?.category)));
            stats.innerHTML = `
                <div class="text-center flex-1"><div class="text-xl font-black">${allShops.length}</div><div class="text-[9px] text-emerald-100 font-bold uppercase">متجر</div></div>
                <div class="text-center flex-1 border-x border-white/10"><div class="text-xl font-black">${allData.length}</div><div class="text-[9px] text-emerald-100 font-bold uppercase">منتج</div></div>
                <div class="text-center flex-1"><div class="text-xl font-black">${cats.size}</div><div class="text-[9px] text-emerald-100 font-bold uppercase">قسم</div></div>`;
        }

        function renderHome() {
            const box = document.getElementById('featuredBox');
            box.innerHTML = allData.slice(0, 8).map(i => `
                <div onclick="openShop('${i.shopId}')" class="bg-white p-3 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm cursor-pointer active:scale-95 transition">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600 text-lg">
                            ${i.img ? `<img src="${i.img}" class="w-full h-full object-cover rounded-xl border">` : '<i class="fa-solid fa-box"></i>'}
                        </div>
                        <div>
                            <h4 class="font-black text-xs text-slate-900">${i.item}</h4>
                            <p class="text-[10px] text-emerald-600 font-bold">${i.shopName}</p>
                            <p class="text-emerald-700 font-black text-[11px] mt-1">${i.price}</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-left text-slate-200"></i>
                </div>`).join('');
        }

        function openShop(id) {
            const shop = allShops.find(s => s.name.endsWith('/' + id));
            if(!shop) return;
            const sf = shop.fields;
            const prods = allData.filter(p => p.shopId === id);

            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-shop-profile').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('hidden');

            document.getElementById('shopProfileHeader').innerHTML = `
                <div class="emerald-gradient p-8 rounded-[40px] text-white shadow-xl relative overflow-hidden">
                    <div class="relative z-10">
                        <h2 class="text-3xl font-black mb-2">${getVal(sf.name)}</h2>
                        <p class="text-xs text-emerald-100 font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-location-dot"></i> ${getVal(sf.address)}</p>
                        <div class="flex gap-3">
                            <a href="tel:${getVal(sf.phone)}" class="bg-white text-emerald-700 flex-1 py-3 rounded-2xl text-center font-black text-xs shadow-lg"><i class="fa-solid fa-phone ml-1"></i> إتصل بالمتجر</a>
                            <a href="https://wa.me/213${getVal(sf.phone).replace(/^0/, '')}" target="_blank" class="bg-emerald-500 text-white w-12 rounded-2xl flex items-center justify-center shadow-lg border border-emerald-400"><i class="fa-brands fa-whatsapp text-xl"></i></a>
                        </div>
                    </div>
                </div>`;
            
            document.getElementById('shopProdCount').textContent = prods.length + " مادة متوفرة";
            document.getElementById('shopProductsGrid').innerHTML = prods.map(p => `
                <div class="bg-white p-3 rounded-3xl border border-slate-100 shadow-sm">
                    <div class="w-full aspect-square bg-slate-50 rounded-2xl mb-3 flex items-center justify-center text-slate-300">
                        ${p.img ? `<img src="${p.img}" class="w-full h-full object-cover rounded-2xl">` : '<i class="fa-solid fa-image text-3xl"></i>'}
                    </div>
                    <h4 class="font-black text-[11px] text-slate-800 truncate">${p.item}</h4>
                    <p class="text-emerald-600 font-black text-xs mt-1">${p.price}</p>
                    <a href="https://wa.me/213${p.phone.replace(/^0/,'')}?text=أريد طلب: ${p.item}" class="block w-full mt-3 bg-slate-900 text-white py-2 rounded-xl text-center text-[10px] font-bold">إطلب الآن</a>
                </div>`).join('');
            
            window.scrollTo(0,0);
        }

        function searchApp(v) {
            const q = v.trim().toLowerCase();
            if(!q) return renderHome();
            const filtered = allData.filter(i => i.item.toLowerCase().includes(q) || i.shopName.toLowerCase().includes(q));
            renderFeaturedBox(filtered);
        }

        function openCategory(cat) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-shop-profile').classList.add('hidden');
            document.getElementById('view-list').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('hidden');
            
            const titles = {electronics:"إلكترونيات", restaurants:"مطاعم", cars:"قطع غيار", services:"خدمات", all:"جميع المتاجر"};
            document.getElementById('listTitle').textContent = titles[cat] || "النتائج";
            
            const box = document.getElementById('listBox');
            const filtered = cat === 'all' ? allShops : allShops.filter(s => getVal(s.fields.category) === cat);
            
            box.innerHTML = filtered.map(s => {
                const sf = s.fields;
                const sId = s.name.split('/').pop();
                return `
                <div onclick="openShop('${sId}')" class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-emerald-600 text-2xl font-bold">${getVal(sf.name)[0]}</div>
                        <div>
                            <h4 class="font-black text-sm text-slate-900">${getVal(sf.name)}</h4>
                            <p class="text-[10px] text-slate-400 mt-1">📍 ${getVal(sf.address)}</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-left text-slate-200"></i>
                </div>`;
            }).join('');
        }

        function goHome() {
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-shop-profile').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
            document.getElementById('backBtn').classList.add('hidden');
        }

        window.onload = loadZaloLive;
    </script>
</body>
</html>
