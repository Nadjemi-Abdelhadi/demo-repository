<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | نظام الأدوار</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 16px; }
        .card { background: white; border-radius: 32px; padding: 24px; max-width: 400px; width: 100%; margin: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.05); text-align: center; }
        .btn { background: #006233; color: white; border: none; padding: 12px; border-radius: 60px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 12px; }
        .btn-outline { background: white; border: 1px solid #006233; color: #006233; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1.5px solid #e2e8e4; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
        .toast.show { opacity: 1; }
        .role-badge { background: #eef2ff; padding: 8px 16px; border-radius: 60px; display: inline-block; margin: 12px 0; }
        .error { color: red; margin-top: 8px; }
    </style>
</head>
<body>
<div id="loginBox" class="card">
    <i class="fa-solid fa-shop" style="font-size: 48px; color: #006233; margin-bottom: 12px;"></i>
    <h1>ZaLo</h1>
    <p style="color: #006233;">منصة جزائرية متكاملة</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني" value="hadi47hadi58@gmail.com">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button class="btn" id="loginBtn">دخول</button>
    <button class="btn btn-outline" id="registerBtn">إنشاء حساب جديد</button>
    <div id="errorMsg" class="error"></div>
</div>

<div id="dashboardBox" class="card" style="display: none;">
    <h2 id="welcomeMsg"></h2>
    <div id="roleInfo" class="role-badge"></div>
    <button class="btn" id="logoutBtn">تسجيل خروج</button>
    <a href="./admin.html" style="display:inline-block; margin-top:12px; background:#006233; color:white; padding:6px 16px; border-radius:60px; text-decoration:none;">🔧 الذهاب إلى لوحة الإدارة</a>
    <div style="margin-top: 16px; font-size: 14px; color: #555;" id="extraInfo"></div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function updateUserRole(userId, email, role = "customer") {
        const userRef = doc(db, "users", userId);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) {
            await setDoc(userRef, { email, role, createdAt: new Date() });
        }
        return role;
    }

    async function getUserRole(userId) {
        const userRef = doc(db, "users", userId);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
            return userSnap.data().role || "customer";
        }
        return "customer";
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // تسجيل الدخول ناجح
            const role = await getUserRole(user.uid);
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('dashboardBox').style.display = 'block';
            document.getElementById('welcomeMsg').innerHTML = `مرحباً ${user.email}`;
            document.getElementById('roleInfo').innerHTML = `🔑 دورك: ${role === 'super_admin' ? 'مدير عام' : (role === 'supervisor' ? 'مشرف' : (role === 'merchant' ? 'تاجر' : 'عميل'))}`;
            
            // رسالة إضافية حسب الدور
            let extra = '';
            if (role === 'super_admin') extra = '⭐ يمكنك إدارة المنصة بالكامل من خلال إضافة متاجر ومنتجات في Firestore.';
            else if (role === 'merchant') extra = '🛍️ يمكنك إدارة منتجاتك بعد إضافة متجرك في Firestore.';
            else if (role === 'supervisor') extra = '👁️ يمكنك مراقبة الطلبات والمحتوى.';
            else extra = '🛒 يمكنك تصفح المتاجر والمنتجات (سيتم إضافتها قريباً).';
            document.getElementById('extraInfo').innerText = extra;
        } else {
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('dashboardBox').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        if (!email || !pass) {
            errorDiv.innerText = "أدخل البريد وكلمة المرور";
            return;
        }
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            errorDiv.innerText = "";
            showToast("✅ تم الدخول بنجاح");
        } catch (e) {
            errorDiv.innerText = e.message.includes('user-not-found') ? "مستخدم غير موجود" : (e.message.includes('wrong-password') ? "كلمة مرور خاطئة" : e.message);
        }
    };

    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        if (!email || !pass || pass.length < 6) {
            errorDiv.innerText = "كلمة المرور يجب أن تكون 6 أحرف على الأقل";
            return;
        }
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "users", userCred.user.uid), { email, role: "customer", createdAt: new Date() });
            errorDiv.innerText = "";
            showToast("✅ تم إنشاء الحساب وتسجيل الدخول");
        } catch (e) {
            errorDiv.innerText = e.message.includes('email-already-in-use') ? "البريد مستخدم بالفعل" : e.message;
        }
    };

    document.getElementById('logoutBtn').onclick = async () => {
        await signOut(auth);
        showToast("تم الخروج");
    };
</script>
</body>
</html>
