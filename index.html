<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo Smart - لوحة التاجر والرفع المباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>body{font-family:'Tajawal',sans-serif}</style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20 text-right">

    <div id="loadingScreen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-emerald-600 mb-4"></div>
        <p class="text-xs font-bold text-slate-500">جاري فتح بوابتك التجارية...</p>
    </div>

    <div id="loginView" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white p-8 rounded-[40px] shadow-2xl border border-slate-100 text-center">
            <div class="w-20 h-20 bg-emerald-600 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-lg text-white text-3xl"><i class="fa-solid fa-store"></i></div>
            <h2 class="text-3xl font-black text-slate-900">ZaLo Smart</h2>
            <p class="text-sm text-emerald-600 font-bold mb-6">دخول أصحاب المحلات 🇩🇿</p>
            <form id="loginForm" class="space-y-4">
                <input id="loginEmail" type="email" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border outline-none text-left" required placeholder="إيميل المحل">
                <input id="loginPassword" type="password" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border outline-none text-left" required placeholder="كلمة المرور">
                <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-emerald-200 mt-4 cursor-pointer">فتح الدكان</button>
            </form>
        </div>
    </div>

    <div id="dashboardView" class="hidden max-w-4xl mx-auto p-4 md:p-6 space-y-6 animate-fade">
        <div class="bg-white p-6 rounded-[35px] border border-slate-100 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-2xl font-black shadow-inner"><i class="fa-solid fa-shop"></i></div>
                <div><p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">إدارة متجرك المباشر</p><h1 id="myShopName" class="text-xl font-black text-slate-900">جاري التحميل...</h1></div>
            </div>
            <button id="logoutBtn" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[10px] font-black transition">خروج</button>
        </div>

        <div id="shopManagerArea" class="space-y-6">
            <div class="bg-white p-6 rounded-[40px] border border-slate-100 shadow-sm relative overflow-hidden">
                <h3 class="font-black text-base text-slate-800 mb-5 flex items-center gap-2"><i class="fa-solid fa-plus-circle text-emerald-600"></i> نشر منتج أو فيديو جديد</h3>
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <input id="prodName" type="text" placeholder="اسم المنتج (مثال: وجبة شواء)" class="bg-slate-50 p-4 rounded-2xl text-xs font-bold border-none outline-none">
                        <input id="prodPrice" type="text" placeholder="السعر (مثال: 1200 دج)" class="bg-slate-50 p-4 rounded-2xl text-xs font-bold border-none outline-none">
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div class="bg-emerald-50 p-3 rounded-2xl border border-dashed border-emerald-200">
                             <label class="block text-[9px] font-black text-emerald-600 mb-1">رابط صورة المنتج</label>
                             <input id="prodImg" type="url" placeholder="https://..." class="w-full bg-white p-2 rounded-xl text-[10px] outline-none">
                        </div>
                        <div class="bg-blue-50 p-3 rounded-2xl border border-dashed border-blue-200">
                             <label class="block text-[9px] font-black text-blue-600 mb-1">رابط فيديو (YouTube/TikTok)</label>
                             <input id="prodVideo" type="url" placeholder="رابط الفيديو" class="w-full bg-white p-2 rounded-xl text-[10px] outline-none">
                        </div>
                    </div>

                    <button onclick="addOwnerProduct()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-black text-sm shadow-xl shadow-emerald-200 transition active:scale-[0.98]">نشر في التطبيق الآن</button>
                </div>
            </div>

            <div id="myProductsList" class="space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, doc, deleteDoc, updateDoc, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
            authDomain: "zalo-smart.firebaseapp.com",
            projectId: "zalo-smart",
            storageBucket: "zalo-smart.firebasestorage.app",
            messagingSenderId: "430326151788",
            appId: "1:430326151788:web:e4f94437946221429f3649"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, myShopDoc = null;

        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loadingScreen').classList.add('hidden');
            if (user) { 
                currentUser = user; 
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('dashboardView').classList.remove('hidden');
                await loadMyShopData();
            } else { 
                document.getElementById('dashboardView').classList.add('hidden');
                document.getElementById('loginView').classList.remove('hidden'); 
            }
        });

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); }
            catch (err) { alert("❌ خطأ في بيانات الدخول"); }
        };

        async function loadMyShopData() {
            const q = query(collection(db, 'shops'), where('ownerId', '==', currentUser.uid));
            const snap = await getDocs(q);
            if (snap.empty) { document.getElementById('myShopName').textContent = "بدون متجر مربوط"; return; }
            snap.forEach(d => { myShopDoc = { id: d.id, ...d.data() }; });
            document.getElementById('myShopName').textContent = myShopDoc.name;
            await loadMyProducts();
        }

        async function loadMyProducts() {
            const list = document.getElementById('myProductsList');
            list.innerHTML = '<p class="text-center py-10 animate-pulse text-slate-300 font-bold">جاري تحميل بضاعتك...</p>';
            const q = query(collection(db, 'products'), where('shopId', '==', myShopDoc.id));
            const snap = await getDocs(q);
            if (snap.empty) { list.innerHTML = '<p class="text-center py-10 bg-white rounded-[30px] border border-dashed text-slate-400 font-bold">دكانك فارغ، أضف أول منتج الآن!</p>'; return; }
            let h = '';
            snap.forEach(d => {
                const p = d.data();
                h += `
                <div class="bg-white p-4 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-4 text-right">
                        <img src="${p.imgUrl || 'https://via.placeholder.com/50'}" class="w-14 h-14 rounded-2xl object-cover border border-slate-50">
                        <div>
                            <h4 class="font-black text-slate-800 text-sm">${p.name}</h4>
                            <p class="text-emerald-600 font-black text-xs mt-1">${p.price}</p>
                            ${p.videoUrl ? '<span class="text-[8px] bg-blue-50 text-blue-600 px-2 rounded-full font-bold">يحتوي فيديو</span>' : ''}
                        </div>
                    </div>
                    <button onclick="delProd('${d.id}')" class="text-red-400 hover:text-red-600 p-3"><i class="fa-solid fa-trash-can"></i></button>
                </div>`;
            });
            list.innerHTML = h;
        }

        window.addOwnerProduct = async () => {
            const n=document.getElementById('prodName').value, p=document.getElementById('prodPrice').value, img=document.getElementById('prodImg').value, vid=document.getElementById('prodVideo').value;
            if(!n || !p) return alert("⚠️ اسم المنتج والسعر ضروريان!");
            await addDoc(collection(db,'products'), { shopId: myShopDoc.id, name: n, price: p.includes('دج') ? p : p + ' دج', imgUrl: img, videoUrl: vid, createdAt: serverTimestamp() });
            const newCount = (myShopDoc.productCount || 0) + 1;
            await updateDoc(doc(db, 'shops', myShopDoc.id), { productCount: newCount }); myShopDoc.productCount = newCount;
            document.getElementById('prodName').value=''; document.getElementById('prodPrice').value=''; document.getElementById('prodImg').value=''; document.getElementById('prodVideo').value='';
            await loadMyProducts();
        };

        window.delProd = async (id) => { if(confirm("حذف من العرض؟")){ await deleteDoc(doc(db,'products',id)); await loadMyProducts(); } };
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script> 
    <script src="./js/zalo-commerce.js?v=1"></script>
</body>
    </html>
