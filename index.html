<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | السوق الذكي الجزائر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; padding: 16px; }
        .container { max-width: 450px; margin: auto; background: white; border-radius: 28px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .btn { background: #006233; color: white; border: none; padding: 12px; border-radius: 60px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 12px; cursor: pointer; }
        .btn:active { transform: scale(0.97); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 20px; border: 1.5px solid #e2e8e4; font-family: inherit; }
        .card { background: #f9f9f9; padding: 12px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #eef2f0; }
        .flex { display: flex; justify-content: space-between; align-items: center; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 20px; border-radius: 40px; opacity: 0; transition: 0.2s; font-size: 14px; z-index: 200; }
        .toast.show { opacity: 1; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 450px; margin: auto; background: white; display: flex; justify-content: space-around; padding: 8px 12px 16px; border-top: 1px solid #e0e8e4; }
        .nav-item { text-align: center; color: #8ba396; font-weight: bold; background: none; border: none; cursor: pointer; }
        .nav-item.active { color: #006233; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .view { display: none; animation: fade 0.3s; }
        .view.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal-card { background: white; width: 90%; border-radius: 32px; padding: 24px; max-width: 380px; }
        h2, h3 { font-weight: 900; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- شاشة الدخول -->
    <div id="loginView" class="view active" style="text-align: center;">
        <div style="width: 70px; height: 70px; background: linear-gradient(135deg,#006233,#00a857); border-radius: 28px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center;">
            <i class="fa-solid fa-shop" style="font-size: 34px; color: white;"></i>
        </div>
        <h1>ZaLo الذكي</h1>
        <p style="color: #006233; font-weight: bold;">🇩🇿 منصة جزائرية - دفع عند الاستلام</p>
        <div style="margin-top: 24px;">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button class="btn" id="doLoginBtn">دخول</button>
            <button id="openRegBtn" style="background: none; border: none; color: #006233; margin-top: 12px; font-weight: bold;">إنشاء حساب جديد</button>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="mainView" class="view" style="padding-bottom: 70px;">
        <div class="header">
            <i class="fa-solid fa-bars-staggered" style="font-size: 22px; color:#006233;" onclick="alert('قريباً')"></i>
            <h2>ZaLo سوق ذكي</h2>
            <i class="fa-regular fa-bell" style="font-size: 20px; color:#006233;"></i>
        </div>
        <div id="tabContent"></div>
        <div class="nav">
            <button class="nav-item active" data-tab="home"><i class="fa-solid fa-house"></i><span>الرئيسية</span></button>
            <button class="nav-item" data-tab="shops"><i class="fa-solid fa-store"></i><span>المتاجر</span></button>
            <button class="nav-item" data-tab="explore"><i class="fa-solid fa-magnifying-glass"></i><span>استكشاف</span></button>
            <button class="nav-item" data-tab="profile"><i class="fa-regular fa-user"></i><span>حسابي</span></button>
        </div>
    </div>
</div>

<!-- نافذة التسجيل -->
<div id="regModal" class="modal">
    <div class="modal-card">
        <h3>حساب جديد</h3>
        <input type="text" id="regName" placeholder="الاسم الكامل">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button class="btn" id="doRegBtn">تسجيل</button>
        <button onclick="closeRegModal()" style="background: none; border: none; margin-top: 12px; color: gray;">إلغاء</button>
    </div>
</div>

<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // 🔐 الإعدادات الصحيحة (من مشروع zalo-smart - نسخة صالحة)
    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showToast(msg) {
        const t = document.getElementById('toastMsg');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    let shopsList = [], productsList = [];

    async function loadShops() {
        const snap = await getDocs(collection(db, "shops"));
        shopsList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    async function loadProducts() {
        const snap = await getDocs(collection(db, "products"));
        productsList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    function productCard(p) {
        const shop = shopsList.find(s => s.id === p.storeId);
        return `<div class="card"><div style="font-size:36px;">${p.emoji || '📦'}</div><div><strong>${p.name}</strong></div><div>${p.price.toLocaleString()} دج</div><div style="font-size:12px;color:#006233;">${shop?.name || ''}</div><button class="btn" style="margin-top:8px;" onclick="alert('تم إضافة ${p.name} (تجريبي)')">اطلب</button></div>`;
    }

    async function renderHome() {
        const featured = shopsList.slice(0,3);
        document.getElementById('tabContent').innerHTML = `
            <div style="background:linear-gradient(135deg,#006233,#00a857);color:white;border-radius:24px;padding:20px;margin-bottom:16px;">
                <p>🇩🇿 منصة رقمية ذكية</p>
                <h3>تسوق من أقرب متجر</h3>
                <p>دفع عند الاستلام • توصيل لكل الولايات</p>
                <div class="flex" style="margin-top:12px;"><div><span style="font-weight:900;">${shopsList.length}</span><br>متجر</div><div><span style="font-weight:900;">${productsList.length}</span><br>منتج</div></div>
            </div>
            <div><div style="display:flex;justify-content:space-between;"><strong>🛍️ متاجر موثوقة</strong></div><div id="featuredShops"></div></div>
        `;
        document.getElementById('featuredShops').innerHTML = featured.map(s => `<div class="card" onclick="viewShop('${s.id}')"><div class="flex"><div><i class="fa-solid fa-store"></i> <strong>${s.name}</strong> ⭐${s.rating}<br>📍 ${s.location}</div></div></div>`).join('');
    }

    async function renderShops() {
        let html = '';
        shopsList.forEach(s => {
            html += `<div class="card" onclick="viewShop('${s.id}')"><div class="flex"><div><i class="fa-solid fa-store"></i> <strong>${s.name}</strong> ${s.verified?'✅':''}<br>📍 ${s.location}</div><div>⭐ ${s.rating}</div></div></div>`;
        });
        document.getElementById('tabContent').innerHTML = html;
    }

    async function renderExplore() {
        document.getElementById('tabContent').innerHTML = `<div class="card"><input type="text" id="searchInput" placeholder="ابحث عن منتج..." style="margin-bottom:0;"></div><div id="prodsGrid" class="product-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;"></div>`;
        const grid = document.getElementById('prodsGrid');
        grid.innerHTML = productsList.map(p => productCard(p)).join('');
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            grid.innerHTML = productsList.filter(p => p.name.includes(term)).map(p => productCard(p)).join('');
        });
    }

    function renderProfile() {
        document.getElementById('tabContent').innerHTML = `
            <div class="card" style="text-align:center;">
                <i class="fa-regular fa-circle-user" style="font-size:56px;"></i>
                <h3>${auth.currentUser?.email}</h3>
                <button class="btn" id="logoutBtn">تسجيل خروج</button>
            </div>
        `;
        document.getElementById('logoutBtn')?.addEventListener('click', async () => { await signOut(auth); showToast("تم الخروج"); });
    }

    window.viewShop = async (id) => {
        const shop = shopsList.find(s => s.id === id);
        if(!shop) return;
        const shopProds = productsList.filter(p => p.storeId === id);
        document.getElementById('tabContent').innerHTML = `<button onclick="renderCurrentTab('shops')" style="background:#eef2f0;border:none;padding:8px 16px;border-radius:40px;margin-bottom:12px;"><i class="fa-solid fa-arrow-right"></i> رجوع</button><div class="card"><h2>${shop.name}</h2><p>📍 ${shop.location} | ⭐ ${shop.rating}</p><a href="https://wa.me/${shop.whatsapp}" target="_blank"><button class="btn" style="background:#25D366;"><i class="fa-brands fa-whatsapp"></i> واتساب المتجر</button></a></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">${shopProds.map(p => productCard(p)).join('')}</div>`;
    };

    let currentTab = 'home';
    function renderCurrentTab(tab) {
        currentTab = tab;
        if(tab === 'home') renderHome();
        if(tab === 'shops') renderShops();
        if(tab === 'explore') renderExplore();
        if(tab === 'profile') renderProfile();
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.classList.remove('active');
            if(btn.getAttribute('data-tab') === tab) btn.classList.add('active');
        });
    }
    window.renderCurrentTab = renderCurrentTab;

    // أحداث الأزرار
    document.getElementById('doLoginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        if(!email || !pass) { showToast("املأ البريد وكلمة المرور"); return; }
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            showToast("تم الدخول");
        } catch(e) { showToast("خطأ: "+e.message); }
    };
    document.getElementById('openRegBtn').onclick = () => document.getElementById('regModal').style.display = 'flex';
    window.closeRegModal = () => document.getElementById('regModal').style.display = 'none';
    document.getElementById('doRegBtn').onclick = async () => {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        if(!name || !email || !pass) { showToast("املأ جميع الحقول"); return; }
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "users", userCred.user.uid), { name, email, createdAt: new Date() });
            showToast("تم التسجيل بنجاح");
            closeRegModal();
        } catch(e) { showToast(e.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.getElementById('loginView').classList.remove('active');
            document.getElementById('mainView').classList.add('active');
            await loadShops();
            await loadProducts();
            renderCurrentTab('home');
        } else {
            document.getElementById('loginView').classList.add('active');
            document.getElementById('mainView').classList.remove('active');
        }
    });

    document.querySelectorAll('.nav-item').forEach(btn => btn.onclick = () => renderCurrentTab(btn.getAttribute('data-tab')));
</script>
</body>
    </html>
