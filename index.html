<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZaLo Marketplace الذكي | الجزائر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: #f5f9f7; color: #111B14; overflow-x: hidden; }
        .app-container { max-width: 450px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.05); position: relative; }
        .view { display: none; animation: fadeIn 0.25s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,168,87,0.12); padding: 12px 16px; position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 450px; margin: 0 auto; background: rgba(255,255,255,0.94); backdrop-filter: blur(20px); border-top: 1px solid #e9f0ec; border-radius: 24px 24px 0 0; padding: 8px 16px 14px; display: flex; justify-content: space-around; z-index: 30; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; font-family: 'Tajawal'; font-weight: 800; font-size: 10px; color: #8ba396; cursor: pointer; }
        .nav-item.active { color: #006233; }
        .card { background: white; border-radius: 24px; padding: 14px; box-shadow: 0 8px 24px rgba(0,98,51,0.06); border: 1px solid #eff3f0; }
        .gradient-bg { background: linear-gradient(135deg, #006233, #00a857); color: white; }
        .ai-fab { position: fixed; bottom: 85px; right: 20px; width: 56px; height: 56px; background: linear-gradient(135deg, #00a857, #006233); border-radius: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,98,51,0.4); z-index: 40; cursor: pointer; }
        .ai-fab i { font-size: 26px; color: white; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .btn-primary { background: #006233; color: white; border: none; border-radius: 50px; padding: 8px 16px; font-weight: 800; cursor: pointer; }
        .section-header { display: flex; justify-content: space-between; align-items: baseline; margin: 16px 0 12px; font-weight: 800; font-size: 18px; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2e26; color: white; padding: 10px 18px; border-radius: 50px; font-weight: 800; z-index: 150; opacity: 0; transition: 0.2s; pointer-events: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .bottom-sheet { background: white; width: 100%; max-width: 450px; border-radius: 28px 28px 0 0; padding: 20px; max-height: 85vh; overflow-y: auto; }
        .store-card { margin-bottom: 12px; cursor: pointer; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        input, button { font-family: inherit; }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <!-- شاشة الدخول -->
    <div id="loginView" class="view active">
        <div style="padding: 40px 24px; text-align: center;">
            <div style="width: 80px; height: 80px; background: linear-gradient(135deg,#006233,#00a857); border-radius: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fa-solid fa-shop" style="font-size: 42px; color: white;"></i>
            </div>
            <h1 style="font-size: 28px; font-weight: 900;">ZaLo الذكي</h1>
            <p style="color: #006233; font-weight: 800; margin: 8px 0;">🇩🇿 منصة جزائرية متكاملة</p>
            <div class="card" style="margin: 32px 0; text-align: right;">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" style="width:100%; padding: 12px; border:1px solid #e0e8e4; border-radius: 16px; margin-bottom: 12px;">
                <input type="password" id="loginPass" placeholder="كلمة المرور" style="width:100%; padding: 12px; border:1px solid #e0e8e4; border-radius: 16px; margin-bottom: 20px;">
                <button id="doLoginBtn" class="btn-primary" style="width:100%; padding: 12px;">دخول</button>
                <button id="showRegisterBtn" style="background:none; border:none; color:#006233; margin-top: 16px; font-weight: 800;">إنشاء حساب جديد</button>
            </div>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="mainAppView" class="view" style="padding-bottom: 80px;">
        <div class="glass-header">
            <div><i class="fa-solid fa-bars-staggered" style="font-size: 22px; color:#006233;" onclick="openDrawer()"></i></div>
            <div><h2 style="font-size: 18px;">ZaLo سوق ذكي</h2></div>
            <div><i class="fa-regular fa-bell" style="font-size: 20px; color:#006233;"></i></div>
        </div>
        <div id="tabContent" style="padding: 16px;"></div>
        <div class="bottom-nav">
            <button class="nav-item" data-tab="home"><i class="fa-solid fa-house"></i><span>الرئيسية</span></button>
            <button class="nav-item" data-tab="market"><i class="fa-solid fa-store"></i><span>المتاجر</span></button>
            <button class="nav-item" data-tab="explore"><i class="fa-solid fa-magnifying-glass"></i><span>استكشاف</span></button>
            <button class="nav-item" data-tab="profile"><i class="fa-regular fa-user"></i><span>حسابي</span></button>
        </div>
    </div>
</div>
<div class="ai-fab" id="aiFab"><i class="fa-regular fa-message"></i></div>
<div id="toastMsg" class="toast"></div>

<!-- نافذة التسجيل -->
<div id="registerModal" class="modal-overlay">
    <div class="bottom-sheet">
        <h3>إنشاء حساب جديد</h3>
        <input type="text" id="regName" placeholder="الاسم الكامل" style="width:100%; padding:12px; margin:10px 0; border-radius:16px; border:1px solid #ddd;">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني" style="width:100%; padding:12px; margin:10px 0; border-radius:16px; border:1px solid #ddd;">
        <input type="password" id="regPass" placeholder="كلمة المرور" style="width:100%; padding:12px; margin:10px 0; border-radius:16px; border:1px solid #ddd;">
        <button id="doRegisterBtn" class="btn-primary" style="width:100%;">تسجيل</button>
        <button onclick="closeRegisterModal()" style="margin-top:8px; background:none; border:none;">إلغاء</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

// 🔐 إعدادات Firebase الصحيحة (من مشروع zalo-smart)
const firebaseConfig = {
    apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
    authDomain: "zalo-smart.firebaseapp.com",
    projectId: "zalo-smart",
    storageBucket: "zalo-smart.firebasestorage.app",
    messagingSenderId: "430326151788",
    appId: "1:430326151788:web:2d253737c90eeebf9f3649",
    measurementId: "G-ECBYRX8WKH"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.showToast = (msg) => {
    let t = document.getElementById('toastMsg');
    t.innerText = msg;
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2000);
};

window.signIn = async (email, password) => {
    try {
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        showToast("تم تسجيل الدخول بنجاح");
        return userCred.user;
    } catch(e) { showToast("خطأ: "+e.message); return null; }
};

window.signUp = async (email, password, name) => {
    try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", userCred.user.uid), { name, email, role: "customer", loyaltyPoints: 0, createdAt: new Date() });
        showToast("تم إنشاء الحساب بنجاح");
        return userCred.user;
    } catch(e) { showToast("خطأ: "+e.message); return null; }
};

window.logout = async () => {
    await signOut(auth);
    showToast("تم تسجيل الخروج");
    document.getElementById('loginView').classList.add('active');
    document.getElementById('mainAppView').classList.remove('active');
};

async function seedInitialData() {
    const storesRef = collection(db, "stores");
    const snapshot = await getDocs(storesRef);
    if(snapshot.empty) {
        await addDoc(collection(db, "stores"), { name: "بوحنك تكنولوجي", category: "electronics", logo: "📱", rating: 4.9, verified: true, location: "الجزائر العاصمة", followers: 1240, whatsapp: "+213550000001" });
        await addDoc(collection(db, "stores"), { name: "مطعم الواحة", category: "food", logo: "🍽️", rating: 4.7, verified: true, location: "وهران", followers: 892, whatsapp: "+213550000002" });
        await addDoc(collection(db, "products"), { name: "هاتف ذكي 256GB", price: 42000, emoji: "📱", stock: 5, sold: 120, storeId: null, badge: "trending" });
        await addDoc(collection(db, "products"), { name: "سماعة لاسلكية Pro", price: 8900, emoji: "🎧", stock: 12, sold: 44, storeId: null, badge: "sale" });
    }
}

let allStores = [], allProducts = [];
async function loadStores() { const snap = await getDocs(collection(db, "stores")); allStores = snap.docs.map(d => ({ id: d.id, ...d.data() })); }
async function loadProducts() { const snap = await getDocs(collection(db, "products")); allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() })); }

function productCard(p) {
    let store = allStores.find(s => s.id === p.storeId);
    return `<div class="card" style="padding:12px;"><div style="font-size:32px;">${p.emoji || '📦'}</div><div style="font-weight:900;">${p.name}</div><div>${p.price.toLocaleString()} دج</div><div style="font-size:12px; color:#006233;">${store?.name || ''}</div><button class="btn-primary" style="margin-top:8px; width:100%;" onclick="addToCart('${p.id}')">اطلب الآن</button></div>`;
}

async function renderHome(container) {
    const featuredStores = allStores.slice(0,3);
    container.innerHTML = `<div style="display:flex; flex-direction:column; gap:16px;"><div class="card gradient-bg" style="padding:20px;"><p>🇩🇿 منصة رقمية ذكية</p><h3>تسوق من أقرب متجر</h3><p>دفع عند الاستلام • توصيل لكل الولايات</p><div style="display:flex; gap:12px; margin-top:12px;"><div><span>${allStores.length}</span><br>متجر</div><div><span>${allProducts.length}</span><br>منتج</div></div></div><div><div class="section-header"><span>🛍️ متاجر موثوقة</span></div><div id="featuredStoresHome"></div></div></div>`;
    document.getElementById('featuredStoresHome').innerHTML = featuredStores.map(s => `<div class="card store-card" onclick="viewStore('${s.id}')"><div class="flex-between"><div><i class="fa-solid fa-store"></i> <strong>${s.name}</strong> ⭐${s.rating}<br>${s.location}</div></div></div>`).join('');
}

async function renderStores(container) {
    container.innerHTML = `<div id="storesList"></div>`;
    document.getElementById('storesList').innerHTML = allStores.map(s => `<div class="card store-card" onclick="viewStore('${s.id}')"><div class="flex-between"><div><i class="fa-solid fa-store"></i> <strong>${s.name}</strong> ${s.verified?'✅':''}<br>${s.location}</div><div>⭐ ${s.rating}</div></div></div>`).join('');
}

async function renderExplore(container) {
    container.innerHTML = `<div class="card"><input type="text" id="exploreSearch" placeholder="بحث منتجات..." style="width:100%; padding:10px; border-radius:20px;"></div><div id="productsExploreGrid" class="product-grid" style="margin-top:16px;"></div>`;
    document.getElementById('productsExploreGrid').innerHTML = allProducts.map(p => productCard(p)).join('');
    document.getElementById('exploreSearch')?.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.getElementById('productsExploreGrid').innerHTML = allProducts.filter(p => p.name.includes(term)).map(p => productCard(p)).join('');
    });
}

function renderProfile(container) {
    container.innerHTML = `<div class="card" style="text-align:center;"><i class="fa-regular fa-circle-user" style="font-size:48px;"></i><h3>${auth.currentUser?.email}</h3><button class="btn-primary" onclick="logout()">تسجيل خروج</button></div>`;
}

window.viewStore = async (storeId) => {
    const store = allStores.find(s => s.id === storeId);
    if(!store) return;
    const storeProducts = allProducts.filter(p => p.storeId === storeId);
    document.getElementById('tabContent').innerHTML = `<button onclick="renderCurrentTab('market')" style="margin-bottom:12px;"><i class="fa-solid fa-arrow-right"></i> رجوع</button><div class="card"><h2>${store.name}</h2><p>📍 ${store.location} | ⭐ ${store.rating}</p><a href="https://wa.me/${store.whatsapp}" target="_blank"><button class="btn-primary"><i class="fa-brands fa-whatsapp"></i> واتساب المتجر</button></a></div><div class="product-grid">${storeProducts.map(p => productCard(p)).join('')}</div>`;
};
        window.addToCart = (productId) => { const prod = allProducts.find(p => p.id === productId); showToast(`تم إضافة ${prod?.name} إلى السلة (تجريبي)`); };
    window.openDrawer = () => showToast("القائمة قيد التطوير");
    window.closeRegisterModal = () => document.getElementById('registerModal').classList.remove('open');

    let activeTab = 'home';
    function renderCurrentTab(tab) {
        activeTab = tab;
        const container = document.getElementById('tabContent');
        if(tab === 'home') renderHome(container);
        if(tab === 'market') renderStores(container);
        if(tab === 'explore') renderExplore(container);
        if(tab === 'profile') renderProfile(container);
        document.querySelectorAll('.nav-item').forEach(btn => { btn.classList.remove('active'); if(btn.getAttribute('data-tab') === tab) btn.classList.add('active'); });
    }
    window.renderCurrentTab = renderCurrentTab;

    document.getElementById('doLoginBtn').onclick = async () => { const email = document.getElementById('loginEmail').value; const pass = document.getElementById('loginPass').value; if(email && pass) await signIn(email, pass); else showToast("أدخل البريد وكلمة المرور"); };
    document.getElementById('showRegisterBtn').onclick = () => document.getElementById('registerModal').classList.add('open');
    document.getElementById('doRegisterBtn').onclick = async () => { const name = document.getElementById('regName').value, email = document.getElementById('regEmail').value, pass = document.getElementById('regPass').value; if(name && email && pass) { await signUp(email, pass, name); document.getElementById('registerModal').classList.remove('open'); } else showToast("املأ جميع الحقول"); };
    document.getElementById('aiFab').onclick = () => showToast("🤖 مساعد زالو: اكتشف أفضل العروض اليوم!");

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.getElementById('loginView').classList.remove('active');
            document.getElementById('mainAppView').classList.add('active');
            await seedInitialData();
            await loadStores();
            await loadProducts();
            renderCurrentTab('home');
        } else {
            document.getElementById('loginView').classList.add('active');
            document.getElementById('mainAppView').classList.remove('active');
        }
    });
</script>
</body>
</html>
