<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo - اختبار الدخول</title>
    <style>
        body { font-family: system-ui; background: #f0f5f2; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 28px; padding: 24px; width: 350px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1px solid #ddd; }
        button { background: #006233; color: white; border: none; padding: 12px; border-radius: 60px; width: 100%; margin-top: 12px; cursor: pointer; }
        .error { color: red; margin-top: 12px; }
        .success { color: green; }
    </style>
</head>
<body>
<div class="card">
    <h1>ZaLo الذكي</h1>
    <p>🇩🇿 منصة جزائرية متكاملة</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني" value="hadi47hadi58@gmail.com">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="loginBtn">دخول</button>
    <div id="message"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const msgDiv = document.getElementById('message');

        if (!email || !pass) {
            msgDiv.innerHTML = '<span class="error">✏️ أدخل البريد وكلمة المرور</span>';
            return;
        }

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            msgDiv.innerHTML = '<span class="success">✅ تم تسجيل الدخول بنجاح! يمكنك الآن استخدام التطبيق الكامل.</span>';
        } catch (error) {
            let errorMsg = error.message;
            if (errorMsg.includes('user-not-found')) errorMsg = 'المستخدم غير موجود. أنشئ حساباً أولاً.';
            else if (errorMsg.includes('wrong-password')) errorMsg = 'كلمة المرور غير صحيحة.';
            else if (errorMsg.includes('invalid-email')) errorMsg = 'البريد الإلكتروني غير صحيح.';
            msgDiv.innerHTML = `<span class="error">❌ خطأ: ${errorMsg}</span>`;
        }
    };
</script>
</body>
</html>
