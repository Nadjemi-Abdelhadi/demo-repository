<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo AI Guide - المنيعة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="bg-white sticky top-0 z-50 border-b p-4 shadow-sm flex justify-between items-center h-16">
        <button onclick="goBack()" id="backBtn" class="hidden text-slate-600 w-10"><i class="fas fa-arrow-right text-xl"></i></button>
        <div class="flex flex-col items-center flex-grow text-center">
            <h1 class="font-black text-slate-800 text-base">دليل المنيعة</h1>
            <span class="text-[8px] text-blue-500 font-bold uppercase tracking-widest">Zalo AI Guide</span>
        </div>
        <img src="https://raw.githubusercontent.com/Nadjemi-Abdelhadi/demo-repository/main/1000045432.png" class="w-10 h-10 rounded-xl bg-slate-50 p-1">
    </header>

    <main class="max-w-md mx-auto p-5">
        
        <div id="view-home" class="animate-in">
            <h2 class="text-2xl font-black text-slate-800 mb-8 mt-4 leading-tight">كل ما تحتاجه في <br><span class="text-blue-600">مدينة المنيعة</span></h2>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="showCategory('electronics')" class="bg-white p-6 rounded-[35px] shadow-sm border border-slate-100 text-center flex flex-col items-center cursor-pointer active:scale-95 transition-transform">
                    <div class="bg-blue-50 w-14 h-14 rounded-2xl flex items-center justify-center mb-4 text-blue-600 text-xl">
                        <i class="fas fa-mobile-alt"></i>
                    </div>
                    <span class="font-bold text-slate-700 text-[11px]">الهواتف والإلكترونيات</span>
                </div>
                <div class="bg-slate-50 p-6 rounded-[35px] border border-dashed border-slate-200 text-center flex flex-col items-center opacity-50">
                    <div class="bg-white w-14 h-14 rounded-2xl flex items-center justify-center mb-4 text-slate-300 text-xl">
                        <i class="fas fa-utensils"></i>
                    </div>
                    <span class="font-bold text-slate-400 text-[11px]">قريباً.. المطاعم</span>
                </div>
            </div>
        </div>

        <div id="view-shops" class="hidden animate-in">
            <h2 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">
                <i class="fas fa-store text-blue-600"></i> محلات الإلكترونيات
            </h2>
            <div id="shopsList" class="space-y-4"></div>
        </div>

        <div id="view-products" class="hidden animate-in">
            <div id="shopHeader" class="bg-white rounded-[30px] p-6 shadow-md border border-blue-50 mb-8 text-center"></div>
            <div id="productsGrid" class="grid grid-cols-2 gap-4 pb-10"></div>
        </div>

    </main>

    <script>
        const SHEET_ID = '1EPSEZ5DggKehKWidD8Q52jTEsfPWf7RD5xqyWN2Gt4Q';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
        
        let allData = [];

        async function init() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                // تعديل الفلترة لتجاوز الصفوف الفارغة أو التي تحتوي على تواريخ غير صحيحة
                allData = json.table.rows.map(row => ({
                    shop: row.c[0]?.v,
                    item: row.c[1]?.v,
                    price: row.c[2]?.v,
                    desc: row.c[3]?.v || '',
                    imgUrl: row.c[4]?.v || '' 
                })).filter(i => i.shop && typeof i.shop === 'string' && i.shop.length > 2);
                
                console.log("Data Loaded:", allData);
            } catch (e) { console.error("Error loading data"); }
        }

        function showCategory(cat) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-shops').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('hidden');
            
            const list = document.getElementById('shopsList');
            const uniqueShops = [...new Set(allData.map(i => i.shop))];
            
            list.innerHTML = uniqueShops.map(shopName => `
                <div onclick="showShopProducts('${shopName}')" class="bg-white p-5 rounded-[28px] border border-slate-100 flex justify-between items-center shadow-sm cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white"><i class="fas fa-shopping-bag"></i></div>
                        <span class="font-bold text-slate-800">${shopName}</span>
                    </div>
                    <i class="fas fa-chevron-left text-slate-300 text-xs"></i>
                </div>
            `).join('');
        }

        function showShopProducts(shopName) {
            document.getElementById('view-shops').classList.add('hidden');
            document.getElementById('view-products').classList.remove('hidden');
            
            const header = document.getElementById('shopHeader');
            header.innerHTML = `
                <h2 class="text-2xl font-black text-slate-900 mb-2">${shopName}</h2>
                <p class="text-slate-400 text-[10px] mb-6 italic">المنيعة، الجزائر • متوفر الآن</p>
                <a href="https://wa.me/213696795160" target="_blank" class="flex items-center gap-3 bg-green-500 text-white p-4 rounded-2xl font-bold w-full justify-center shadow-lg shadow-green-100 active:scale-95 transition-transform">
                    <i class="fab fa-whatsapp text-2xl"></i> تواصل واطلب الآن
                </a>
            `;

            const grid = document.getElementById('productsGrid');
            const products = allData.filter(i => i.shop === shopName);
            
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-[28px] border border-slate-50 shadow-sm animate-in">
                    <div class="h-32 bg-slate-50 rounded-[22px] mb-3 overflow-hidden flex items-center justify-center border border-slate-100">
                         <img src="${p.imgUrl}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                    </div>
                    <h3 class="font-bold text-slate-800 text-[11px] mb-1 h-8 overflow-hidden">${p.item}</h3>
                    <div class="text-blue-600 font-black text-xs">${p.price}</div>
                </div>
            `).join('');
        }

        function goBack() {
            const vShops = document.getElementById('view-shops');
            const vProducts = document.getElementById('view-products');
            if (!vProducts.classList.contains('hidden')) {
                vProducts.classList.add('hidden');
                vShops.classList.remove('hidden');
            } else {
                vShops.classList.add('hidden');
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('backBtn').classList.add('hidden');
            }
        }

        init();
    </script>
</body>
                </html>
