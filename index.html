    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }

        .emerald-gradient {
            background: linear-gradient(135deg, #006233 0%, #008a47 100%);
        }

        .animate-fade {
            animation: fadeUp .32s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-active:active {
            transform: scale(.97);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .drawer-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .55);
            z-index: 90;
            display: none;
        }

        .drawer-backdrop.open {
            display: block;
        }

        .drawer {
            position: fixed;
            top: 0;
            bottom: 0;
            right: 0;
            width: 84%;
            max-width: 360px;
            background: #fff;
            z-index: 100;
            transform: translateX(110%);
            transition: .25s ease;
            overflow-y: auto;
            border-radius: 0 0 0 36px;
        }

        .drawer.open {
            transform: translateX(0);
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .62);
            z-index: 120;
            display: none;
            align-items: end;
            justify-content: center;
            padding: 14px;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .bottom-sheet {
            width: 100%;
            max-width: 430px;
            background: white;
            border-radius: 34px;
            padding: 22px;
            animation: sheetUp .25s ease both;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes sheetUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

        let orderQty = 1;

        const CATEGORIES = [

            { id: "electronics", label: "هواتف وإلكترونيات", icon: "fa-mobile-screen-button" },
            { id: "restaurants", label: "مطاعم ومقاهي", icon: "fa-utensils" },

            { id: "services", label: "خدمات وصيانة", icon: "fa-tools" },
            { id: "building", label: "مواد البناء", icon: "fa-hammer" },
            { id: "fashion", label: "ملابس وموضة", icon: "fa-shirt" },
            { id: "delivery", label: "خدمات التوصيل", icon: "fa-motorcycle" },
            { id: "sweets", label: "حلويات ومملحات", icon: "fa-cookie-bite" }
        ];

        function fsVal(field) {
            if (!field) return "";
            if ("stringValue" in field) return field.stringValue;
            if ("integerValue" in field) return String(field.integerValue);
            if ("doubleValue" in field) return String(field.doubleValue);
            if ("booleanValue" in field) return field.booleanValue ? "true" : "false";
            return "";
        }

        function esc(v) {
            return String(v || "").replace(/[&<>"']/g, m => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[m]));
        }

        function normalizePhone(phone) {
            let p = String(phone || "").replace(/[^\d+]/g, "");
            if (!p) return "";
            if (p.startsWith("+")) return p.replace("+", "");
            if (p.startsWith("00")) return p.slice(2);
            if (p.startsWith("0")) return "213" + p.slice(1);
            if (p.startsWith("213")) return p;
            return p;
        }

        function imgHtml(url, icon = "fa-box") {
            if (url) {
                return `
                    <img src="${esc(url)}"
                         class="w-full h-full object-cover rounded-2xl"
                         onerror="this.outerHTML='<div class=&quot;w-full h-full bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-3xl&quot;><i class=&quot;fa-solid ${icon}&quot;></i></div>'">
                `;
            }

            return `
                <div class="w-full h-full bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-3xl">
                    <i class="fa-solid ${icon}"></i>
                </div>
            `;
        }

        async function loadData() {
            const status = document.getElementById("dataStatus");

            try {
                status.innerHTML = `
                    <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                    <span>تحديث...</span>
                `;

                const [shopsRes, productsRes] = await Promise.all([
                    fetch(`${BASE_URL}/shops`),
                    fetch(`${BASE_URL}/products`)
                ]);

                const shopsJson = await shopsRes.json();
                const productsJson = await productsRes.json();

                const shopDocs = shopsJson.documents || [];
                const productDocs = productsJson.documents || [];

                allShops = shopDocs.map(doc => {
                    const f = doc.fields || {};
                    return {
                        id: doc.name.split("/").pop(),
                        name: fsVal(f.name),
                        phone: fsVal(f.phone),
                        address: fsVal(f.address),
                        wilaya: fsVal(f.wilaya),
                        baladiya: fsVal(f.baladiya),
                        category: fsVal(f.category) || "other",
                        imgUrl: fsVal(f.imgUrl),
                        websiteUrl: fsVal(f.websiteUrl) || ZALO_STORE_URL,
                        productCount: fsVal(f.productCount)
                    };
                });
