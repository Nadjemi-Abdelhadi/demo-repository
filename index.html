<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>ZaLo الذكي</title><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}body{background:#f5f9f7;}.app{max-width:450px;margin:0 auto;background:white;min-height:100vh;}.view{display:none;}.view.active{display:block;}.card{background:white;border-radius:24px;padding:14px;box-shadow:0 4px 12px rgba(0,98,51,0.08);margin-bottom:12px;}.btn{background:#006233;color:white;border:none;padding:10px;border-radius:50px;font-weight:800;width:100%;}.gradient{background:linear-gradient(135deg,#006233,#00a857);color:white;padding:20px;border-radius:24px;}.nav{position:fixed;bottom:0;max-width:450px;width:100%;background:white;display:flex;justify-content:space-around;padding:10px;border-top:1px solid #e0e8e4;}.nav-item{text-align:center;color:#8ba396;font-size:12px;}.nav-item.active{color:#006233;}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1f2e26;color:white;padding:8px 16px;border-radius:50px;opacity:0;transition:0.2s;}.toast.show{opacity:1;}</style></head><body><div class="app" id="app"><div id="loginView" class="view active"><div style="padding:40px 20px;text-align:center"><div style="width:70px;height:70px;background:linear-gradient(135deg,#006233,#00a857);border-radius:24px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center"><i class="fa-solid fa-shop" style="font-size:36px;color:white"></i></div><h1 style="font-size:28px">ZaLo الذكي</h1><p style="color:#006233">🇩🇿 منصة جزائرية متكاملة</p><div class="card" style="margin-top:30px"><input type="email" id="email" placeholder="البريد الإلكتروني" style="width:100%;padding:12px;margin-bottom:12px;border:1px solid #ddd;border-radius:16px"><input type="password" id="pass" placeholder="كلمة المرور" style="width:100%;padding:12px;margin-bottom:20px;border:1px solid #ddd;border-radius:16px"><button id="loginBtn" class="btn">دخول</button><button id="showRegBtn" style="background:none;border:none;color:#006233;margin-top:16px">إنشاء حساب جديد</button></div></div></div><div id="mainView" class="view" style="padding-bottom:70px"><div style="padding:12px;background:white;display:flex;justify-content:space-between"><h2>ZaLo سوق ذكي</h2><i class="fa-solid fa-bars" onclick="alert('قريباً')"></i></div><div id="content" style="padding:12px"></div><div class="nav"><div class="nav-item active" data-tab="home"><i class="fa-solid fa-house"></i><div>الرئيسية</div></div><div class="nav-item" data-tab="stores"><i class="fa-solid fa-store"></i><div>المتاجر</div></div><div class="nav-item" data-tab="profile"><i class="fa-regular fa-user"></i><div>حسابي</div></div></div></div></div><div id="registerModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100"><div style="background:white;width:90%;border-radius:28px;padding:20px"><h3>حساب جديد</h3><input type="text" id="regName" placeholder="الاسم" style="width:100%;padding:12px;margin:10px 0;border-radius:16px;border:1px solid #ddd"><input type="email" id="regEmail" placeholder="البريد" style="width:100%;padding:12px;margin:10px 0;border-radius:16px;border:1px solid #ddd"><input type="password" id="regPass" placeholder="كلمة المرور" style="width:100%;padding:12px;margin:10px 0;border-radius:16px;border:1px solid #ddd"><button id="doRegBtn" class="btn">تسجيل</button><button onclick="closeReg()" style="margin-top:8px;background:none;border:none">إلغاء</button></div></div><div id="toast" class="toast"></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";import{getFirestore,collection,doc,setDoc,getDocs}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",authDomain:"zalo-smart.firebaseapp.com",projectId:"zalo-smart",storageBucket:"zalo-smart.firebasestorage.app",messagingSenderId:"430326151788",appId:"1:430326151788:web:2d253737c90eeebf9f3649"};const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);function showToast(msg){let t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}async function seed(){const snap=await getDocs(collection(db,"stores"));if(snap.empty){await setDoc(doc(db,"stores","1"),{name:"بوحنك تكنولوجي",rating:4.9,location:"الجزائر",whatsapp:"+213550000001"});await setDoc(doc(db,"products","p1"),{name:"هاتف ذكي",price:42000,storeId:"1"});}}async function loadData(){const s=await getDocs(collection(db,"stores"));window.stores=s.docs.map(d=>({id:d.id,...d.data()}));const p=await getDocs(collection(db,"products"));window.products=p.docs.map(d=>({id:d.id,...d.data()}));}function renderHome(){let html=`<div class="gradient"><h3>مرحباً في ZaLo</h3><p>دفع عند الاستلام - توصيل لكل الولايات</p><div style="display:flex;gap:12px;margin-top:12px"><div><strong>${window.stores.length}</strong> متجر</div><div><strong>${window.products.length}</strong> منتج</div></div></div>`;window.stores.forEach(s=>{html+=`<div class="card" onclick="viewStore('${s.id}')"><strong>${s.name}</strong> ⭐${s.rating}<br>📍 ${s.location}</div>`;});document.getElementById('content').innerHTML=html;}function renderStores(){let html='';window.stores.forEach(s=>{html+=`<div class="card" onclick="viewStore('${s.id}')"><strong>${s.name}</strong><br>⭐${s.rating}<br>📍 ${s.location}<br><i class="fa-brands fa-whatsapp"></i> <a href="https://wa.me/${s.whatsapp}" target="_blank">واتساب</a></div>`;});document.getElementById('content').innerHTML=html;}function renderProfile(){document.getElementById('content').innerHTML=`<div class="card"><h3>${auth.currentUser?.email}</h3><button class="btn" onclick="logout()">تسجيل خروج</button></div>`;}window.viewStore=async(id)=>{const store=window.stores.find(s=>s.id===id);const prods=window.products.filter(p=>p.storeId===id);let html=`<button onclick="renderCurrentTab('stores')">⬅ رجوع</button><div class="card"><h2>${store.name}</h2><a href="https://wa.me/${store.whatsapp}" target="_blank"><i class="fa-brands fa-whatsapp"></i> واتساب</a></div>`;prods.forEach(p=>{html+=`<div class="card">${p.name} - ${p.price} دج<button class="btn" style="margin-top:8px" onclick="showToast('تمت الإضافة')">اطلب</button></div>`;});document.getElementById('content').innerHTML=html;};function renderCurrentTab(tab){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');if(tab==='home')renderHome();if(tab==='stores')renderStores();if(tab==='profile')renderProfile();}window.renderCurrentTab=renderCurrentTab;window.logout=()=>signOut(auth);document.getElementById('loginBtn').onclick=async()=>{const email=document.getElementById('email').value,pass=document.getElementById('pass').value;if(email&&pass)try{await signInWithEmailAndPassword(auth,email,pass);showToast("تم الدخول");}catch(e){showToast(e.message);}else showToast("املأ الحقول");};document.getElementById('showRegBtn').onclick=()=>document.getElementById('registerModal').style.display='flex';document.getElementById('doRegBtn').onclick=async()=>{const name=document.getElementById('regName').value,email=document.getElementById('regEmail').value,pass=document.getElementById('regPass').value;if(name&&email&&pass){try{const user=await createUserWithEmailAndPassword(auth,email,pass);await setDoc(doc(db,"users",user.user.uid),{name,email});document.getElementById('registerModal').style.display='none';showToast("تم التسجيل");}catch(e){showToast(e.message);}}else showToast("املأ جميع الحقول");};window.closeReg=()=>document.getElementById('registerModal').style.display='none';onAuthStateChanged(auth,async(user)=>{if(user){document.getElementById('loginView').classList.remove('active');document.getElementById('mainView').classList.add('active');await seed();await loadData();renderCurrentTab('home');}else{document.getElementById('loginView').classList.add('active');document.getElementById('mainView').classList.remove('active');}});document.querySelectorAll('.nav-item').forEach(btn=>btn.onclick=()=>renderCurrentTab(btn.getAttribute('data-tab')));</script></body></html>
