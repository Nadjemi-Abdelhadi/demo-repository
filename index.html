<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo - دليل المنيعة الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }
        .shop-card { border: 1.5px solid #f1f5f9; border-radius: 24px; padding: 20px; margin-bottom: 24px; background: white; shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <header class="bg-white/95 backdrop-blur-md sticky top-0 z-[100] border-b border-slate-100 px-4 h-16 shadow-sm">
        <div class="max-w-5xl mx-auto h-full flex items-center justify-between relative">
            <div class="flex items-center gap-2 z-10">
                <img src="https://raw.githubusercontent.com/Nadjemi-Abdelhadi/demo-repository/main/1000045432.png" 
                     class="w-10 h-10 object-contain rounded-xl" alt="ZaLo Logo">
            </div>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="text-center">
                    <h1 class="font-black text-base text-slate-900 tracking-tight leading-tight">دليل المنيعة</h1>
                    <span class="text-[7px] text-blue-500 font-bold tracking-[0.3em] uppercase block">ZaLo Digital Guide</span>
                </div>
            </div>
            <div class="flex items-center gap-2 z-10">
                <button class="w-8 h-8 flex items-center justify-center rounded-full text-slate-400 hover:bg-slate-50"><i class="fa-solid fa-gear text-sm"></i></button>
                <button class="flex items-center gap-1.5 bg-slate-900 text-white px-3 py-1.5 rounded-full text-[10px] font-bold">
                    <i class="fa-solid fa-circle-user text-xs"></i>
                    <span>دخول</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-5 min-h-screen">
        <div class="relative mb-8 animate-fade">
            <i class="fa-solid fa-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="searchInput" onkeyup="searchFunction()" placeholder="ابحث في المنيعة..." 
                class="w-full bg-white border border-slate-200 rounded-2xl py-4 pr-12 pl-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 shadow-sm">
        </div>
        <div id="app"></div>
    </main>

    <script>
        // تم تحديث الرابط هنا للرابط الجديد الخاص بك
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1FACOjgPytWOtrT_24rHGn-GfFQy93JABIXpIFR5y6bE/export?format=csv';

        let allProducts = [];

        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error('Private');
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                allProducts = rows.map(row => {
                    const cols = row.split(',');
                    return { shop: cols[0]?.trim(), name: cols[1]?.trim(), price: cols[2]?.trim(), desc: cols[3]?.trim(), img: cols[4]?.trim() };
                }).filter(p => p.name);
                render(allProducts);
            } catch (e) {
                document.getElementById('app').innerHTML = `
                    <div class="text-center py-20 bg-amber-50 rounded-3xl border border-amber-100 p-8">
                        <i class="fa-solid fa-lock text-amber-500 text-3xl mb-4"></i>
                        <h3 class="font-black text-slate-800 text-sm mb-2">مشكلة وصول</h3>
                        <p class="text-[11px] text-slate-500">تأكد من اختيار "أي شخص لديه الرابط" في الجدول الجديد.</p>
                    </div>`;
            }
        }

        function searchFunction() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query) || p.shop.toLowerCase().includes(query));
            render(filtered);
        }

        function render(data) {
            const app = document.getElementById('app');
            if (data.length === 0) { app.innerHTML = '<p class="text-center py-10 text-slate-400">لا توجد نتائج</p>'; return; }
            const shops = [...new Set(data.map(p => p.shop))];
            let html = '';
            shops.forEach(shop => {
                const shopProds = data.filter(p => p.shop === shop);
                html += `
                    <div class="shop-card animate-fade">
                        <h2 class="text-lg font-black text-slate-800 mb-5 flex items-center gap-2"><span class="w-1.5 h-5 bg-blue-600 rounded-full"></span> ${shop}</h2>
                        <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                            ${shopProds.map(p => `
                                <div class="flex-shrink-0 w-40 bg-[#fdfdfd] border border-slate-100 rounded-2xl p-3 shadow-sm">
                                    <div class="w-full h-24 bg-slate-100 rounded-xl mb-3 flex items-center justify-center overflow-hidden">
                                        ${p.img && p.img.startsWith('http') ? `<img src="${p.img}" class="w-full h-full object-cover">` : '<i class="fa-solid fa-camera text-slate-300 text-xl"></i>'}
                                    </div>
                                    <h3 class="text-xs font-black text-slate-900 truncate">${p.name}</h3>
                                    <div class="flex justify-between items-center mt-3">
                                        <span class="text-blue-600 font-black text-xs">${p.price}</span>
                                        <div class="w-6 h-6 bg-white border border-slate-100 rounded-lg flex items-center justify-center shadow-sm"><i class="fa-solid fa-plus text-[8px] text-slate-400"></i></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
            app.innerHTML = html;
        }
        loadData();
    </script>
</body>
</html>
