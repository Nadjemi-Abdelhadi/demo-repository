<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | تسجيل تاجر جديد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1.5px solid #e2e8e4; }
        .btn { background: #006233; color: white; border: none; border-radius: 60px; padding: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 12px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
        .toast.show { opacity: 1; }
        .error-msg { color: #b91c1c; font-size: 13px; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>تسجيل تاجر جديد</h2>
    <p>يرجى ملء البيانات التالية للانضمام إلى المنصة</p>
    <input type="email" id="regEmail" placeholder="البريد الإلكتروني" value="merchant@zalo.com">
    <input type="password" id="regPass" placeholder="كلمة المرور">
    <input type="text" id="shopName" placeholder="اسم المتجر">
    <select id="merchantType">
        <option value="free">تاجر حر</option>
        <option value="registered">تاجر مسجل (سجل تجاري)</option>
    </select>
    <div id="commercialRegisterDiv" style="display: none;">
        <input type="file" id="commercialFile" accept=".pdf,.jpg,.png">
        <p style="font-size: 12px;">ارفع صورة أو PDF للسجل التجاري</p>
    </div>
    <button id="registerMerchantBtn" class="btn">تقديم طلب الانضمام</button>
    <div style="text-align: center; margin-top: 16px;">
        <a href="./index.html">العودة للرئيسية</a> | 
        <a href="./index.html" id="loginLink">تسجيل الدخول (إذا لديك حساب)</a>
    </div>
    <div id="errorMsg" class="error-msg"></div>
</div>
<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

    document.getElementById('merchantType').onchange = (e) => {
        document.getElementById('commercialRegisterDiv').style.display = e.target.value === 'registered' ? 'block' : 'none';
    };

    document.getElementById('registerMerchantBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const shopName = document.getElementById('shopName').value;
        const type = document.getElementById('merchantType').value;
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.innerText = "";
        
        if (!email || !pass || !shopName) { errorDiv.innerText = "املأ جميع الحقول الأساسية"; return; }
        if (pass.length < 6) { errorDiv.innerText = "كلمة المرور يجب أن تكون 6 أحرف على الأقل"; return; }

        // التحقق مما إذا كان البريد مستخدماً بالفعل
        try {
            const signInMethods = await fetchSignInMethodsForEmail(auth, email);
            if (signInMethods.length > 0) {
                errorDiv.innerText = "هذا البريد الإلكتروني مستخدم بالفعل. الرجاء استخدام بريد آخر أو تسجيل الدخول.";
                return;
            }
        } catch(e) { console.log(e); }

        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            let commercialFileUrl = "";
            if (type === 'registered') {
                const file = document.getElementById('commercialFile').files[0];
                if (!file) { errorDiv.innerText = "ارفع ملف السجل التجاري"; return; }
                const storageRef = ref(storage, `commercial/${userCred.user.uid}_${Date.now()}_${file.name}`);
                await uploadBytes(storageRef, file);
                commercialFileUrl = await getDownloadURL(storageRef);
            }
            await setDoc(doc(db, "merchant_requests", userCred.user.uid), {
                email, shopName, merchantType: type, commercialFileUrl, status: "pending", createdAt: new Date()
            });
            showToast("✅ تم إرسال طلبك. سيتم مراجعته من قبل الإدارة خلال 48 ساعة.");
            setTimeout(() => window.location.href = './index.html', 2500);
        } catch(e) {
            if (e.message.includes('email-already-in-use')) {
                errorDiv.innerText = "البريد الإلكتروني مستخدم بالفعل. جرب بريداً آخر.";
            } else {
                errorDiv.innerText = e.message;
            }
        }
    };
</script>
</body>
</html>
