<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | تسجيل تاجر جديد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1.5px solid #e2e8e4; }
        .btn { background: #006233; color: white; border: none; border-radius: 60px; padding: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 12px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; }
        .toast.show { opacity: 1; }
        .error-msg { color: #b91c1c; font-size: 13px; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>تسجيل تاجر جديد</h2>
    <p>يرجى ملء البيانات التالية للانضمام إلى المنصة</p>
    <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
    <input type="password" id="regPass" placeholder="كلمة المرور (6 أحرف على الأقل)">
    <input type="text" id="shopName" placeholder="اسم المتجر">
    <input type="text" id="merchantName" placeholder="اسم التاجر (الاسم الكامل)">
    <input type="tel" id="phone" placeholder="رقم الهاتف">
    <input type="text" id="whatsapp" placeholder="رقم الواتساب">
    <select id="merchantType">
        <option value="free">تاجر حر</option>
        <option value="registered">تاجر مسجل (سجل تجاري)</option>
    </select>
    <div id="commercialDiv" style="display: none;">
        <input type="file" id="commercialFile" accept=".pdf,.jpg,.png">
        <p style="font-size: 12px;">ارفع صورة أو PDF للسجل التجاري</p>
    </div>
    <input type="file" id="idFile" accept="image/*" placeholder="صورة الهوية الوطنية">
    <input type="file" id="logoFile" accept="image/*" placeholder="شعار المتجر (صورة)">
    <textarea id="address" rows="2" placeholder="العنوان الكامل"></textarea>
    <select id="wilayaSelect"><option value="">اختر الولاية</option></select>
    <select id="baladiaSelect" disabled><option value="">اختر البلدية</option></select>
    <input type="text" id="commercialNumber" placeholder="رقم السجل التجاري (إن وجد)">
    <button id="registerBtn" class="btn">تقديم طلب الانضمام</button>
    <div id="errorMsg" class="error-msg"></div>
    <div style="text-align: center; margin-top: 16px;">
        <a href="./index.html">العودة للرئيسية</a> | <a href="./login.html">تسجيل الدخول</a>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const wilayasData = {
        "أدرار": ["أدرار"], "الشلف": ["الشلف"], "الأغواط": ["الأغواط"], "أم البواقي": ["أم البواقي"],
        "باتنة": ["باتنة"], "بجاية": ["بجاية"], "بسكرة": ["بسكرة"], "بشار": ["بشار"], "البليدة": ["البليدة"],
        "البويرة": ["البويرة"], "تمنراست": ["تمنراست"], "تبسة": ["تبسة"], "تلمسان": ["تلمسان"], "تيارت": ["تيارت"],
        "تيزي وزو": ["تيزي وزو"], "الجزائر": ["الجزائر الوسطى"], "ججل": ["ججل"], "سطيف": ["سطيف"],
        "سعيدة": ["سعيدة"], "سكيكدة": ["سكيكدة"], "سيدي بلعباس": ["سيدي بلعباس"], "عنابة": ["عنابة"],
        "قالمة": ["قالمة"], "قسنطينة": ["قسنطينة"], "المدية": ["المدية"], "مستغانم": ["مستغانم"],
        "المسيلة": ["المسيلة"], "معسكر": ["معسكر"], "وهران": ["وهران"], "البيض": ["البيض"], "بومرداس": ["بومرداس"],
        "الطارف": ["الطارف"], "تندوف": ["تندوف"], "تيسمسيلت": ["تيسمسيلت"], "الوادي": ["الوادي"],
        "خنشلة": ["خنشلة"], "سوق أهراس": ["سوق أهراس"], "تيبازة": ["تيبازة"], "ميلة": ["ميلة"],
        "عين الدفلى": ["عين الدفلى"], "النعامة": ["النعامة"], "عين تموشنت": ["عين تموشنت"], "غرداية": ["غرداية"],
        "غليزان": ["غليزان"], "المغير": ["المغير"], "المنيعة": ["المنيعة"], "أولاد جلال": ["أولاد جلال"],
        "برج بوعريريج": ["برج بوعريريج"], "بريدة": ["بريدة"], "اليزي": ["اليزي"], "تيميمون": ["تيميمون"],
        "قصر الشلالة": ["قصر الشلالة"], "بني عباس": ["بني عباس"], "إن صالح": ["إن صالح"],
        "إن قزام": ["إن قزام"], "تقرت": ["تقرت"]
    };
    const wilayaSelect = document.getElementById('wilayaSelect');
    const baladiaSelect = document.getElementById('baladiaSelect');
    Object.keys(wilayasData).forEach(w => { let opt = document.createElement('option'); opt.value = w; opt.textContent = w; wilayaSelect.appendChild(opt); });
    wilayaSelect.onchange = () => {
        baladiaSelect.disabled = false;
        baladiaSelect.innerHTML = '<option value="">-- اختر البلدية --</option>';
        wilayasData[wilayaSelect.value]?.forEach(b => { let opt = document.createElement('option'); opt.value = b; opt.textContent = b; baladiaSelect.appendChild(opt); });
    };

    document.getElementById('merchantType').onchange = (e) => {
        document.getElementById('commercialDiv').style.display = e.target.value === 'registered' ? 'block' : 'none';
    };

    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const shopName = document.getElementById('shopName').value;
        const merchantName = document.getElementById('merchantName').value;
        const phone = document.getElementById('phone').value;
        const whatsapp = document.getElementById('whatsapp').value;
        const type = document.getElementById('merchantType').value;
        const wilaya = wilayaSelect.value;
        const baladia = baladiaSelect.value;
        const address = document.getElementById('address').value;
        const commercialNumber = document.getElementById('commercialNumber').value;
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.innerText = "";

        if (!email || !pass || !shopName || !merchantName || !phone || !wilaya || !baladia) {
            errorDiv.innerText = "املأ جميع الحقول الأساسية"; return;
        }
        if (pass.length < 6) { errorDiv.innerText = "كلمة المرور يجب أن تكون 6 أحرف على الأقل"; return; }

        const signInMethods = await fetchSignInMethodsForEmail(auth, email);
        if (signInMethods.length > 0) { errorDiv.innerText = "البريد الإلكتروني مستخدم بالفعل"; return; }

        const idFile = document.getElementById('idFile').files[0];
        const logoFile = document.getElementById('logoFile').files[0];
        if (!idFile || !logoFile) { errorDiv.innerText = "ارفع صورة الهوية وشعار المتجر"; return; }

        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            const uid = userCred.user.uid;

            const idRef = ref(storage, `merchant_docs/${uid}/id_${Date.now()}.jpg`);
            await uploadBytes(idRef, idFile);
            const idUrl = await getDownloadURL(idRef);

            const logoRef = ref(storage, `merchant_docs/${uid}/logo_${Date.now()}.jpg`);
            await uploadBytes(logoRef, logoFile);
            const logoUrl = await getDownloadURL(logoRef);

            let commercialUrl = "";
            if (type === 'registered') {
                const commercialFile = document.getElementById('commercialFile').files[0];
                if (!commercialFile) { errorDiv.innerText = "ارفع ملف السجل التجاري"; return; }
                const commercialRef = ref(storage, `merchant_docs/${uid}/commercial_${Date.now()}.pdf`);
                await uploadBytes(commercialRef, commercialFile);
                commercialUrl = await getDownloadURL(commercialRef);
            }

            await setDoc(doc(db, "merchant_requests", uid), {
                email, shopName, merchantName, phone, whatsapp, merchantType: type,
                wilaya, baladia, address, commercialNumber, idUrl, logoUrl, commercialUrl,
                status: "pending", createdAt: new Date()
            });
            showToast("✅ تم إرسال طلبك. سيتم مراجعته من قبل الإدارة خلال 48 ساعة.");
            setTimeout(() => window.location.href = './index.html', 2500);
        } catch(e) { errorDiv.innerText = e.message; }
    };
</script>
</body>
</html>
