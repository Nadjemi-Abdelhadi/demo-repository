<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 16px; }
        .card { background: white; border-radius: 32px; padding: 24px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .btn { background: #006233; color: white; border: none; padding: 12px; border-radius: 60px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 12px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1.5px solid #e2e8e4; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; }
        .toast.show { opacity: 1; }
        .error { color: red; margin-top: 8px; }
    </style>
</head>
<body>
<div class="card">
    <i class="fa-solid fa-shop" style="font-size: 48px; color: #006233; margin-bottom: 12px;"></i>
    <h1>ZaLo</h1>
    <p style="color: #006233;">تسجيل الدخول</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button class="btn" id="loginBtn">دخول</button>
    <div id="errorMsg" class="error"></div>
    <div style="margin-top: 16px;">
        <a href="./index.html">العودة للرئيسية</a> | <a href="./merchant-register.html">تسجيل تاجر جديد</a>
    </div>
</div>
<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        if (!email || !pass) { errorDiv.innerText = "أدخل البريد وكلمة المرور"; return; }
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            errorDiv.innerText = "";
        } catch (e) {
            errorDiv.innerText = e.message.includes('user-not-found') ? "مستخدم غير موجود" : (e.message.includes('wrong-password') ? "كلمة مرور خاطئة" : e.message);
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            const role = userDoc.exists() ? userDoc.data().role : 'customer';
            if (role === 'super_admin' || role === 'supervisor') window.location.href = './admin.html';
            else if (role === 'merchant') window.location.href = './merchant.html';
            else window.location.href = './index.html';
        }
    });
</script>
</body>
</html>
