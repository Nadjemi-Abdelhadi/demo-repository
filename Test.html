<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | الدخول المباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 32px; padding: 24px; width: 350px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1.5px solid #e2e8e4; }
        .btn { background: #006233; color: white; border: none; padding: 12px; border-radius: 60px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 12px; }
        .btn-outline { background: white; border: 1px solid #006233; color: #006233; margin-top: 8px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="card" id="loginCard">
    <i class="fa-solid fa-shop" style="font-size: 48px; color: #006233; margin-bottom: 12px;"></i>
    <h1>ZaLo الذكي</h1>
    <p style="color: #006233; margin-bottom: 20px;">منصة جزائرية متكاملة</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني" value="hadi47hadi58@gmail.com">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button class="btn" id="loginBtn">دخول</button>
    <button class="btn btn-outline" id="registerBtn">إنشاء حساب جديد</button>
    <div id="message" style="margin-top: 12px; font-size: 14px;"></div>
</div>

<div id="appCard" style="display: none; background: white; border-radius: 32px; padding: 24px; width: 350px; text-align: center;">
    <h2>مرحباً 👋</h2>
    <p id="userEmail"></p>
    <button class="btn" id="logoutBtn">تسجيل خروج</button>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('appCard').style.display = 'block';
            document.getElementById('userEmail').textContent = user.email;
            console.log("✅ مستخدم مسجل دخول:", user.email);
        } else {
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('appCard').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if (!email || !pass) { showToast("أدخل البريد وكلمة المرور"); return; }
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            showToast("✅ تم الدخول بنجاح");
        } catch (e) {
            let msg = e.message;
            if (msg.includes('user-not-found')) msg = "المستخدم غير موجود";
            else if (msg.includes('wrong-password')) msg = "كلمة مرور خاطئة";
            else if (msg.includes('invalid-email')) msg = "بريد إلكتروني غير صالح";
            showToast("❌ " + msg);
        }
    };

    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if (!email || !pass || pass.length < 6) { showToast("كلمة المرور يجب أن تكون 6 أحرف على الأقل"); return; }
        try {
            await createUserWithEmailAndPassword(auth, email, pass);
            showToast("✅ تم إنشاء الحساب وتسجيل الدخول");
        } catch (e) {
            showToast("❌ " + e.message);
        }
    };

    document.getElementById('logoutBtn').onclick = async () => {
        await signOut(auth);
        showToast("تم تسجيل الخروج");
    };
</script>
</body>
</html>
