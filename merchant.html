<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | لوحة التاجر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f4f8f5; direction: rtl; padding: 16px; }
        .container { max-width: 1300px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); overflow: hidden; }
        .header { background: #006233; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 24px; }
        .stat-card { background: #f8faf9; border-radius: 24px; padding: 20px; text-align: center; }
        .stat-card h3 { font-size: 14px; color: #5a6e62; margin-bottom: 8px; }
        .stat-number { font-size: 28px; font-weight: 900; color: #006233; }
        .card { background: white; border-radius: 24px; padding: 20px; margin: 0 24px 24px; border: 1px solid #e9f0ec; }
        .card h3 { margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eef2f0; }
        th { color: #006233; font-weight: 900; }
        .btn-sm { background: #006233; color: white; border: none; border-radius: 60px; padding: 6px 16px; font-weight: bold; cursor: pointer; }
        .btn-outline { background: white; border: 1px solid #006233; color: #006233; }
        .btn-danger { background: #b91c1c; }
        .review-card { background: #f8faf9; border-radius: 20px; padding: 12px; margin-bottom: 12px; }
        .review-stars { color: #f59e0b; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 10px 20px; border-radius: 60px; opacity: 0; transition: 0.2s; z-index: 1100; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2><i class="fa-solid fa-chart-line"></i> ZaLo | لوحة التاجر</h2>
        <button id="logoutBtn" class="btn-sm btn-outline" style="background:white;">تسجيل خروج</button>
    </div>
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><h3>إجمالي المبيعات</h3><div class="stat-number" id="totalSales">0</div><div>دج</div></div>
        <div class="stat-card"><h3>إجمالي الزبائن</h3><div class="stat-number" id="totalCustomers">0</div></div>
        <div class="stat-card"><h3>طلبات مغلقة</h3><div class="stat-number" id="closedOrders">0</div></div>
        <div class="stat-card"><h3>نشاط أخير</h3><div class="stat-number" id="lastActivity">-</div></div>
    </div>
    <div class="card">
        <div class="flex-between"><h3>📋 آخر الطلبات</h3><button id="refreshOrders" class="btn-sm">تحديث</button></div>
        <div style="overflow-x:auto;"><table id="ordersTable"><thead><tr><th>رقم الطلب</th><th>المنتج</th><th>العميل</th><th>الحالة</th><th></th></tr></thead><tbody><tr><td colspan="5">جاري التحميل...</td></tr></tbody></table></div>
    </div>
    <div class="card"><div class="flex-between"><h3>⭐ تقييمات الزبائن</h3></div><div id="reviewsContainer"></div></div>
    <div class="card"><div class="flex-between"><h3>⚠️ الشكاوى</h3><button id="resolveComplaintBtn" class="btn-sm btn-outline">معالجة الشكاوى</button></div><div id="complaintsContainer"></div></div>
    <div class="card"><div class="flex-between"><h3>⚙️ إدارة النظام</h3><div style="display: flex; gap: 12px;"><button id="manageAdminsBtn" class="btn-sm">إدارة المشرفين</button><button id="fraudAlertBtn" class="btn-sm btn-danger">نظام مكافحة الاحتيال</button></div></div></div>
</div>
<div id="toastMsg" class="toast"></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null, myShop = null, allProducts = [], allOrders = [], allReviews = [], allComplaints = [];
    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    async function loadMerchantData() {
        if (!currentUser) return;
        const shopsSnap = await getDocs(collection(db, "shops"));
        myShop = shopsSnap.docs.map(d => ({ id: d.id, ...d.data() })).find(s => s.ownerId === currentUser.uid);
        const productsSnap = await getDocs(collection(db, "products"));
        allProducts = productsSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.shopId === myShop?.id);
        const ordersSnap = await getDocs(collection(db, "orders"));
        allOrders = ordersSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(o => allProducts.some(p => p.id === o.productId));
        const reviewsSnap = await getDocs(collection(db, "reviews"));
        allReviews = reviewsSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(r => r.shopId === myShop?.id);
        const complaintsSnap = await getDocs(collection(db, "complaints"));
        allComplaints = complaintsSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(c => c.shopId === myShop?.id);
    }
    async function renderStats() {
        const totalSales = allOrders.reduce((sum, o) => sum + (o.total || 0), 0);
        const uniqueCustomers = [...new Set(allOrders.map(o => o.customerId))];
        const closedOrders = allOrders.filter(o => o.status === 'delivered').length;
        const lastOrder = allOrders.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt))[0];
        document.getElementById('totalSales').innerText = totalSales.toLocaleString();
        document.getElementById('totalCustomers').innerText = uniqueCustomers.length;
        document.getElementById('closedOrders').innerText = closedOrders;
        document.getElementById('lastActivity').innerText = lastOrder ? new Date(lastOrder.createdAt).toLocaleDateString() : '-';
    }
    async function renderOrders() {
        const tbody = document.querySelector('#ordersTable tbody');
        if (!allOrders.length) { tbody.innerHTML = '<tr><td colspan="5">لا توجد طلبات بعد</td></tr>'; return; }
        tbody.innerHTML = allOrders.map(o => {
            const product = allProducts.find(p => p.id === o.productId);
            return `<tr><td>${o.id.slice(0,8)}</td><td>${product?.name || 'منتج محذوف'}</td><td>${o.customerEmail || '-'}</td><td>${o.status === 'pending' ? 'قيد المراجعة' : (o.status === 'confirmed' ? 'مؤكد' : (o.status === 'shipped' ? 'تم الشحن' : 'تم التوصيل'))}</td><td>${o.status === 'pending' ? `<button class="btn-sm" onclick="confirmOrder('${o.id}')">تأكيد</button>` : '-'}</td></tr>`;
        }).join('');
    }
    window.confirmOrder = async (orderId) => {
        await updateDoc(doc(db, "orders", orderId), { status: "confirmed", updatedAt: new Date() });
        showToast("تم تأكيد الطلب");
        loadMerchantData(); renderStats(); renderOrders();
    };
    function renderReviews() {
        const container = document.getElementById('reviewsContainer');
        if (!allReviews.length) { container.innerHTML = '<p>لا توجد تقييمات بعد</p>'; return; }
        container.innerHTML = allReviews.map(r => `<div class="review-card"><div><strong>${r.userName}</strong></div><div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div><div>${r.comment || ''}</div></div>`).join('');
    }
    async function renderComplaints() {
        const container = document.getElementById('complaintsContainer');
        if (!allComplaints.length) { container.innerHTML = '<p>لا توجد شكاوى حالياً</p>'; return; }
        container.innerHTML = allComplaints.map(c => `<div class="review-card" style="border-right: 3px solid #b91c1c;"><div><strong>${c.userName}</strong> ضد متجرك</div><div>${c.message}</div><div style="font-size:12px;">${new Date(c.createdAt).toLocaleDateString()}</div></div>`).join('');
    }
    document.getElementById('resolveComplaintBtn').onclick = () => showToast("سيتم إضافة نظام معالجة الشكاوى قريباً");
    document.getElementById('manageAdminsBtn').onclick = () => window.location.href = './admin.html';
    document.getElementById('fraudAlertBtn').onclick = () => showToast("نظام مكافحة الاحتيال قيد التطوير");
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = './index.html'; return; }
        currentUser = user;
        await loadMerchantData();
        if (!myShop) { document.getElementById('statsGrid').innerHTML = '<div class="card"><p>⚠️ ليس لديك متجر مسجل. تواصل مع الإدارة.</p></div>'; return; }
        await renderStats(); await renderOrders(); renderReviews(); renderComplaints();
    });
    document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = './index.html'; };
    document.getElementById('refreshOrders').onclick = () => { loadMerchantData(); renderOrders(); };
</script>
</body>
                                                        </html>
