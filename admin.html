<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | لوحة المدير - موثوقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); overflow: hidden; }
        .header { background: #006233; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: white; color: #006233; border: none; padding: 6px 16px; border-radius: 60px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #006233; color: white; }
        .card { background: #fff; border-radius: 24px; padding: 20px; margin: 20px; border: 1px solid #e9f0ec; }
        .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
        .stat-box { background: #f8faf9; padding: 20px; border-radius: 24px; flex: 1; text-align: center; }
        .stat-number { font-size: 32px; font-weight: 900; color: #006233; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eef2f0; }
        th { color: #006233; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2><i class="fa-solid fa-shield-haltered"></i> ZaLo | لوحة المدير العام</h2>
        <button id="logoutBtn" class="btn">تسجيل خروج</button>
    </div>
    <div id="content" class="card" style="min-height: 300px;">
        <p>جاري التحقق من الصلاحيات...</p>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showToast(msg) {
        const t = document.getElementById('toastMsg');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = './index.html';
            return;
        }

        // نفس الطريقة المستخدمة في index.html لقراءة الدور
        const userDocRef = doc(db, "users", user.uid);
        const userDocSnap = await getDoc(userDocRef);
        let role = "customer";
        if (userDocSnap.exists()) {
            role = userDocSnap.data().role || "customer";
        } else {
            // إذا لم توجد وثيقة، ننشئها كـ customer
            await setDoc(userDocRef, { email: user.email, role: "customer" });
        }

        console.log("الدور من Firestore:", role);

        if (role !== "super_admin" && role !== "supervisor") {
            document.getElementById('content').innerHTML = `
                <div style="color: red; text-align: center; padding: 40px;">
                    <i class="fa-solid fa-ban" style="font-size: 48px;"></i>
                    <h3>غير مصرح بالدخول</h3>
                    <p>ليس لديك صلاحية للدخول إلى لوحة المدير.</p>
                    <button id="backBtn" class="btn-primary" style="margin-top: 16px;">العودة إلى الرئيسية</button>
                </div>
            `;
            document.getElementById('backBtn')?.addEventListener('click', () => {
                window.location.href = './index.html';
            });
            return;
        }

        // هنا المستخدم مسموح له (مدير أو مشرف) → نعرض لوحة تحكم مبسطة
        const shopsSnap = await getDocs(collection(db, "shops"));
        const shopsCount = shopsSnap.size;
        const productsSnap = await getDocs(collection(db, "products"));
        const productsCount = productsSnap.size;

        let shopsTable = '<table><thead><tr><th>اسم المتجر</th><th>الولاية</th><th>الهاتف</th></tr></thead><tbody>';
        shopsSnap.forEach(doc => {
            const s = doc.data();
            shopsTable += `<tr><td>${s.name || '-'}</td><td>${s.wilaya || '-'}</td><td>${s.phone || '-'}</td></tr>`;
        });
        shopsTable += '</tbody></table>';

        document.getElementById('content').innerHTML = `
            <div class="stats">
                <div class="stat-box"><div class="stat-number">${shopsCount}</div><div>المتاجر</div></div>
                <div class="stat-box"><div class="stat-number">${productsCount}</div><div>المنتجات</div></div>
            </div>
            <div class="card">
                <h3>قائمة المتاجر</h3>
                ${shopsTable}
            </div>
            <div class="card">
                <p>🔧 يمكنك إضافة متاجر ومنتجات من خلال Firebase Console، أو سأقوم لاحقاً بإضافة واجهة مباشرة.</p>
            </div>
        `;
    });

    document.getElementById('logoutBtn').onclick = async () => {
        await signOut(auth);
        window.location.href = './index.html';
    };
</script>
</body>
</html>
