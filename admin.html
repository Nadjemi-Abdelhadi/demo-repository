<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | لوحة المدير المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f5f2; direction: rtl; padding: 16px; }
        .container { max-width: 1300px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); overflow: hidden; }
        .header { background: #006233; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .tabs { display: flex; background: #f8faf9; padding: 0 20px; gap: 8px; border-bottom: 1px solid #e0e8e4; overflow-x: auto; }
        .tab { padding: 12px 24px; cursor: pointer; font-weight: 800; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab.active { color: #006233; border-bottom-color: #006233; background: white; }
        .content { padding: 24px; }
        .stats-grid { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card { background: #f8faf9; padding: 20px; border-radius: 24px; flex: 1; text-align: center; min-width: 120px; }
        .stat-number { font-size: 32px; font-weight: 900; color: #006233; }
        table { width: 100%; border-collapse: collapse; overflow-x: auto; display: block; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eef2f0; }
        th { color: #006233; font-weight: 900; }
        .btn { background: #006233; color: white; border: none; border-radius: 60px; padding: 6px 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin: 2px; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .btn-outline { background: white; border: 1px solid #006233; color: #006233; }
        .btn-danger { background: #b91c1c; color: white; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; width: 90%; max-width: 550px; border-radius: 28px; padding: 24px; max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1.5px solid #e2e8e4; border-radius: 20px; font-family: inherit; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e2f26; color: white; padding: 10px 20px; border-radius: 60px; opacity: 0; transition: 0.2s; z-index: 1100; }
        .toast.show { opacity: 1; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
        .request-card { border-bottom: 1px solid #eee; padding: 12px; margin-bottom: 8px; }
        @media (max-width: 700px) { .tab { padding: 8px 12px; font-size: 14px; } th, td { font-size: 12px; padding: 6px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2><i class="fa-solid fa-chart-line"></i> ZaLo | لوحة المدير العام</h2>
        <button id="logoutBtn" class="btn btn-outline" style="background:white;">تسجيل خروج</button>
    </div>
    <div class="tabs" id="tabsContainer">
        <div class="tab active" data-tab="dashboard">📊 لوحة القيادة</div>
        <div class="tab" data-tab="shops">🏪 المتاجر</div>
        <div class="tab" data-tab="products">📦 المنتجات</div>
        <div class="tab" data-tab="users">👥 المستخدمون</div>
        <div class="tab" data-tab="orders">📋 الطلبات</div>
        <div class="tab" data-tab="merchant_requests">📝 طلبات التجار</div>
        <div class="tab" data-tab="complaints">⚠️ الشكاوى</div>
        <div class="tab" data-tab="admins">👑 إدارة المشرفين</div>
        <div class="tab" data-tab="fraud">🛡️ مكافحة الاحتيال</div>
    </div>
    <div id="mainContent" class="content">جاري التحميل...</div>
</div>

<!-- مودال المتجر (نفس السابق) -->
<div id="shopModal" class="modal"><div class="modal-card"><h3 id="shopModalTitle">إضافة متجر</h3><input type="text" id="shopName" placeholder="اسم المتجر"><input type="text" id="shopWilaya" placeholder="الولاية"><input type="text" id="shopBaladia" placeholder="البلدية"><input type="text" id="shopPhone" placeholder="الهاتف"><input type="text" id="shopWhatsapp" placeholder="رابط واتساب"><input type="text" id="shopLogo" placeholder="إيموجي الشعار (اختياري)"><div class="flex-between"><button id="saveShopBtn" class="btn">حفظ</button><button onclick="closeModal('shopModal')" class="btn-outline">إلغاء</button></div></div></div>

<!-- مودال المنتج -->
<div id="productModal" class="modal"><div class="modal-card"><h3 id="productModalTitle">إضافة منتج</h3><input type="text" id="prodName" placeholder="اسم المنتج"><input type="number" id="prodPrice" placeholder="السعر (دج)"><input type="text" id="prodMedia" placeholder="رابط صورة/فيديو (اختياري)"><select id="prodShopId"><option value="">اختر المتجر</option></select><div class="flex-between"><button id="saveProductBtn" class="btn">حفظ</button><button onclick="closeModal('productModal')" class="btn-outline">إلغاء</button></div></div></div>

<!-- مودال تغيير دور المستخدم -->
<div id="userModal" class="modal"><div class="modal-card"><h3>تغيير دور المستخدم</h3><p id="userEmailSpan"></p><select id="userRoleSelect"><option value="customer">عميل</option><option value="merchant">تاجر</option><option value="supervisor">مشرف</option><option value="super_admin">مدير عام</option></select><div class="flex-between"><button id="updateRoleBtn" class="btn">تحديث</button><button onclick="closeModal('userModal')" class="btn-outline">إلغاء</button></div></div></div>

<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, addDoc, query, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allShops = [], allProducts = [], allUsers = [], allOrders = [], allRequests = [], allComplaints = [];
    let editingShopId = null, editingProductId = null, editingUserId = null;

    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function loadAll() {
        allShops = (await getDocs(collection(db, "shops"))).docs.map(d => ({ id: d.id, ...d.data() }));
        allProducts = (await getDocs(collection(db, "products"))).docs.map(d => ({ id: d.id, ...d.data() }));
        allUsers = (await getDocs(collection(db, "users"))).docs.map(d => ({ id: d.id, ...d.data() }));
        allOrders = (await getDocs(collection(db, "orders"))).docs.map(d => ({ id: d.id, ...d.data() }));
        allRequests = (await getDocs(collection(db, "merchant_requests"))).docs.map(d => ({ id: d.id, ...d.data() }));
        allComplaints = (await getDocs(collection(db, "complaints"))).docs.map(d => ({ id: d.id, ...d.data() }));
    }

    // Dashboard
    async function renderDashboard() {
        await loadAll();
        document.getElementById('mainContent').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${allShops.length}</div><div>المتاجر</div></div>
                <div class="stat-card"><div class="stat-number">${allProducts.length}</div><div>المنتجات</div></div>
                <div class="stat-card"><div class="stat-number">${allUsers.length}</div><div>المستخدمون</div></div>
                <div class="stat-card"><div class="stat-number">${allOrders.length}</div><div>الطلبات</div></div>
                <div class="stat-card"><div class="stat-number">${allRequests.length}</div><div>طلبات التجار</div></div>
                <div class="stat-card"><div class="stat-number">${allComplaints.length}</div><div>الشكاوى</div></div>
            </div>
            <div class="stat-card"><h3>مرحباً مدير عام</h3><p>استخدم التبويبات لإدارة المنصة بالكامل.</p></div>
            <div class="flex-between"><button id="generateAllShopsBtn" class="btn">🏪 إنشاء متاجر لجميع الولايات</button><button id="generateOneShopBtn" class="btn btn-outline">🏷️ إنشاء متجر لولاية محددة</button></div>
        `;
        document.getElementById('generateAllShopsBtn')?.addEventListener('click', () => generateAllWilayasShops());
        document.getElementById('generateOneShopBtn')?.addEventListener('click', () => generateShopForSpecificWilaya());
    }

    // دوال إنشاء المتاجر (مختصرة) ...
    const algerianWilayas = [/* 58 ولاية */]; // يمكن إضافتها كما سبق
    async function generateAllWilayasShops() { /* نفس السابق */ }
    async function generateShopForSpecificWilaya() { /* نفس السابق */ }

    // إدارة المتاجر (مختصرة، نفس السابق)
    async function renderShops() { /* ... */ }
    // إدارة المنتجات
    async function renderProducts() { /* ... */ }
    // إدارة المستخدمين
    async function renderUsers() { /* ... */ }
    // إدارة الطلبات
    async function renderOrders() { /* ... */ }
    // إدارة طلبات التجار
    async function renderMerchantRequests() { /* ... */ }

    // إدارة الشكاوى
    async function renderComplaints() {
        await loadAll();
        let html = '<h3>⚠️ قائمة الشكاوى</h3>';
        for (const c of allComplaints) {
            const shop = allShops.find(s => s.id === c.shopId);
            html += `<div class="request-card"><div><strong>من:</strong> ${c.userName}</div><div><strong>ضد متجر:</strong> ${shop?.name || 'غير معروف'}</div><div>${c.message}</div><div style="margin-top:8px;"><button class="btn-sm" onclick="resolveComplaint('${c.id}')">✅ حل الشكوى</button> <button class="btn-sm btn-danger" onclick="deleteComplaint('${c.id}')">🗑️ حذف</button></div></div>`;
        }
        document.getElementById('mainContent').innerHTML = html;
    }
    window.resolveComplaint = async (id) => {
        await updateDoc(doc(db, "complaints", id), { status: "resolved", resolvedAt: new Date() });
        showToast("تم حل الشكوى");
        renderComplaints();
    };
    window.deleteComplaint = async (id) => {
        await deleteDoc(doc(db, "complaints", id));
        showToast("تم حذف الشكوى");
        renderComplaints();
    };

    // إدارة المشرفين
    async function renderAdmins() {
        await loadAll();
        const admins = allUsers.filter(u => u.role === 'super_admin' || u.role === 'supervisor');
        let html = `<h3>👑 قائمة المشرفين</h3><div><input type="email" id="newAdminEmail" placeholder="بريد مستخدم جديد"><select id="newAdminRole"><option value="supervisor">مشرف</option><option value="super_admin">مدير عام</option></select><button id="addAdminBtn" class="btn-sm">➕ إضافة مشرف</button></div><div id="adminsList">`;
        admins.forEach(a => {
            html += `<div class="flex-between"><span>${a.email} (${a.role})</span><button onclick="removeAdmin('${a.id}')">إزالة</button></div>`;
        });
        html += `</div>`;
        document.getElementById('mainContent').innerHTML = html;
        document.getElementById('addAdminBtn')?.addEventListener('click', async () => {
            const email = document.getElementById('newAdminEmail').value;
            const role = document.getElementById('newAdminRole').value;
            const user = allUsers.find(u => u.email === email);
            if (user) { await updateDoc(doc(db, "users", user.id), { role }); showToast("تمت الإضافة"); renderAdmins(); }
            else showToast("المستخدم غير موجود");
        });
    }
    window.removeAdmin = async (id) => {
        await updateDoc(doc(db, "users", id), { role: "customer" });
        showToast("تمت الإزالة");
        renderAdmins();
    };

    // نظام مكافحة الاحتيال
    async function renderFraud() {
        await loadAll();
        const suspiciousOrders = allOrders.filter(o => o.total > 500000); // طلبات فوق 500,000 دج
        let html = `<h3>🛡️ طلبات مشبوهة (أكثر من 500,000 دج)</h3>`;
        suspiciousOrders.forEach(o => {
            html += `<div class="request-card"><div>المنتج: ${o.productName}</div><div>العميل: ${o.customerEmail}</div><div>المبلغ: ${o.total} دج</div><div><button class="btn-sm" onclick="markFraud('${o.id}')">🚨 تحذير</button> <button class="btn-sm btn-outline" onclick="ignoreFraud('${o.id}')">تجاهل</button></div></div>`;
        });
        document.getElementById('mainContent').innerHTML = html;
    }
    window.markFraud = async (id) => {
        await updateDoc(doc(db, "orders", id), { fraud: true, fraudAlert: true });
        showToast("تم تسجيل تحذير احتيال");
        renderFraud();
    };
    window.ignoreFraud = (id) => { showToast("تم تجاهل الطلب"); };

    // التبويبات
    let currentTab = 'dashboard';
    async function renderTab(tab) {
        currentTab = tab;
        if (tab === 'dashboard') await renderDashboard();
        else if (tab === 'shops') await renderShops();
        else if (tab === 'products') await renderProducts();
        else if (tab === 'users') await renderUsers();
        else if (tab === 'orders') await renderOrders();
        else if (tab === 'merchant_requests') await renderMerchantRequests();
        else if (tab === 'complaints') await renderComplaints();
        else if (tab === 'admins') await renderAdmins();
        else if (tab === 'fraud') await renderFraud();
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-tab') === tab));
    }
    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => renderTab(t.getAttribute('data-tab'))));

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = './index.html'; return; }
        const userDoc = await getDoc(doc(db, "users", user.uid));
        const role = userDoc.exists() ? userDoc.data().role : 'customer';
        if (role !== 'super_admin' && role !== 'supervisor') {
            document.getElementById('mainContent').innerHTML = `<div style="color:red; text-align:center; padding:40px;">⚠️ غير مصرح. ليس لديك صلاحية للدخول إلى لوحة المدير.</div>`;
            document.querySelector('.tabs').style.display = 'none';
            return;
        }
        document.querySelector('.tabs').style.display = 'flex';
        await renderTab('dashboard');
    });
    document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = './index.html'; };
    window.closeModal = closeModal;
</script>
</body>
    </html>
