<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZaLo | لوحة المدير المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f5f9f7;
            direction: rtl;
            padding: 20px;
        }
        /* الحاوية الرئيسية */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fff;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        /* الهيدر */
        .dashboard-header {
            background: linear-gradient(135deg, #006233, #008a47);
            padding: 20px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .dashboard-header h1 {
            color: white;
            font-size: 1.6rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dashboard-header h1 i {
            font-size: 1.8rem;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: white;
            color: #006233;
        }
        /* التبويبات */
        .tabs {
            display: flex;
            background: #f8faf9;
            padding: 0 20px;
            gap: 8px;
            border-bottom: 1px solid #e0e8e4;
            overflow-x: auto;
            scrollbar-width: thin;
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 800;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: 0.2s;
            color: #4b6b5e;
        }
        .tab i { margin-left: 6px; }
        .tab.active {
            color: #006233;
            border-bottom-color: #006233;
            background: white;
        }
        /* المحتوى */
        .content {
            padding: 28px;
        }
        /* بطاقات الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f8faf9;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: 0.2s;
            border: 1px solid #e9f0ec;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .stat-number {
            font-size: 32px;
            font-weight: 900;
            color: #006233;
        }
        .stat-label {
            font-size: 14px;
            color: #5a6e62;
            font-weight: 700;
            margin-top: 6px;
        }
        /* الجداول */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 20px;
            border: 1px solid #eef2f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: #f8faf9;
            padding: 14px 12px;
            text-align: right;
            color: #006233;
            font-weight: 900;
            border-bottom: 1px solid #e0e8e4;
        }
        td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #eef2f0;
            vertical-align: middle;
        }
        /* الأزرار */
        .btn {
            display: inline-block;
            background: #006233;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 6px 18px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .btn-outline { background: white; border: 1px solid #006233; color: #006233; }
        .btn-danger { background: #b91c1c; color: white; border: none; }
        .btn-danger:hover { background: #a01818; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        /* بطاقات الطلبات والشكاوى */
        .request-card {
            background: #fefaf5;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border-right: 4px solid #eab308;
            transition: 0.2s;
        }
        .request-card:hover { background: #fff7ed; }
        /* النوافذ المنبثقة */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            width: 90%;
            max-width: 520px;
            border-radius: 32px;
            padding: 28px;
            max-height: 85vh;
            overflow-y: auto;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1.5px solid #e2e8e4;
            border-radius: 60px;
            font-family: inherit;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2f26;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            opacity: 0;
            transition: 0.2s;
            z-index: 1100;
            font-weight: bold;
        }
        .toast.show { opacity: 1; }
        /* تذييل */
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #8ba396;
            margin-top: 30px;
            padding: 16px;
            border-top: 1px solid #eef2f0;
        }
        @media (max-width: 700px) {
            .stats-grid { grid-template-columns: repeat(2,1fr); }
            .tab { padding: 8px 16px; font-size: 13px; }
            .content { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-header">
        <h1><i class="fa-solid fa-chart-line"></i> ZaLo | لوحة المدير العام</h1>
        <button id="logoutBtn" class="logout-btn">تسجيل خروج <i class="fa-solid fa-sign-out-alt"></i></button>
    </div>
    <div class="tabs" id="tabsContainer">
        <div class="tab active" data-tab="dashboard">📊 لوحة القيادة</div>
        <div class="tab" data-tab="shops">🏪 المتاجر</div>
        <div class="tab" data-tab="products">📦 المنتجات</div>
        <div class="tab" data-tab="users">👥 المستخدمون</div>
        <div class="tab" data-tab="orders">📋 الطلبات</div>
        <div class="tab" data-tab="merchant_requests">📝 طلبات التجار</div>
        <div class="tab" data-tab="complaints">⚠️ الشكاوى</div>
        <div class="tab" data-tab="admins">👑 المشرفين</div>
        <div class="tab" data-tab="fraud">🛡️ مكافحة الاحتيال</div>
    </div>
    <div id="mainContent" class="content">جاري التحميل...</div>
    <div class="footer-note">ZaLo SYSTEM | ALL IN ONE PLACE | SHARING YOUR DREAMS</div>
</div>

<!-- مودالات (نفس القديمة) -->
<div id="shopModal" class="modal"><div class="modal-card"><h3 id="shopModalTitle">إضافة متجر</h3><input type="text" id="shopName" placeholder="اسم المتجر"><input type="text" id="shopWilaya" placeholder="الولاية"><input type="text" id="shopBaladia" placeholder="البلدية"><input type="text" id="shopPhone" placeholder="الهاتف"><input type="text" id="shopWhatsapp" placeholder="رابط واتساب"><input type="text" id="shopLogo" placeholder="إيموجي الشعار"><div class="flex-between"><button id="saveShopBtn" class="btn">حفظ</button><button onclick="closeModal('shopModal')" class="btn-outline">إلغاء</button></div></div></div>
<div id="productModal" class="modal"><div class="modal-card"><h3 id="productModalTitle">إضافة منتج</h3><input type="text" id="prodName" placeholder="اسم المنتج"><input type="number" id="prodPrice" placeholder="السعر (دج)"><input type="text" id="prodMedia" placeholder="رابط صورة/فيديو"><select id="prodShopId"><option value="">اختر المتجر</option></select><div class="flex-between"><button id="saveProductBtn" class="btn">حفظ</button><button onclick="closeModal('productModal')" class="btn-outline">إلغاء</button></div></div></div>
<div id="userModal" class="modal"><div class="modal-card"><h3>تغيير دور المستخدم</h3><p id="userEmailSpan"></p><select id="userRoleSelect"><option value="customer">عميل</option><option value="merchant">تاجر</option><option value="supervisor">مشرف</option><option value="super_admin">مدير عام</option></select><div class="flex-between"><button id="updateRoleBtn" class="btn">تحديث</button><button onclick="closeModal('userModal')" class="btn-outline">إلغاء</button></div></div></div>

<div id="toastMsg" class="toast"></div>

<script type="module">
    // ---------- نفس الكود الأصلي بالكامل (وظائف Firebase) ----------
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
        authDomain: "zalo-smart.firebaseapp.com",
        projectId: "zalo-smart",
        storageBucket: "zalo-smart.firebasestorage.app",
        messagingSenderId: "430326151788",
        appId: "1:430326151788:web:e4f94437946221429f3649",
        measurementId: "G-HVX2X346E7"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allShops = [], allProducts = [], allUsers = [], allOrders = [], allRequests = [], allComplaints = [];
    let editingShopId = null, editingProductId = null, editingUserId = null;
    let currentTab = 'dashboard';

    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function loadAll() {
        allShops = (await getDocs(collection(db, "shops"))).docs.map(d => ({ id: d.id, ...d.data() }));
        allProducts = (await getDocs(collection(db, "products"))).docs.map(d => ({ id: d.id, ...d.data() }));
        allUsers = (await getDocs(collection(db, "users"))).docs.map(d => ({ id: d.id, ...d.data() }));
        allOrders = (await getDocs(collection(db, "orders"))).docs.map(d => ({ id: d.id, ...d.data() }));
        allRequests = (await getDocs(collection(db, "merchant_requests"))).docs.map(d => ({ id: d.id, ...d.data() }));
        allComplaints = (await getDocs(collection(db, "complaints"))).docs.map(d => ({ id: d.id, ...d.data() }));
    }

    // Dashboard
    async function renderDashboard() {
        await loadAll();
        document.getElementById('mainContent').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${allShops.length}</div><div class="stat-label">المتاجر</div></div>
                <div class="stat-card"><div class="stat-number">${allProducts.length}</div><div class="stat-label">المنتجات</div></div>
                <div class="stat-card"><div class="stat-number">${allUsers.length}</div><div class="stat-label">المستخدمون</div></div>
                <div class="stat-card"><div class="stat-number">${allOrders.length}</div><div class="stat-label">الطلبات</div></div>
                <div class="stat-card"><div class="stat-number">${allRequests.length}</div><div class="stat-label">طلبات تجار</div></div>
                <div class="stat-card"><div class="stat-number">${allComplaints.length}</div><div class="stat-label">الشكاوى</div></div>
            </div>
            <div class="flex-between" style="margin-bottom:20px;">
                <button id="generateAllShopsBtn" class="btn">🏪 إنشاء متاجر لجميع الولايات (58)</button>
                <button id="generateOneShopBtn" class="btn btn-outline">🏷️ إنشاء متجر لولاية محددة</button>
            </div>
            <div class="stat-card"><h3>مرحباً مدير عام</h3><p>استخدم التبويبات لإدارة المنصة بالكامل.</p></div>
        `;
        document.getElementById('generateAllShopsBtn')?.addEventListener('click', () => generateAllWilayasShops());
        document.getElementById('generateOneShopBtn')?.addEventListener('click', () => generateShopForSpecificWilaya());
    }

    const algerianWilayas = ["أدرار", "الشلف", "الأغواط", "أم البواقي", "باتنة", "بجاية", "بسكرة", "بشار", "البليدة", "البويرة", "تمنراست", "تبسة", "تلمسان", "تيارت", "تيزي وزو", "الجزائر", "ججل", "سطيف", "سعيدة", "سكيكدة", "سيدي بلعباس", "عنابة", "قالمة", "قسنطينة", "المدية", "مستغانم", "المسيلة", "معسكر", "وهران", "البيض", "بومرداس", "الطارف", "تندوف", "تيسمسيلت", "الوادي", "خنشلة", "سوق أهراس", "تيبازة", "ميلة", "عين الدفلى", "النعامة", "عين تموشنت", "غرداية", "غليزان", "المغير", "المنيعة", "أولاد جلال", "برج بوعريريج", "بريدة", "اليزي", "تيميمون", "قصر الشلالة", "بني عباس", "إن صالح", "إن قزام", "تقرت"];

    async function generateAllWilayasShops() {
        if (!confirm(`سيتم إنشاء متاجر لـ ${algerianWilayas.length} ولاية (غير الموجودة). متابعة؟`)) return;
        let count = 0;
        for (const w of algerianWilayas) { if (!allShops.find(s => s.wilaya === w)) { await addDoc(collection(db, "shops"), { name: `متجر ${w}`, wilaya: w, baladia: w, whatsapp: "+213550000000", logoEmoji: "🏪", category: "متجر عام", phone: "0550000000", verified: true, createdAt: new Date() }); count++; } }
        showToast(`✅ تم إنشاء ${count} متجر جديد`);
        await loadAll(); renderDashboard(); if (currentTab === 'shops') renderShops();
    }
    async function generateShopForSpecificWilaya() {
        const wilaya = prompt("أدخل اسم الولاية (مثال: المنيعة):");
        if (!wilaya) return;
        if (allShops.find(s => s.wilaya === wilaya)) { showToast(`يوجد متجر في ولاية ${wilaya}`); return; }
        await addDoc(collection(db, "shops"), { name: `متجر ${wilaya}`, wilaya, baladia: wilaya, whatsapp: "+213550000000", logoEmoji: "🏪", category: "متجر عام", phone: "0550000000", verified: true, createdAt: new Date() });
        showToast(`✅ تم إنشاء متجر في ${wilaya}`);
        await loadAll(); renderDashboard(); if (currentTab === 'shops') renderShops();
    }

    // المتاجر
    async function renderShops() {
        await loadAll();
        let html = `<div class="flex-between"><h3>إدارة المتاجر</h3><button id="addShopBtn" class="btn">+ إضافة متجر</button></div><div class="table-wrapper"><table><thead><tr><th>الاسم</th><th>الولاية</th><th>البلدية</th><th>الهاتف</th><th>إجراءات</th></tr></thead><tbody>`;
        allShops.forEach(s => { html += `<tr><td>${s.name||'-'}</td><td>${s.wilaya||'-'}</td><td>${s.baladia||'-'}</td><td>${s.phone||'-'}</td><td><button class="btn-sm btn-outline" onclick="editShop('${s.id}')">تعديل</button> <button class="btn-sm btn-danger" onclick="deleteShop('${s.id}')">حذف</button></td></tr>`; });
        html += `</tbody></table></div>`;
        document.getElementById('mainContent').innerHTML = html;
        document.getElementById('addShopBtn')?.addEventListener('click', () => openShopModal());
    }
    window.editShop = (id) => { const s = allShops.find(x=>x.id===id); if(s) openShopModal(s); };
    window.deleteShop = async (id) => { if(confirm('حذف المتجر؟')) { await deleteDoc(doc(db,"shops",id)); showToast('تم الحذف'); renderShops(); } };
    function openShopModal(shop=null) {
        document.getElementById('shopModalTitle').innerText = shop ? 'تعديل متجر' : 'إضافة متجر';
        document.getElementById('shopName').value = shop?.name||''; document.getElementById('shopWilaya').value = shop?.wilaya||''; document.getElementById('shopBaladia').value = shop?.baladia||''; document.getElementById('shopPhone').value = shop?.phone||''; document.getElementById('shopWhatsapp').value = shop?.whatsapp||''; document.getElementById('shopLogo').value = shop?.logoEmoji||'';
        editingShopId = shop?.id||null; document.getElementById('shopModal').style.display = 'flex';
    }
    document.getElementById('saveShopBtn').onclick = async () => {
        const data = { name: document.getElementById('shopName').value, wilaya: document.getElementById('shopWilaya').value, baladia: document.getElementById('shopBaladia').value, phone: document.getElementById('shopPhone').value, whatsapp: document.getElementById('shopWhatsapp').value, logoEmoji: document.getElementById('shopLogo').value||'🏪', updatedAt: new Date() };
        if (!data.name) { showToast('اسم المتجر مطلوب'); return; }
        if (editingShopId) await updateDoc(doc(db,"shops",editingShopId), data);
        else await addDoc(collection(db,"shops"), {...data, createdAt: new Date()});
        closeModal('shopModal'); renderShops(); showToast('تم الحفظ');
    };

    // المنتجات (مختصرة)
    async function renderProducts() {
        await loadAll();
        let html = `<div class="flex-between"><h3>إدارة المنتجات</h3><button id="addProductBtn" class="btn">+ إضافة منتج</button></div><div class="table-wrapper"><table><thead><tr><th>الاسم</th><th>السعر</th><th>المتجر</th><th>إجراءات</th></tr></thead><tbody>`;
        allProducts.forEach(p => { const shop = allShops.find(s=>s.id===p.shopId); html += `<tr><td>${p.name||'-'}</td><td>${p.price||0} دج</td><td>${shop?.name||'-'}</td><td><button class="btn-sm btn-outline" onclick="editProduct('${p.id}')">تعديل</button> <button class="btn-sm btn-danger" onclick="deleteProduct('${p.id}')">حذف</button></td></tr>`; });
        html += `</tbody></table></div>`;
        document.getElementById('mainContent').innerHTML = html;
        document.getElementById('addProductBtn')?.addEventListener('click', () => openProductModal());
    }
    window.editProduct = (id) => { const p = allProducts.find(x=>x.id===id); if(p) openProductModal(p); };
    window.deleteProduct = async (id) => { if(confirm('حذف المنتج؟')) { await deleteDoc(doc(db,"products",id)); showToast('تم الحذف'); renderProducts(); } };
    function openProductModal(prod=null) {
        document.getElementById('productModalTitle').innerText = prod ? 'تعديل منتج' : 'إضافة منتج';
        document.getElementById('prodName').value = prod?.name||''; document.getElementById('prodPrice').value = prod?.price||''; document.getElementById('prodMedia').value = prod?.mediaUrl||'';
        const select = document.getElementById('prodShopId'); select.innerHTML = '<option value="">اختر المتجر</option>'+allShops.map(s=>`<option value="${s.id}" ${s.id===prod?.shopId?'selected':''}>${s.name}</option>`).join('');
        editingProductId = prod?.id||null; document.getElementById('productModal').style.display = 'flex';
    }
    document.getElementById('saveProductBtn').onclick = async () => {
        const data = { name: document.getElementById('prodName').value, price: parseInt(document.getElementById('prodPrice').value), mediaUrl: document.getElementById('prodMedia').value, shopId: document.getElementById('prodShopId').value, updatedAt: new Date() };
        if (!data.name || !data.price || !data.shopId) { showToast('الاسم والسعر والمتجر مطلوبة'); return; }
        if (editingProductId) await updateDoc(doc(db,"products",editingProductId), data);
        else await addDoc(collection(db,"products"), {...data, likes:0, comments:[], createdAt: new Date()});
        closeModal('productModal'); renderProducts(); showToast('تم الحفظ');
    };

    // المستخدمون
    async function renderUsers() {
        await loadAll();
        let html = `<h3>إدارة المستخدمين</h3><div class="table-wrapper"><table><thead><tr><th>البريد</th><th>الدور</th><th>إجراءات</th></tr></thead><tbody>`;
        allUsers.forEach(u => { html += `<tr><td>${u.email}</td><td>${u.role||'customer'}</td><td><button class="btn-sm btn-outline" onclick="openUserModal('${u.id}','${u.email}','${u.role||'customer'}')">تغيير الدور</button></td></tr>`; });
        html += `</tbody></table></div>`;
        document.getElementById('mainContent').innerHTML = html;
    }
    window.openUserModal = (id, email, role) => { document.getElementById('userEmailSpan').innerText = email; document.getElementById('userRoleSelect').value = role; editingUserId = id; document.getElementById('userModal').style.display = 'flex'; };
    document.getElementById('updateRoleBtn').onclick = async () => { if (editingUserId) { await updateDoc(doc(db,"users",editingUserId), { role: document.getElementById('userRoleSelect').value }); showToast('تم تحديث الدور'); closeModal('userModal'); renderUsers(); } };

    // الطلبات
    async function renderOrders() {
        await loadAll();
        let html = `<h3>إدارة الطلبات</h3><div class="table-wrapper"><table><thead><tr><th>المنتج</th><th>العميل</th><th>المتجر</th><th>الحالة</th><th>تحديث</th></tr></thead><tbody>`;
        for (const o of allOrders) {
            const prod = allProducts.find(p=>p.id===o.productId); const productName = prod?.name||'منتج محذوف'; const shop = allShops.find(s=>s.id===prod?.shopId); const shopName = shop?.name||'-';
            html += `<tr><td>${productName}</td><td>${o.customerEmail||'-'}</td><td>${shopName}</td><td>${o.status||'pending'}</td><td><select onchange="updateOrderStatus('${o.id}', this.value)"><option value="pending" ${o.status==='pending'?'selected':''}>قيد المراجعة</option><option value="confirmed" ${o.status==='confirmed'?'selected':''}>مؤكد</option><option value="shipped" ${o.status==='shipped'?'selected':''}>تم الشحن</option><option value="delivered" ${o.status==='delivered'?'selected':''}>تم التوصيل</option></select></td></tr>`;
        }
        html += `</tbody></table></div>`;
        document.getElementById('mainContent').innerHTML = html;
    }
    window.updateOrderStatus = async (orderId, newStatus) => { await updateDoc(doc(db,"orders",orderId), { status: newStatus, updatedAt: new Date() }); showToast('تم تحديث الحالة'); renderOrders(); };

    // طلبات التجار
    async function renderMerchantRequests() {
        await loadAll();
        let html = `<h3>📋 طلبات انضمام التجار</h3>`;
        for (const req of allRequests) {
            html += `<div class="request-card"><div><strong>${req.shopName}</strong> - ${req.email}</div><div>النوع: ${req.merchantType==='registered'?'تاجر مسجل':'تاجر حر'}</div>${req.commercialUrl?`<div><a href="${req.commercialUrl}" target="_blank" class="btn-sm btn-outline">📎 السجل التجاري</a></div>`:''}${req.idUrl?`<div><a href="${req.idUrl}" target="_blank" class="btn-sm btn-outline">🪪 الهوية</a></div>`:''}${req.logoUrl?`<div><a href="${req.logoUrl}" target="_blank" class="btn-sm btn-outline">🖼️ الشعار</a></div>`:''}<div><button class="btn-sm" onclick="approveMerchant('${req.id}')">✅ قبول</button> <button class="btn-sm btn-danger" onclick="rejectMerchant('${req.id}')">❌ رفض</button></div></div>`;
        }
        document.getElementById('mainContent').innerHTML = html || '<p>لا توجد طلبات</p>';
    }
    window.approveMerchant = async (id) => { const req = await getDoc(doc(db,"merchant_requests",id)); if(req.exists()){ const d=req.data(); await setDoc(doc(db,"users",id),{ email:d.email, role:"merchant", shopName:d.shopName, merchantName:d.merchantName, phone:d.phone, whatsapp:d.whatsapp, wilaya:d.wilaya, baladia:d.baladia, address:d.address, logoUrl:d.logoUrl, idUrl:d.idUrl, commercialUrl:d.commercialUrl, status:"active", approvedAt:new Date() }); await deleteDoc(doc(db,"merchant_requests",id)); showToast("✅ تم قبول التاجر"); renderMerchantRequests(); } };
    window.rejectMerchant = async (id) => { if(confirm("رفض الطلب؟")){ await deleteDoc(doc(db,"merchant_requests",id)); showToast("❌ تم الرفض"); renderMerchantRequests(); } };

    // الشكاوى
    async function renderComplaints() {
        await loadAll();
        let html = `<h3>⚠️ قائمة الشكاوى</h3>`;
        for (const c of allComplaints) { const shop = allShops.find(s=>s.id===c.shopId); html += `<div class="request-card"><div><strong>من:</strong> ${c.userName}</div><div><strong>ضد متجر:</strong> ${shop?.name||'غير معروف'}</div><div>${c.message}</div><div><button class="btn-sm" onclick="resolveComplaint('${c.id}')">✅ حل الشكوى</button> <button class="btn-sm btn-danger" onclick="deleteComplaint('${c.id}')">🗑️ حذف</button></div></div>`; }
        document.getElementById('mainContent').innerHTML = html || '<p>لا توجد شكاوى</p>';
    }
    window.resolveComplaint = async (id) => { await updateDoc(doc(db,"complaints",id), { status:"resolved", resolvedAt:new Date() }); showToast("تم حل الشكوى"); renderComplaints(); };
    window.deleteComplaint = async (id) => { await deleteDoc(doc(db,"complaints",id)); showToast("تم حذف الشكوى"); renderComplaints(); };

    // إدارة المشرفين
    async function renderAdmins() {
        await loadAll();
        const admins = allUsers.filter(u => u.role==='super_admin'||u.role==='supervisor');
        let html = `<h3>👑 إدارة المشرفين</h3><div class="flex-between" style="margin-bottom:16px;"><input type="email" id="newAdminEmail" placeholder="بريد المستخدم" style="flex:1;"><select id="newAdminRole"><option value="supervisor">مشرف</option><option value="super_admin">مدير عام</option></select><button id="addAdminBtn" class="btn">➕ إضافة</button></div><div id="adminsList">`;
        admins.forEach(a => { html += `<div class="flex-between"><span>${a.email} (${a.role})</span><button onclick="removeAdmin('${a.id}')" class="btn-sm btn-danger">إزالة</button></div>`; });
        html += `</div>`;
        document.getElementById('mainContent').innerHTML = html;
        document.getElementById('addAdminBtn')?.addEventListener('click', async () => { const email = document.getElementById('newAdminEmail').value, role = document.getElementById('newAdminRole').value; const user = allUsers.find(u => u.email === email); if(user) { await updateDoc(doc(db,"users",user.id), { role }); showToast("تمت الإضافة"); renderAdmins(); } else showToast("المستخدم غير موجود"); });
    }
    window.removeAdmin = async (id) => { await updateDoc(doc(db,"users",id), { role:"customer" }); showToast("تمت الإزالة"); renderAdmins(); };

    // مكافحة الاحتيال
    async function renderFraud() {
        await loadAll();
        const suspicious = allOrders.filter(o => o.total > 500000);
        let html = `<h3>🛡️ طلبات مشبوهة (>500,000 دج)</h3>`;
        for (const o of suspicious) { const prod = allProducts.find(p=>p.id===o.productId); html += `<div class="request-card"><div><strong>المنتج:</strong> ${prod?.name||o.productName}</div><div><strong>العميل:</strong> ${o.customerEmail}</div><div><strong>المبلغ:</strong> ${o.total} دج</div><div><button class="btn-sm" onclick="markFraud('${o.id}')">🚨 تحذير</button> <button class="btn-sm btn-outline" onclick="ignoreFraud('${o.id}')">تجاهل</button></div></div>`; }
        document.getElementById('mainContent').innerHTML = html || '<p>لا توجد طلبات مشبوهة</p>';
    }
    window.markFraud = async (id) => { await updateDoc(doc(db,"orders",id), { fraud:true, fraudAlert:true }); showToast("تم تسجيل تحذير احتيال"); renderFraud(); };
    window.ignoreFraud = (id) => { showToast("تم تجاهل الطلب"); };

    // التبويبات
    async function renderTab(tab) {
        currentTab = tab;
        if (tab === 'dashboard') await renderDashboard();
        else if (tab === 'shops') await renderShops();
        else if (tab === 'products') await renderProducts();
        else if (tab === 'users') await renderUsers();
        else if (tab === 'orders') await renderOrders();
        else if (tab === 'merchant_requests') await renderMerchantRequests();
        else if (tab === 'complaints') await renderComplaints();
        else if (tab === 'admins') await renderAdmins();
        else if (tab === 'fraud') await renderFraud();
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-tab') === tab));
    }
    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => renderTab(t.getAttribute('data-tab'))));

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = './index.html'; return; }
        const userDoc = await getDoc(doc(db, "users", user.uid));
        const role = userDoc.exists() ? userDoc.data().role : 'customer';
        if (role !== 'super_admin' && role !== 'supervisor') {
            document.getElementById('mainContent').innerHTML = `<div style="color:red; text-align:center; padding:40px;">⚠️ غير مصرح. ليس لديك صلاحية للدخول إلى لوحة المدير.</div>`;
            document.querySelector('.tabs').style.display = 'none';
            return;
        }
        document.querySelector('.tabs').style.display = 'flex';
        await renderTab('dashboard');
    });
    document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = './index.html'; };
    window.closeModal = closeModal;
</script>
</body>
</html>
